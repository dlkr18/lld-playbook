<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LLD Playbook - Master Low-Level Design</title>
  <meta name="description" content="Complete 4-week LLD curriculum with 44 real-world problems, 23 design patterns, Java implementations.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="LLD Playbook - Master Low-Level Design">
  <meta property="og:description" content="44 problems. 23 design patterns. Land your dream job.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    /* ==================================================
       PALETTE — matches cheatsheet pages exactly
       ================================================== */
    :root {
      --bg:       #0f1117;
      --bg-card:  #181b23;
      --bg-code:  #1e2130;
      --border:   #2a2e3d;
      --text:     #c9cdd8;
      --text-dim: #6c7186;
      --heading:  #edf0f7;
      --accent:   #6366f1;
      --accent2:  #38bdf8;
      --accent3:  #4ade80;
      --accent4:  #f472b6;
      --accent5:  #a78bfa;
    }

    /* ==================================================
       RESET & BASE
       ================================================== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Inter', -apple-system, sans-serif !important;
      background: var(--bg) !important;
      color: var(--text) !important;
      line-height: 1.7 !important;
    }

    /* ==================================================
       SIDEBAR
       ================================================== */
    .sidebar {
      background: var(--bg-card) !important;
      border-right: 1px solid var(--border) !important;
      box-shadow: none !important;
    }

    .app-name-link {
      display: block !important;
      padding: 24px 20px !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 14px !important;
      font-weight: 700 !important;
      color: var(--accent) !important;
      text-transform: uppercase !important;
      letter-spacing: 2px !important;
      border-bottom: 1px solid var(--border) !important;
      text-decoration: none !important;
      background: none !important;
      -webkit-text-fill-color: var(--accent) !important;
    }

    .sidebar-nav { padding: 12px 10px !important; }
    .sidebar-nav ul { list-style: none !important; padding: 0 !important; margin: 0 !important; }
    .sidebar-nav li { margin: 0 !important; }

    .sidebar-nav > ul > li {
      margin-bottom: 2px !important;
    }

    .sidebar-nav > ul > li > a,
    .sidebar-nav > ul > li > p {
      display: block !important;
      padding: 6px 12px !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      color: var(--heading) !important;
      border-radius: 6px !important;
      transition: all 0.15s !important;
      text-decoration: none !important;
    }

    .sidebar-nav > ul > li > p {
      color: var(--text-dim) !important;
      font-size: 10px !important;
      text-transform: uppercase !important;
      letter-spacing: 1.5px !important;
      font-family: 'JetBrains Mono', monospace !important;
      margin-top: 20px !important;
      margin-bottom: 4px !important;
      padding-left: 12px !important;
    }

    .sidebar-nav > ul > li > a:hover {
      color: var(--accent) !important;
      background: rgba(99,102,241,0.08) !important;
    }

    .sidebar-nav ul ul { padding-left: 0 !important; }

    .sidebar-nav ul ul li a {
      padding: 4px 12px 4px 24px !important;
      font-size: 13px !important;
      color: var(--text-dim) !important;
      border-radius: 6px !important;
      transition: all 0.15s !important;
      text-decoration: none !important;
      font-weight: 400 !important;
      display: block !important;
    }

    .sidebar-nav ul ul li a:hover {
      color: var(--heading) !important;
      background: rgba(99,102,241,0.06) !important;
    }

    .sidebar-nav li.active > a {
      color: var(--accent) !important;
      background: rgba(99,102,241,0.1) !important;
      font-weight: 600 !important;
    }

    .sidebar-nav ul ul ul li a {
      padding-left: 36px !important;
      font-size: 12px !important;
    }

    .sidebar-toggle { background: var(--bg-card) !important; }
    .sidebar-toggle span { background: var(--text-dim) !important; }

    /* ==================================================
       SEARCH
       ================================================== */
    .search {
      padding: 14px 10px !important;
      border-bottom: 1px solid var(--border) !important;
    }
    .search input {
      width: 100% !important;
      background: var(--bg) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 9px 12px !important;
      color: var(--heading) !important;
      font-size: 13px !important;
      font-family: 'Inter', sans-serif !important;
      outline: none !important;
    }
    .search input:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 2px rgba(99,102,241,0.15) !important;
    }
    .search input::placeholder { color: var(--text-dim) !important; }

    .search .results-panel {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      margin-top: 4px !important;
    }
    .search .results-panel .search-keyword { color: var(--accent) !important; }
    .search .matching-post {
      border-bottom: 1px solid var(--border) !important;
      padding: 10px 12px !important;
    }
    .search .matching-post:hover { background: rgba(99,102,241,0.06) !important; }
    .search a { color: var(--heading) !important; text-decoration: none !important; }
    .search a:hover { color: var(--accent) !important; }
    .search p { color: var(--text-dim) !important; font-size: 12px !important; }

    /* ==================================================
       CONTENT AREA
       ================================================== */
    .content {
      padding: 40px 48px 120px !important;
    }

    .markdown-section {
      max-width: 860px !important;
      margin: 0 auto !important;
    }

    /* ==================================================
       TYPOGRAPHY
       ================================================== */
    .markdown-section h1 {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 30px !important;
      font-weight: 700 !important;
      color: var(--heading) !important;
      letter-spacing: -0.5px !important;
      margin: 0 0 20px 0 !important;
      padding-top: 0 !important;
      line-height: 1.2 !important;
      background: none !important;
      -webkit-text-fill-color: var(--heading) !important;
      border: none !important;
    }

    .markdown-section h1:first-child {
      margin-top: 0 !important;
    }

    .markdown-section h2 {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 18px !important;
      font-weight: 700 !important;
      color: var(--heading) !important;
      margin: 40px 0 16px 0 !important;
      padding-bottom: 8px !important;
      border-bottom: 2px solid var(--accent) !important;
      border-top: none !important;
      padding-top: 0 !important;
      line-height: 1.3 !important;
    }

    .markdown-section h3 {
      font-size: 15px !important;
      font-weight: 600 !important;
      color: var(--accent2) !important;
      margin: 28px 0 10px 0 !important;
      line-height: 1.4 !important;
    }

    .markdown-section h4 {
      font-size: 14px !important;
      font-weight: 600 !important;
      color: var(--accent5) !important;
      margin: 20px 0 8px 0 !important;
    }

    .markdown-section h5 {
      font-size: 13px !important;
      font-weight: 600 !important;
      color: var(--accent3) !important;
      margin: 16px 0 6px 0 !important;
    }

    .markdown-section p {
      font-size: 15px !important;
      line-height: 1.7 !important;
      color: var(--text) !important;
      margin: 10px 0 !important;
    }

    .markdown-section strong {
      color: var(--heading) !important;
      font-weight: 600 !important;
    }

    .markdown-section em {
      color: var(--text) !important;
    }

    /* ==================================================
       LINKS
       ================================================== */
    .markdown-section a {
      color: var(--accent) !important;
      text-decoration: none !important;
      font-weight: 500 !important;
      transition: color 0.15s !important;
    }
    .markdown-section a:hover {
      color: var(--accent5) !important;
      text-decoration: underline !important;
    }

    /* ==================================================
       CODE — inline & blocks
       ================================================== */
    .markdown-section code {
      background: var(--bg-code) !important;
      color: var(--accent2) !important;
      padding: 2px 6px !important;
      border-radius: 4px !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 0.85em !important;
      font-weight: 400 !important;
      border: none !important;
    }

    .markdown-section pre {
      background: var(--bg-code) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 16px 20px !important;
      margin: 14px 0 !important;
      overflow-x: auto !important;
      box-shadow: none !important;
    }

    .markdown-section pre > code,
    .markdown-section pre code {
      background: transparent !important;
      color: var(--text) !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 13px !important;
      line-height: 1.6 !important;
      padding: 0 !important;
      border-radius: 0 !important;
      border: none !important;
    }

    /* Prism syntax tokens */
    .token.comment, .token.prolog, .token.doctype, .token.cdata {
      color: var(--text-dim) !important; font-style: italic !important;
    }
    .token.keyword, .token.tag, .token.boolean, .token.constant {
      color: var(--accent4) !important;
    }
    .token.string, .token.attr-value, .token.char {
      color: var(--accent3) !important;
    }
    .token.function, .token.method {
      color: #4ade80 !important;
    }
    .token.number {
      color: #f59e42 !important;
    }
    .token.operator, .token.punctuation {
      color: var(--accent2) !important;
    }
    .token.class-name, .token.type-name {
      color: var(--accent2) !important;
    }
    .token.attr-name {
      color: var(--accent5) !important;
    }
    .token.variable {
      color: var(--accent5) !important;
    }
    .token.annotation {
      color: var(--accent4) !important;
    }
    .token.namespace {
      color: var(--text-dim) !important;
    }

    /* ==================================================
       TABLES
       ================================================== */
    .markdown-section table {
      width: 100% !important;
      border-collapse: collapse !important;
      border-spacing: 0 !important;
      border: none !important;
      border-radius: 0 !important;
      margin: 16px 0 !important;
      font-size: 14px !important;
      box-shadow: none !important;
      overflow: visible !important;
      display: table !important;
    }

    .markdown-section thead {
      background: var(--bg-code) !important;
    }

    .markdown-section th {
      padding: 10px 14px !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 1px !important;
      color: var(--accent) !important;
      text-align: left !important;
      border-bottom: 2px solid var(--border) !important;
      background: var(--bg-code) !important;
    }

    .markdown-section td {
      padding: 9px 14px !important;
      color: var(--text) !important;
      border-bottom: 1px solid var(--border) !important;
      font-size: 14px !important;
      vertical-align: top !important;
    }

    .markdown-section tbody tr {
      transition: background 0.1s !important;
    }
    .markdown-section tbody tr:hover {
      background: rgba(99,102,241,0.04) !important;
    }
    .markdown-section tbody tr:last-child td {
      border-bottom: none !important;
    }

    /* ==================================================
       LISTS
       ================================================== */
    .markdown-section ul,
    .markdown-section ol {
      padding-left: 20px !important;
      margin: 8px 0 !important;
    }
    .markdown-section li {
      margin: 3px 0 !important;
      color: var(--text) !important;
      line-height: 1.7 !important;
    }
    .markdown-section li::marker {
      color: var(--accent) !important;
    }

    /* ==================================================
       BLOCKQUOTES
       ================================================== */
    .markdown-section blockquote {
      border-left: 3px solid var(--accent) !important;
      background: rgba(99,102,241,0.05) !important;
      padding: 12px 16px !important;
      margin: 16px 0 !important;
      border-radius: 0 8px 8px 0 !important;
    }
    .markdown-section blockquote p {
      color: var(--text) !important;
      font-style: normal !important;
      margin: 0 !important;
    }
    .markdown-section blockquote strong {
      color: var(--accent) !important;
    }

    /* ==================================================
       HORIZONTAL RULE
       ================================================== */
    .markdown-section hr {
      border: none !important;
      border-top: 1px solid var(--border) !important;
      margin: 32px 0 !important;
    }

    /* ==================================================
       DETAILS / SUMMARY (collapsible code sections)
       ================================================== */
    .markdown-section details {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      margin: 12px 0 !important;
      overflow: hidden !important;
    }

    .markdown-section details summary {
      padding: 12px 16px !important;
      cursor: pointer !important;
      font-weight: 600 !important;
      color: var(--heading) !important;
      font-size: 14px !important;
      list-style: none !important;
      transition: background 0.15s !important;
      user-select: none !important;
    }

    .markdown-section details summary::-webkit-details-marker { display: none !important; }

    .markdown-section details summary::before {
      content: '+ ' !important;
      color: var(--accent) !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-weight: 700 !important;
    }

    .markdown-section details[open] summary::before {
      content: '- ' !important;
    }

    .markdown-section details summary:hover {
      background: rgba(99,102,241,0.06) !important;
    }

    .markdown-section details > *:not(summary) {
      padding: 0 16px !important;
    }

    .markdown-section details > pre {
      margin: 0 16px 16px !important;
      border-radius: 6px !important;
    }

    /* ==================================================
       IMAGES
       ================================================== */
    .markdown-section img {
      max-width: 100% !important;
      border-radius: 8px !important;
      border: 1px solid var(--border) !important;
      margin: 12px 0 !important;
    }

    /* ==================================================
       MERMAID DIAGRAMS
       ================================================== */
    .markdown-section .mermaid {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 20px !important;
      margin: 16px 0 !important;
      text-align: center !important;
    }

    /* ==================================================
       COPY BUTTON
       ================================================== */
    .docsify-copy-code-button {
      background: rgba(99,102,241,0.8) !important;
      color: white !important;
      border: none !important;
      border-radius: 4px !important;
      padding: 4px 10px !important;
      font-size: 10px !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.5px !important;
      transition: background 0.15s !important;
    }
    .docsify-copy-code-button:hover {
      background: var(--accent) !important;
    }

    /* ==================================================
       PAGINATION
       ================================================== */
    .pagination-item {
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 14px 16px !important;
      background: var(--bg-card) !important;
      transition: all 0.15s !important;
    }
    .pagination-item:hover {
      border-color: var(--accent) !important;
      transform: translateY(-1px) !important;
    }
    .pagination-item a { color: var(--heading) !important; }
    .pagination-item-title {
      color: var(--heading) !important;
      font-weight: 600 !important;
      font-size: 14px !important;
    }
    .pagination-item-subtitle {
      color: var(--text-dim) !important;
      font-size: 12px !important;
    }
    .pagination-item-label {
      color: var(--text-dim) !important;
      font-size: 11px !important;
      text-transform: uppercase !important;
      letter-spacing: 1px !important;
      font-family: 'JetBrains Mono', monospace !important;
    }
    .docsify-pagination-container {
      border-top: 1px solid var(--border) !important;
      margin-top: 48px !important;
      padding-top: 24px !important;
    }

    /* ==================================================
       SCROLLBAR
       ================================================== */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }

    /* ==================================================
       LOADING
       ================================================== */
    #loading {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 9999;
    }

    /* ==================================================
       RESPONSIVE
       ================================================== */
    @media screen and (max-width: 768px) {
      .content { padding: 20px 16px 80px !important; }
      .markdown-section h1 { font-size: 24px !important; }
      .markdown-section h2 { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <div id="loading">Loading...</div>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'LLD Playbook',
      repo: '',
      basePath: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? '/'
        : '/lld-playbook/',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'home.md',
      coverpage: false,
      onlyCover: false,
      themeColor: '#6366f1',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results',
        depth: 6
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true,
      },
      notFoundPage: true,
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    }

    window.addEventListener('load', function() {
      setTimeout(function() {
        var loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.3s';
          setTimeout(function() { loading.remove(); }, 300);
        }
      }, 200);
    });
  </script>

  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#2a2e3d',
        primaryBorderColor: '#6366f1',
        primaryTextColor: '#edf0f7',
        lineColor: '#6c7186',
        secondaryColor: '#181b23',
        tertiaryColor: '#1e2130'
      }
    });

    var defined = false;
    function renderMermaid() {
      document.querySelectorAll('.mermaid').forEach(function(el, i) {
        if (el.getAttribute('data-processed')) return;
        try {
          mermaid.render('mermaid-svg-' + Date.now() + '-' + i, el.textContent, function(svg) {
            el.innerHTML = svg;
            el.setAttribute('data-processed', 'true');
          });
        } catch(e) {}
      });
    }

    if (window.$docsify) {
      window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
        hook.doneEach(function() {
          renderMermaid();
        });
      });
    }
  </script>

  <!-- Docsify core + plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>

  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
