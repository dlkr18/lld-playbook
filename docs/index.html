<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interview Playbook — LLD, HLD, DSA &amp; AI</title>
  <meta name="description" content="SDE2/SDE3 interview prep — LLD problems in Java, HLD cheat sheets, DSA practice, and AI/LLM topics.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Interview Playbook — LLD, HLD, DSA &amp; AI">
  <meta property="og:description" content="52 LLD problems. 180+ cheat sheets. 509 DSA practice questions.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="playbook.css">

  <script>
    (function () {
      var t = 'dark';
      try {
        var s = localStorage.getItem('playbook-theme');
        if (s === 'light' || s === 'dark') t = s;
        else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) t = 'light';
      } catch (e) {}
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div id="loading">Loading...</div>
  <div id="app"></div>

  <script src="playbook-paths.js"></script>
  <script>
    window.$docsify = {
      name: 'Interview Playbook',
      repo: '',
      basePath: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? '/'
        : '/lld-playbook/',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'home.md',
      coverpage: false,
      themeColor: '#5cc4fc',
      alias: window.PlaybookPaths ? window.PlaybookPaths.alias() : {},
      noCompileLinks: [
        'cheatsheets/.*'
      ],
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs…',
        noData: 'No results',
        depth: 4
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true
      },
      notFoundPage: true,
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    };

    window.addEventListener('load', function() {
      setTimeout(function() {
        var loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.3s';
          setTimeout(function() { loading.remove(); }, 300);
        }
      }, 150);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@9.4.3/dist/mermaid.min.js"></script>
  <script src="mermaid-init.js?v=3"></script>
  <script>
    if (window.$docsify) {
      window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
        hook.doneEach(function() {
          setTimeout(function() {
            if (window.renderMermaid) {
              window.renderMermaid();
            }
          }, 80);
          var path = (window.location.hash || '#/').replace(/^#\/?/, '').split('?')[0];
          var isHome = path === '' || path === 'home' || path === 'home.md';
          var isCatalog = path === 'problems/CATALOG' || path === 'problems/CATALOG.md';
          document.body.classList.toggle('page-home', isHome);
          document.body.classList.toggle('page-catalog', isCatalog);
        });
        hook.ready(function() {
          if (window.configureMermaid) window.configureMermaid();
          if (window.renderMermaid) window.renderMermaid();
          if (window.PlaybookTheme) {
            window.PlaybookTheme.set(window.PlaybookTheme.get(), false);
          }
          var path = (window.location.hash || '#/').replace(/^#\/?/, '').split('?')[0];
          if (path === '' || path === 'home' || path === 'home.md') {
            document.body.classList.add('page-home');
          }
          /* redirect legacy short paths: #/tictactoe/README → #/problems/tictactoe/README */
          if (window.PlaybookPaths && path.indexOf('problems/') !== 0) {
            var parts = path.split('/');
            var slug = parts[0];
            if (window.PlaybookPaths.slugs.indexOf(slug) !== -1) {
              var rest = parts.slice(1).join('/');
              var target = '/problems/' + slug + (rest ? '/' + rest : '/README');
              if (window.location.hash.replace(/^#\/?/, '').split('?')[0] !== target.replace(/^\//, '')) {
                window.location.replace('#/' + target);
              }
            }
          }
        });
      });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
