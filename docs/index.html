<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LLD Playbook - Master Low-Level Design & Land Your Dream Job</title>
  <meta name="description" content="Complete 4-week LLD curriculum with 44 real-world problems, 23 design patterns, Java implementations.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="LLD Playbook - Master Low-Level Design">
  <meta property="og:description" content="44 problems. 23 design patterns. Land your dream job.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    :root {
      --bg: #0f1117;
      --bg-card: #181b23;
      --bg-code: #1e2130;
      --border: #2a2e3d;
      --text: #c9cdd8;
      --text-dim: #6c7186;
      --heading: #edf0f7;
      --accent: #6366f1;
      --accent2: #38bdf8;
      --accent3: #4ade80;
      --accent4: #f472b6;
      --accent5: #a78bfa;
      --sidebar-width: 280px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Inter', -apple-system, sans-serif !important;
      background: var(--bg) !important;
      color: var(--text) !important;
      line-height: 1.7;
    }

    /* ---- SIDEBAR ---- */
    .sidebar {
      background: var(--bg-card) !important;
      border-right: 1px solid var(--border) !important;
      box-shadow: none !important;
    }

    .app-name-link {
      display: block !important;
      padding: 28px 20px !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 16px !important;
      font-weight: 700 !important;
      color: var(--accent) !important;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid var(--border) !important;
      text-decoration: none !important;
      background: none !important;
      -webkit-text-fill-color: var(--accent) !important;
    }

    .sidebar-nav { padding: 16px 12px !important; }
    .sidebar-nav ul { list-style: none !important; padding: 0 !important; margin: 0 !important; }
    .sidebar-nav li { margin: 1px 0 !important; }

    .sidebar-nav > ul > li > a,
    .sidebar-nav > ul > li > p {
      display: block !important;
      padding: 6px 14px !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      color: var(--heading) !important;
      border-radius: 6px !important;
      transition: all 0.15s !important;
      text-decoration: none !important;
    }

    .sidebar-nav > ul > li > p {
      color: var(--text-dim) !important;
      font-size: 11px !important;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-family: 'JetBrains Mono', monospace !important;
      margin-top: 16px !important;
      padding-left: 14px !important;
    }

    .sidebar-nav ul ul li a {
      padding: 4px 14px 4px 28px !important;
      font-size: 13px !important;
      color: var(--text-dim) !important;
      border-radius: 6px !important;
      transition: all 0.15s !important;
      text-decoration: none !important;
      font-weight: 400 !important;
    }

    .sidebar-nav ul ul li a:hover {
      color: var(--heading) !important;
      background: rgba(99,102,241,0.08) !important;
    }

    .sidebar-nav li.active > a {
      color: var(--accent) !important;
      background: rgba(99,102,241,0.1) !important;
      font-weight: 600 !important;
    }

    .sidebar-toggle { background: var(--bg-card) !important; }
    .sidebar-toggle span { background: var(--text-dim) !important; }

    /* ---- SEARCH ---- */
    .search { padding: 16px 12px !important; border-bottom: 1px solid var(--border) !important; }
    .search input {
      width: 100% !important;
      background: var(--bg) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 10px 14px !important;
      color: var(--heading) !important;
      font-size: 13px !important;
      font-family: 'Inter', sans-serif !important;
      outline: none !important;
    }
    .search input:focus { border-color: var(--accent) !important; }
    .search input::placeholder { color: var(--text-dim) !important; }
    .search .results-panel { background: var(--bg-card) !important; border: 1px solid var(--border) !important; }
    .search .matching-post { border-bottom: 1px solid var(--border) !important; }
    .search a { color: var(--heading) !important; }
    .search a:hover { color: var(--accent) !important; }

    /* ---- CONTENT ---- */
    .content { padding: 48px 48px 120px !important; }

    .markdown-section {
      max-width: 860px !important;
      margin: 0 auto !important;
    }

    /* ---- TYPOGRAPHY ---- */
    .markdown-section h1 {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 32px !important;
      font-weight: 700 !important;
      color: var(--heading) !important;
      letter-spacing: -1px !important;
      margin: 48px 0 16px !important;
      line-height: 1.2 !important;
      background: none !important;
      -webkit-text-fill-color: var(--heading) !important;
    }

    .markdown-section h2 {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 20px !important;
      font-weight: 700 !important;
      color: var(--heading) !important;
      margin: 40px 0 16px !important;
      padding-bottom: 10px !important;
      border-bottom: 2px solid var(--accent) !important;
      border-top: none !important;
      display: inline-block !important;
      padding-top: 0 !important;
    }

    .markdown-section h3 {
      font-size: 16px !important;
      font-weight: 600 !important;
      color: var(--accent2) !important;
      margin: 24px 0 12px !important;
    }

    .markdown-section h4 {
      font-size: 14px !important;
      font-weight: 600 !important;
      color: var(--accent5) !important;
      margin: 20px 0 8px !important;
    }

    .markdown-section p {
      font-size: 15px !important;
      line-height: 1.7 !important;
      color: var(--text) !important;
      margin: 12px 0 !important;
    }

    .markdown-section strong { color: var(--heading) !important; font-weight: 600 !important; }
    .markdown-section em { color: var(--text) !important; }

    /* ---- LINKS ---- */
    .markdown-section a {
      color: var(--accent) !important;
      text-decoration: none !important;
      font-weight: 500 !important;
      transition: color 0.15s !important;
    }
    .markdown-section a:hover {
      color: var(--accent5) !important;
      text-decoration: underline !important;
    }

    /* ---- CODE ---- */
    .markdown-section code {
      background: var(--bg-code) !important;
      color: var(--accent2) !important;
      padding: 2px 7px !important;
      border-radius: 4px !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 0.85em !important;
      font-weight: 400 !important;
      border: none !important;
    }

    .markdown-section pre {
      background: var(--bg-code) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 16px 20px !important;
      margin: 16px 0 !important;
      overflow-x: auto !important;
      box-shadow: none !important;
    }

    .markdown-section pre > code,
    .markdown-section pre code {
      background: transparent !important;
      color: var(--text) !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 13px !important;
      line-height: 1.6 !important;
      padding: 0 !important;
      border-radius: 0 !important;
    }

    /* Prism tokens */
    .token.comment, .token.prolog, .token.doctype, .token.cdata { color: var(--text-dim) !important; font-style: italic !important; }
    .token.keyword, .token.tag, .token.boolean, .token.constant { color: var(--accent4) !important; }
    .token.string, .token.attr-value { color: var(--accent3) !important; }
    .token.function, .token.method { color: #4ade80 !important; }
    .token.number { color: #f59e42 !important; }
    .token.operator, .token.punctuation { color: var(--accent2) !important; }
    .token.class-name, .token.attr-name { color: var(--accent2) !important; }
    .token.variable { color: var(--accent5) !important; }
    .token.annotation { color: var(--accent4) !important; }

    /* ---- TABLES ---- */
    .markdown-section table {
      width: 100% !important;
      border-collapse: collapse !important;
      border-spacing: 0 !important;
      border: none !important;
      border-radius: 0 !important;
      margin: 16px 0 !important;
      font-size: 14px !important;
      box-shadow: none !important;
      overflow: visible !important;
    }

    .markdown-section thead { background: var(--bg-code) !important; }

    .markdown-section th {
      padding: 10px 14px !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 12px !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 1px !important;
      color: var(--accent) !important;
      text-align: left !important;
      border-bottom: 2px solid var(--border) !important;
      background: var(--bg-code) !important;
    }

    .markdown-section td {
      padding: 10px 14px !important;
      color: var(--text) !important;
      border-bottom: 1px solid var(--border) !important;
      font-size: 14px !important;
      vertical-align: top !important;
    }

    .markdown-section tbody tr:hover { background: rgba(99,102,241,0.04) !important; }
    .markdown-section tbody tr:last-child td { border-bottom: none !important; }

    /* ---- LISTS ---- */
    .markdown-section ul, .markdown-section ol {
      padding-left: 20px !important;
      margin: 8px 0 !important;
    }
    .markdown-section li {
      margin: 4px 0 !important;
      color: var(--text) !important;
      line-height: 1.7 !important;
    }
    .markdown-section li::marker { color: var(--accent) !important; }

    /* ---- BLOCKQUOTES ---- */
    .markdown-section blockquote {
      border-left: 3px solid var(--accent) !important;
      background: rgba(99,102,241,0.05) !important;
      padding: 12px 16px !important;
      margin: 16px 0 !important;
      border-radius: 0 8px 8px 0 !important;
    }
    .markdown-section blockquote p {
      color: var(--text) !important;
      font-style: normal !important;
      margin: 0 !important;
    }

    /* ---- HR ---- */
    .markdown-section hr {
      border: none !important;
      border-top: 1px solid var(--border) !important;
      margin: 32px 0 !important;
    }

    /* ---- COPY BUTTON ---- */
    .docsify-copy-code-button {
      background: var(--accent) !important;
      color: white !important;
      border: none !important;
      border-radius: 4px !important;
      padding: 4px 10px !important;
      font-size: 11px !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.5px !important;
    }
    .docsify-copy-code-button:hover { background: var(--accent5) !important; }

    /* ---- PAGINATION ---- */
    .pagination-item {
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 16px !important;
      background: var(--bg-card) !important;
      transition: all 0.15s !important;
    }
    .pagination-item:hover {
      border-color: var(--accent) !important;
      transform: translateY(-1px) !important;
    }
    .pagination-item-title { color: var(--heading) !important; font-weight: 600 !important; }
    .pagination-item-subtitle { color: var(--text-dim) !important; }
    .pagination-item-label { color: var(--text-dim) !important; }

    /* ---- SCROLLBAR ---- */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ---- LOADING ---- */
    #loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; font-weight: 700;
      color: var(--accent);
      z-index: 9999;
    }

    /* ---- RESPONSIVE ---- */
    @media screen and (max-width: 768px) {
      .content { padding: 24px 16px 80px !important; }
      .markdown-section h1 { font-size: 24px !important; }
      .markdown-section h2 { font-size: 18px !important; }
    }
  </style>
</head>
<body>
  <div id="loading">Loading...</div>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'LLD Playbook',
      repo: '',
      basePath: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? '/'
        : '/lld-playbook/',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'home.md',
      coverpage: false,
      onlyCover: false,
      themeColor: '#6366f1',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results',
        depth: 6
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true,
      },
      notFoundPage: true,
    }

    window.addEventListener('load', function() {
      setTimeout(() => {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.3s';
          setTimeout(() => loading.remove(), 300);
        }
      }, 200);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
