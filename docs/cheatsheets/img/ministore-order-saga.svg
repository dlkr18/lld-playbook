<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1235" viewBox="0 0 2140 1235">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
  </defs>

  <rect width="2140" height="1235" fill="#ffffff"/>

  <!-- ═════════ TITLE ═════════ -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="46" fill="#1e40af" text-anchor="middle" font-weight="bold">ORDER PLACEMENT — THE SAGA (all-or-nothing)</text>
  <path d="M560,68 Q1070,84 1580,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ═════════ START DOT ═════════ -->
  <circle cx="26" cy="300" r="12" fill="#111"/>
  <path d="M38,300 L48,300" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- CART -->
  <rect x="50" y="210" width="250" height="190" rx="12" fill="none" stroke="#6b7280" stroke-width="3"/>
  <text x="175" y="242" font-family="Chalkboard SE" font-size="18" fill="#6b7280" text-anchor="middle" font-weight="bold">CART &#183; 1 store</text>
  <path d="M64,254 L286,254" stroke="#6b7280" stroke-width="2"/>
  <text x="70" y="282" font-family="Chalkboard SE" font-size="14" fill="#111">2&#215; Beans @ $24.00</text>
  <text x="70" y="306" font-family="Chalkboard SE" font-size="14" fill="#111">1&#215; Mug @ $12.50</text>
  <text x="70" y="332" font-family="Chalkboard SE" font-size="14" fill="#111" font-weight="bold">total = $60.50</text>
  <text x="70" y="362" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">a wish-list —</text>
  <text x="70" y="382" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">no stock held yet</text>

  <!-- flow arrow CART -> VALIDATE -->
  <path d="M300,300 L344,300" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- ① VALIDATE -->
  <circle cx="372" cy="188" r="15" fill="#fff" stroke="#2563eb" stroke-width="2.8"/>
  <text x="372" y="194" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <rect x="350" y="210" width="320" height="190" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="510" y="244" font-family="Chalkboard SE" font-size="18" fill="#2563eb" text-anchor="middle" font-weight="bold">VALIDATE ALL LINES</text>
  <path d="M364,256 L656,256" stroke="#2563eb" stroke-width="2"/>
  <text x="370" y="282" font-family="Chalkboard SE" font-size="14" fill="#111">for each cart line:</text>
  <text x="370" y="306" font-family="Chalkboard SE" font-size="14" fill="#111">qty &#8804; inventory.available ?</text>
  <text x="370" y="334" font-family="Chalkboard SE" font-size="14.5" fill="#dc2626" font-weight="bold">NO MUTATION yet</text>
  <text x="370" y="362" font-family="Chalkboard SE" font-size="13" fill="#6b7280">shortage on ANY line &#8658; abort,</text>
  <text x="370" y="382" font-family="Chalkboard SE" font-size="13" fill="#6b7280">nothing has been deducted</text>

  <!-- flow arrow VALIDATE -> DEDUCT -->
  <path d="M670,300 L714,300" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- ② DEDUCT -->
  <circle cx="742" cy="188" r="15" fill="#fff" stroke="#2563eb" stroke-width="2.8"/>
  <text x="742" y="194" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">2</text>
  <rect x="720" y="210" width="300" height="190" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="870" y="244" font-family="Chalkboard SE" font-size="18" fill="#2563eb" text-anchor="middle" font-weight="bold">DEDUCT ALL</text>
  <path d="M734,256 L1006,256" stroke="#2563eb" stroke-width="2"/>
  <text x="740" y="282" font-family="Chalkboard SE" font-size="14" fill="#111">inventory.deduct(qty,</text>
  <text x="740" y="306" font-family="Chalkboard SE" font-size="14" fill="#111">&#160;&#160;productName) per line</text>
  <text x="740" y="332" font-family="Chalkboard SE" font-size="13" fill="#6b7280">guard = ultimate backstop</text>
  <text x="740" y="360" font-family="Chalkboard SE" font-size="14" fill="#111">build Order &#8594; PENDING</text>
  <text x="740" y="384" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">stock now reserved</text>

  <!-- flow arrow DEDUCT -> CHARGE -->
  <path d="M1020,300 L1064,300" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- ③ CHARGE -->
  <circle cx="1092" cy="188" r="15" fill="#fff" stroke="#ea580c" stroke-width="2.8"/>
  <text x="1092" y="194" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">3</text>
  <rect x="1070" y="210" width="320" height="190" rx="12" fill="none" stroke="#ea580c" stroke-width="3.2"/>
  <text x="1230" y="244" font-family="Chalkboard SE" font-size="18" fill="#ea580c" text-anchor="middle" font-weight="bold">CHARGE (gateway)</text>
  <path d="M1084,256 L1376,256" stroke="#ea580c" stroke-width="2"/>
  <text x="1090" y="282" font-family="Chalkboard SE" font-size="14" fill="#111">paymentGateway.charge(</text>
  <text x="1090" y="306" font-family="Chalkboard SE" font-size="14" fill="#111">&#160;&#160;PaymentRequest{</text>
  <text x="1090" y="330" font-family="Chalkboard SE" font-size="14" fill="#111">&#160;&#160;&#160;&#160;orderId, total})</text>
  <text x="1090" y="358" font-family="Chalkboard SE" font-size="13" fill="#ea580c" font-weight="bold">pluggable Strategy</text>
  <text x="1090" y="382" font-family="Chalkboard SE" font-size="14" fill="#111">&#8594; PaymentResult</text>

  <!-- flow arrow CHARGE -> diamond -->
  <path d="M1390,300 L1456,300" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- DECISION diamond -->
  <path d="M1460,300 L1560,220 L1660,300 L1560,380 z" fill="none" stroke="#111" stroke-width="3"/>
  <text x="1560" y="296" font-family="Chalkboard SE" font-size="17" fill="#111" text-anchor="middle" font-weight="bold">approved?</text>

  <!-- YES -> APPROVED -->
  <path d="M1660,300 L1686,300" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="1620" y="285" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" font-weight="bold">yes &#10003;</text>

  <circle cx="1712" cy="188" r="16" fill="#fff" stroke="#15803d" stroke-width="2.8"/>
  <text x="1712" y="194" font-family="Chalkboard SE" font-size="14" fill="#15803d" text-anchor="middle" font-weight="bold">4a</text>
  <rect x="1690" y="210" width="390" height="190" rx="12" fill="none" stroke="#15803d" stroke-width="3.2"/>
  <text x="1885" y="244" font-family="Chalkboard SE" font-size="18" fill="#15803d" text-anchor="middle" font-weight="bold">APPROVED &#10003;</text>
  <path d="M1704,256 L2066,256" stroke="#15803d" stroke-width="2"/>
  <text x="1710" y="282" font-family="Chalkboard SE" font-size="14" fill="#111">order.confirm(txnId)</text>
  <text x="1710" y="306" font-family="Chalkboard SE" font-size="14" fill="#111">cart.clear()</text>
  <text x="1710" y="334" font-family="Chalkboard SE" font-size="14.5" fill="#15803d" font-weight="bold">Order &#8594; CONFIRMED</text>
  <text x="1710" y="360" font-family="Chalkboard SE" font-size="13" fill="#6b7280">stock stays deducted</text>
  <text x="1710" y="382" font-family="Chalkboard SE" font-size="13" fill="#6b7280">cart emptied — terminal</text>

  <!-- NO -> RESTOCK (red dashed) -->
  <path d="M1560,380 L1560,438 L1330,438 L1330,466" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="1420" y="428" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">no &#10007; (declined)</text>

  <circle cx="1142" cy="448" r="16" fill="#fff" stroke="#dc2626" stroke-width="2.8"/>
  <text x="1142" y="454" font-family="Chalkboard SE" font-size="14" fill="#dc2626" text-anchor="middle" font-weight="bold">4b</text>
  <rect x="1120" y="470" width="420" height="170" rx="12" fill="none" stroke="#dc2626" stroke-width="3.2"/>
  <text x="1330" y="504" font-family="Chalkboard SE" font-size="17" fill="#dc2626" text-anchor="middle" font-weight="bold">DECLINED &#10007; — COMPENSATE</text>
  <path d="M1134,516 L1526,516" stroke="#dc2626" stroke-width="2"/>
  <text x="1140" y="544" font-family="Chalkboard SE" font-size="14" fill="#111">for each line already deducted:</text>
  <text x="1140" y="570" font-family="Chalkboard SE" font-size="14" fill="#111">inventory.restock(qty)</text>
  <text x="1140" y="598" font-family="Chalkboard SE" font-size="14.5" fill="#dc2626" font-weight="bold">ROLLBACK = undo every deduct</text>
  <text x="1140" y="624" font-family="Chalkboard SE" font-size="13" fill="#6b7280">cart is NOT cleared — retryable</text>

  <!-- RESTOCK -> CANCEL -->
  <path d="M1330,640 L1330,686" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>

  <rect x="1120" y="690" width="420" height="150" rx="12" fill="none" stroke="#dc2626" stroke-width="3.2"/>
  <text x="1330" y="724" font-family="Chalkboard SE" font-size="17" fill="#dc2626" text-anchor="middle" font-weight="bold">order.cancel()</text>
  <path d="M1134,736 L1526,736" stroke="#dc2626" stroke-width="2"/>
  <text x="1140" y="764" font-family="Chalkboard SE" font-size="14.5" fill="#dc2626" font-weight="bold">Order &#8594; CANCELLED</text>
  <text x="1140" y="790" font-family="Chalkboard SE" font-size="14" fill="#111">throw PaymentDeclinedException</text>
  <text x="1140" y="816" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">stock back to EXACT pre-order level &#10003;</text>

  <!-- ═════════ STICKY A: NEVER OVERSELL ═════════ -->
  <g transform="rotate(-2 250 555)">
    <rect x="60" y="465" width="380" height="185" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="80" y="498" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">NEVER OVERSELL = INVARIANT</text>
    <text x="80" y="528" font-family="Chalkboard SE" font-size="14" fill="#713f12">the guard lives INSIDE deduct():</text>
    <text x="80" y="552" font-family="Chalkboard SE" font-size="14" fill="#713f12">qty &gt; available &#8658; throw.</text>
    <text x="80" y="580" font-family="Chalkboard SE" font-size="14" fill="#713f12">impossible to go negative,</text>
    <text x="80" y="604" font-family="Chalkboard SE" font-size="14" fill="#713f12">whatever the caller does.</text>
    <text x="80" y="632" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">not a check — an invariant</text>
  </g>
  <circle cx="250" cy="469" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY B: VALIDATE-BEFORE-DEDUCT ═════════ -->
  <g transform="rotate(1.5 675 555)">
    <rect x="470" y="465" width="410" height="185" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="490" y="498" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">VALIDATE-BEFORE-DEDUCT</text>
    <text x="490" y="526" font-family="Chalkboard SE" font-size="14" fill="#713f12">= atomicity, single-threaded.</text>
    <text x="490" y="552" font-family="Chalkboard SE" font-size="14" fill="#713f12">check ALL lines first, mutate</text>
    <text x="490" y="576" font-family="Chalkboard SE" font-size="14" fill="#713f12">after — a shortage on line 3</text>
    <text x="490" y="600" font-family="Chalkboard SE" font-size="14" fill="#713f12">never half-commits lines 1&#8211;2.</text>
    <text x="490" y="628" font-family="Chalkboard SE" font-size="13" fill="#14532d" font-weight="bold">all-or-nothing without a DB txn</text>
  </g>
  <circle cx="675" cy="469" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY C: CONCURRENCY ═════════ -->
  <g transform="rotate(1.5 1830 575)">
    <rect x="1600" y="470" width="460" height="215" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1620" y="503" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">CONCURRENCY (the #1 follow-up)</text>
    <text x="1620" y="531" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">check-then-deduct RACES under threads:</text>
    <text x="1620" y="555" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">2 orders both read available = 1,</text>
    <text x="1620" y="579" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">both deduct &#8594; oversell.</text>
    <text x="1620" y="607" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">fix: per-item lock (synchronize) or</text>
    <text x="1620" y="631" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">AtomicInteger CAS; multi-line &#8594; lock</text>
    <text x="1620" y="655" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">items in a consistent order (no deadlock).</text>
    <text x="1620" y="679" font-family="Chalkboard SE" font-size="13" fill="#14532d" font-weight="bold">or DB: UPDATE ... WHERE available &#8805; qty</text>
  </g>
  <circle cx="1830" cy="474" r="7" fill="#dc2626"/>

  <!-- ═════════ CODE BOX ═════════ -->
  <rect x="60" y="700" width="1000" height="300" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="80" y="732" font-family="Chalkboard SE" font-size="17" fill="#2563eb" font-weight="bold">MiniStore.placeOrder(storeId, customerId, method) — the saga</text>
  <path d="M74,744 L1046,744" stroke="#2563eb" stroke-width="1.8"/>
  <text x="80" y="772" font-family="Chalkboard SE" font-size="14" fill="#2563eb" font-weight="bold">1  validate</text>
  <text x="200" y="772" font-family="Chalkboard SE" font-size="14" fill="#111">for cl in cart.lines():</text>
  <text x="230" y="796" font-family="Chalkboard SE" font-size="14" fill="#111">p = requireProduct(storeId, cl.productId)  &#8592; tenant guard</text>
  <text x="230" y="820" font-family="Chalkboard SE" font-size="14" fill="#111">if cl.qty &gt; inv.available: throw InsufficientInventory</text>
  <text x="80" y="850" font-family="Chalkboard SE" font-size="14" fill="#2563eb" font-weight="bold">2  deduct</text>
  <text x="200" y="850" font-family="Chalkboard SE" font-size="14" fill="#111">for line: inv[line.pid].deduct(qty, name)</text>
  <text x="80" y="880" font-family="Chalkboard SE" font-size="14" fill="#ea580c" font-weight="bold">3  charge</text>
  <text x="200" y="880" font-family="Chalkboard SE" font-size="14" fill="#111">r = paymentGateway.charge(PaymentRequest{orderId, total})</text>
  <text x="80" y="910" font-family="Chalkboard SE" font-size="14" fill="#15803d" font-weight="bold">4a ok</text>
  <text x="200" y="910" font-family="Chalkboard SE" font-size="14" fill="#111">if r.approved: order.confirm(r.txnId); cart.clear()</text>
  <text x="80" y="940" font-family="Chalkboard SE" font-size="14" fill="#dc2626" font-weight="bold">4b fail</text>
  <text x="200" y="940" font-family="Chalkboard SE" font-size="14" fill="#111">else: for line: inv[line.pid].restock(qty)   &#8592; ROLLBACK</text>
  <text x="230" y="964" font-family="Chalkboard SE" font-size="14" fill="#111">order.cancel(); throw PaymentDeclinedException</text>
  <text x="80" y="990" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">payment failure leaves inventory EXACTLY as it was — the compensating transaction</text>

  <!-- ═════════ WHITEBOARD ORDER ═════════ -->
  <text x="60" y="1035" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="1035" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; validate ALL lines (no mutation) &#8594; &#9313; deduct ALL &#8594; &#9314; charge (pluggable) &#8594; approved? &#9315;a confirm + clear cart&#160;&#160;|&#160;&#160;&#9315;b restock ROLLBACK + cancel</text>

  <!-- ═════════ LEGEND ═════════ -->
  <rect x="60" y="1065" width="2020" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="1127" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="240" y="1101" width="24" height="24" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/><text x="274" y="1119">cart (input)</text>
    <rect x="240" y="1147" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="274" y="1165">validate / deduct</text>
    <rect x="470" y="1101" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="504" y="1119">charge (gateway)</text>
    <rect x="470" y="1147" width="24" height="24" rx="5" fill="none" stroke="#15803d" stroke-width="3"/><text x="504" y="1165">approved / confirmed</text>
    <rect x="720" y="1101" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="754" y="1119">declined / rollback</text>
    <rect x="720" y="1147" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="754" y="1165">interview insight</text>
    <path d="M970,1113 L1040,1113" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/><text x="1054" y="1119">happy-path flow</text>
    <path d="M970,1159 L1040,1159" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/><text x="1054" y="1165">rollback / failure path</text>
    <circle cx="1320" cy="1113" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1320" y="1118" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1344" y="1119">saga step</text>
    <path d="M1288,1159 L1310,1145 L1332,1159 L1310,1173 z" fill="none" stroke="#111" stroke-width="2.4"/>
    <text x="1348" y="1165">decision</text>
    <text x="1560" y="1119" fill="#6b7280">validate&#8594;deduct&#8594;charge&#8594;(confirm | rollback)</text>
    <text x="1560" y="1165" fill="#6b7280">Mini-Store — atomic multi-line order (compensating txn)</text>
  </g>
</svg>
