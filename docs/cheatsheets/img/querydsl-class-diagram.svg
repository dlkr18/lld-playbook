<svg xmlns="http://www.w3.org/2000/svg" width="2040" height="1300" viewBox="0 0 2040 1300" font-family="Menlo, 'JetBrains Mono', monospace">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <path d="M0,0 L10,4.5 L0,9 z" fill="#8a90a8"/>
    </marker>
    <marker id="tri" markerWidth="16" markerHeight="14" refX="14" refY="7" orient="auto">
      <path d="M1,1 L14,7 L1,13 z" fill="#181b23" stroke="#8a90a8" stroke-width="1.6"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="10" refX="1" refY="5" orient="auto">
      <path d="M1,5 L9,1 L17,5 L9,9 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect width="2040" height="1300" fill="#181b23"/>

  <!-- ═══════════ layer bands ═══════════ -->
  <rect x="40" y="40" width="1960" height="192" rx="12" fill="rgba(167,139,250,0.055)" stroke="rgba(167,139,250,0.25)"/>
  <text x="64" y="74" font-size="12.5" fill="#a78bfa" letter-spacing="2.5" font-weight="bold">FACADE — ONE ENTRY POINT</text>

  <rect x="40" y="270" width="740" height="970" rx="12" fill="rgba(56,189,248,0.05)" stroke="rgba(56,189,248,0.25)"/>
  <text x="64" y="304" font-size="12.5" fill="#38bdf8" letter-spacing="2.5" font-weight="bold">MODEL — THE AST (ZERO BACKEND KNOWLEDGE)</text>

  <rect x="810" y="270" width="420" height="970" rx="12" fill="rgba(74,222,128,0.05)" stroke="rgba(74,222,128,0.25)"/>
  <text x="834" y="304" font-size="12.5" fill="#4ade80" letter-spacing="2.5" font-weight="bold">SERVICE — THE SEAMS</text>

  <rect x="1260" y="270" width="740" height="970" rx="12" fill="rgba(245,166,35,0.05)" stroke="rgba(245,166,35,0.25)"/>
  <text x="1310" y="304" font-size="12.5" fill="#f5a623" letter-spacing="2.5" font-weight="bold">IMPL — PLUGGABLE BACKENDS</text>

  <!-- ═══════════ FACADE: QueryEngine ═══════════ -->
  <g>
    <rect x="790" y="72" width="460" height="140" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.5"/>
    <rect x="790" y="72" width="460" height="4" rx="2" fill="#a78bfa"/>
    <text x="1020" y="100" font-size="16" fill="#edf0f7" font-weight="bold" text-anchor="middle">QueryEngine</text>
    <line x1="806" y1="112" x2="1234" y2="112" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="810" y="134" font-size="12.5" fill="#c9cdd8">+registerTable(schema, rows)</text>
    <text x="810" y="156" font-size="12.5" fill="#c9cdd8">+execute(request): QueryResponse</text>
    <text x="810" y="178" font-size="12.5" fill="#c9cdd8">+toSql(query): SqlStatement</text>
    <text x="810" y="200" font-size="12.5" fill="#c9cdd8">+toMongo(query): String</text>
  </g>

  <!-- ═══════════ MODEL boxes ═══════════ -->
  <!-- Query -->
  <g>
    <rect x="140" y="340" width="340" height="176" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.5"/>
    <rect x="140" y="340" width="340" height="4" rx="2" fill="#38bdf8"/>
    <text x="310" y="368" font-size="16" fill="#edf0f7" font-weight="bold" text-anchor="middle">Query</text>
    <line x1="156" y1="380" x2="464" y2="380" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="160" y="402" font-size="12.5" fill="#c9cdd8">-source: String</text>
    <text x="160" y="424" font-size="12.5" fill="#c9cdd8">-select: List&lt;String&gt;</text>
    <text x="160" y="446" font-size="12.5" fill="#c9cdd8">-where: Condition</text>
    <text x="160" y="468" font-size="12.5" fill="#c9cdd8">-sorts: List&lt;SortSpec&gt;</text>
    <text x="160" y="490" font-size="12.5" fill="#c9cdd8">-page: Page</text>
  </g>

  <!-- Condition interface -->
  <g>
    <rect x="140" y="620" width="340" height="100" rx="8" fill="#1e2130" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="310" y="644" font-size="12" fill="#6c7186" font-style="italic" text-anchor="middle">&#171;interface&#187;</text>
    <text x="310" y="668" font-size="16" fill="#edf0f7" font-weight="bold" text-anchor="middle">Condition</text>
    <line x1="156" y1="680" x2="464" y2="680" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="160" y="702" font-size="12.5" fill="#c9cdd8">+accept(v: ConditionVisitor&lt;T&gt;): T</text>
  </g>

  <!-- where composition -->
  <path d="M310,516 L310,618" stroke="#8a90a8" stroke-width="1.6" fill="none" marker-start="url(#diamond)"/>
  <text x="322" y="572" font-size="11.5" fill="#8a90a8">where</text>

  <!-- Comparison -->
  <g>
    <rect x="90" y="850" width="215" height="132" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.5"/>
    <rect x="90" y="850" width="215" height="4" rx="2" fill="#38bdf8"/>
    <text x="197" y="878" font-size="15" fill="#edf0f7" font-weight="bold" text-anchor="middle">Comparison</text>
    <line x1="104" y1="890" x2="291" y2="890" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="106" y="912" font-size="12" fill="#c9cdd8">-field: String</text>
    <text x="106" y="934" font-size="12" fill="#c9cdd8">-op: Operator</text>
    <text x="106" y="956" font-size="12" fill="#c9cdd8">-values: List&lt;Object&gt;</text>
  </g>

  <!-- LogicalCondition -->
  <g>
    <rect x="330" y="850" width="235" height="110" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.5"/>
    <rect x="330" y="850" width="235" height="4" rx="2" fill="#38bdf8"/>
    <text x="447" y="878" font-size="15" fill="#edf0f7" font-weight="bold" text-anchor="middle">LogicalCondition</text>
    <line x1="344" y1="890" x2="551" y2="890" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="346" y="912" font-size="12" fill="#c9cdd8">-op: AND / OR</text>
    <text x="346" y="934" font-size="12" fill="#c9cdd8">-children: List&lt;Condition&gt;</text>
  </g>

  <!-- NotCondition -->
  <g>
    <rect x="590" y="850" width="180" height="88" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.5"/>
    <rect x="590" y="850" width="180" height="4" rx="2" fill="#38bdf8"/>
    <text x="680" y="878" font-size="15" fill="#edf0f7" font-weight="bold" text-anchor="middle">NotCondition</text>
    <line x1="604" y1="890" x2="756" y2="890" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="606" y="912" font-size="12" fill="#c9cdd8">-child: Condition</text>
  </g>

  <!-- implements fan-in to Condition -->
  <path d="M197,850 L253,722" stroke="#8a90a8" stroke-width="1.6" stroke-dasharray="7,5" fill="none" marker-end="url(#tri)"/>
  <path d="M447,850 L312,722" stroke="#8a90a8" stroke-width="1.6" stroke-dasharray="7,5" fill="none" marker-end="url(#tri)"/>
  <path d="M680,850 L370,722" stroke="#8a90a8" stroke-width="1.6" stroke-dasharray="7,5" fill="none" marker-end="url(#tri)"/>

  <!-- recursion note -->
  <text x="90" y="1040" font-size="12" fill="#6c7186" font-style="italic">children / child hold Conditions &#8594; the tree is a recursive Composite.</text>
  <text x="90" y="1062" font-size="12" fill="#6c7186" font-style="italic">Operator arity is validated in Comparison's constructor (fail fast).</text>

  <!-- ═══════════ SERVICE boxes ═══════════ -->
  <!-- QueryTranslator -->
  <g>
    <rect x="850" y="340" width="340" height="100" rx="8" fill="#1e2130" stroke="#4ade80" stroke-width="1.5"/>
    <text x="1020" y="364" font-size="12" fill="#6c7186" font-style="italic" text-anchor="middle">&#171;interface&#187;</text>
    <text x="1020" y="388" font-size="16" fill="#edf0f7" font-weight="bold" text-anchor="middle">QueryTranslator&lt;T&gt;</text>
    <line x1="866" y1="400" x2="1174" y2="400" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="870" y="422" font-size="12.5" fill="#c9cdd8">+translate(q: Query): T</text>
  </g>

  <!-- ConditionVisitor -->
  <g>
    <rect x="850" y="620" width="340" height="140" rx="8" fill="#1e2130" stroke="#4ade80" stroke-width="1.5"/>
    <text x="1020" y="644" font-size="12" fill="#6c7186" font-style="italic" text-anchor="middle">&#171;interface&#187;</text>
    <text x="1020" y="668" font-size="16" fill="#edf0f7" font-weight="bold" text-anchor="middle">ConditionVisitor&lt;T&gt;</text>
    <line x1="866" y1="680" x2="1174" y2="680" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="870" y="702" font-size="12.5" fill="#c9cdd8">+visitComparison(c): T</text>
    <text x="870" y="724" font-size="12.5" fill="#c9cdd8">+visitLogical(l): T</text>
    <text x="870" y="746" font-size="12.5" fill="#c9cdd8">+visitNot(n): T</text>
  </g>

  <!-- QueryService -->
  <g>
    <rect x="850" y="900" width="340" height="100" rx="8" fill="#1e2130" stroke="#4ade80" stroke-width="1.5"/>
    <text x="1020" y="924" font-size="12" fill="#6c7186" font-style="italic" text-anchor="middle">&#171;interface&#187;</text>
    <text x="1020" y="948" font-size="16" fill="#edf0f7" font-weight="bold" text-anchor="middle">QueryService</text>
    <line x1="866" y1="960" x2="1174" y2="960" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="870" y="982" font-size="12.5" fill="#c9cdd8">+execute(req): QueryResponse</text>
  </g>

  <!-- api note -->
  <g>
    <rect x="850" y="1080" width="340" height="112" rx="8" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-dasharray="6,5" opacity="0.8"/>
    <text x="1020" y="1110" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="bold">api/ — wire envelopes</text>
    <text x="1020" y="1138" font-size="12" fill="#8a90a8" text-anchor="middle">QueryRequest &#183; QueryResponse</text>
    <text x="1020" y="1160" font-size="12" fill="#8a90a8" text-anchor="middle">QueryError &#183; ExecutionStats</text>
  </g>
  <path d="M1020,1000 L1020,1077" stroke="#8a90a8" stroke-width="1.4" stroke-dasharray="3,4" fill="none" marker-end="url(#arrow)"/>
  <text x="1032" y="1044" font-size="11.5" fill="#8a90a8">in / out</text>

  <!-- seam -> model arrows -->
  <path d="M850,390 L484,390" stroke="#8a90a8" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="545" y="378" font-size="11.5" fill="#8a90a8">translate(query)</text>
  <path d="M850,690 L484,690" stroke="#8a90a8" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="510" y="678" font-size="11.5" fill="#8a90a8">walks the AST (double dispatch)</text>

  <!-- ═══════════ IMPL boxes ═══════════ -->
  <!-- SqlTranslator -->
  <g>
    <rect x="1320" y="340" width="300" height="110" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.5"/>
    <rect x="1320" y="340" width="300" height="4" rx="2" fill="#f5a623"/>
    <text x="1470" y="368" font-size="15" fill="#edf0f7" font-weight="bold" text-anchor="middle">SqlTranslator</text>
    <line x1="1336" y1="380" x2="1604" y2="380" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="1340" y="402" font-size="12" fill="#c9cdd8">+translate(q): SqlStatement</text>
    <text x="1340" y="424" font-size="11.5" fill="#6c7186" font-style="italic">'?' binds + identifier whitelist</text>
  </g>

  <!-- SqlStatement -->
  <g>
    <rect x="1660" y="340" width="300" height="110" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.5"/>
    <rect x="1660" y="340" width="300" height="4" rx="2" fill="#f5a623"/>
    <text x="1810" y="368" font-size="15" fill="#edf0f7" font-weight="bold" text-anchor="middle">SqlStatement</text>
    <line x1="1676" y1="380" x2="1944" y2="380" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="1680" y="402" font-size="12" fill="#c9cdd8">-sql: String</text>
    <text x="1680" y="424" font-size="12" fill="#c9cdd8">-params: List&lt;Object&gt;</text>
  </g>
  <path d="M1620,395 L1656,395" stroke="#8a90a8" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- MongoTranslator -->
  <g>
    <rect x="1320" y="480" width="300" height="110" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.5"/>
    <rect x="1320" y="480" width="300" height="4" rx="2" fill="#f5a623"/>
    <text x="1470" y="508" font-size="15" fill="#edf0f7" font-weight="bold" text-anchor="middle">MongoTranslator</text>
    <line x1="1336" y1="520" x2="1604" y2="520" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="1340" y="542" font-size="12" fill="#c9cdd8">+translate(q): String</text>
    <text x="1340" y="564" font-size="11.5" fill="#6c7186" font-style="italic">find({...}) command &#8212; Open/Closed proof</text>
  </g>

  <!-- PredicateBuilder -->
  <g>
    <rect x="1660" y="620" width="300" height="110" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.5"/>
    <rect x="1660" y="620" width="300" height="4" rx="2" fill="#f5a623"/>
    <text x="1810" y="648" font-size="15" fill="#edf0f7" font-weight="bold" text-anchor="middle">PredicateBuilder</text>
    <line x1="1676" y1="660" x2="1944" y2="660" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="1680" y="682" font-size="12" fill="#c9cdd8">+visit*(): Predicate&lt;Map&gt;</text>
    <text x="1680" y="704" font-size="11.5" fill="#6c7186" font-style="italic">the Interpreter &#8212; evaluates per row</text>
  </g>

  <!-- QueryValidator -->
  <g>
    <rect x="1660" y="760" width="300" height="110" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.5"/>
    <rect x="1660" y="760" width="300" height="4" rx="2" fill="#f5a623"/>
    <text x="1810" y="788" font-size="15" fill="#edf0f7" font-weight="bold" text-anchor="middle">QueryValidator</text>
    <line x1="1676" y1="800" x2="1944" y2="800" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="1680" y="822" font-size="12" fill="#c9cdd8">+validate(q, schema): errors</text>
    <text x="1680" y="844" font-size="11.5" fill="#6c7186" font-style="italic">collects ALL errors at once</text>
  </g>

  <!-- InMemoryQueryService -->
  <g>
    <rect x="1660" y="920" width="300" height="132" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.5"/>
    <rect x="1660" y="920" width="300" height="4" rx="2" fill="#f5a623"/>
    <text x="1810" y="948" font-size="15" fill="#edf0f7" font-weight="bold" text-anchor="middle">InMemoryQueryService</text>
    <line x1="1676" y1="960" x2="1944" y2="960" stroke="#2a2e3d" stroke-width="1.2"/>
    <text x="1680" y="982" font-size="12" fill="#c9cdd8">-tables: ConcurrentHashMap</text>
    <text x="1680" y="1004" font-size="12" fill="#c9cdd8">filter&#8594;sort&#8594;count&#8594;page&#8594;project</text>
    <text x="1680" y="1026" font-size="11.5" fill="#6c7186" font-style="italic">stateless per request</text>
  </g>

  <!-- impl -> seam arrows (implements) -->
  <path d="M1320,380 L1196,380" stroke="#8a90a8" stroke-width="1.6" stroke-dasharray="7,5" fill="none" marker-end="url(#tri)"/>
  <path d="M1320,520 L1196,428" stroke="#8a90a8" stroke-width="1.6" stroke-dasharray="7,5" fill="none" marker-end="url(#tri)"/>
  <path d="M1660,675 L1196,675" stroke="#8a90a8" stroke-width="1.6" stroke-dasharray="7,5" fill="none" marker-end="url(#tri)"/>
  <path d="M1660,815 L1196,742" stroke="#8a90a8" stroke-width="1.6" stroke-dasharray="7,5" fill="none" marker-end="url(#tri)"/>
  <path d="M1660,970 L1196,952" stroke="#8a90a8" stroke-width="1.6" stroke-dasharray="7,5" fill="none" marker-end="url(#tri)"/>

  <!-- InMemory uses -->
  <path d="M1760,920 L1760,876" stroke="#8a90a8" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="1772" y="902" font-size="11.5" fill="#8a90a8">validate</text>
  <path d="M1960,975 L1990,975 L1990,700 L1966,700" stroke="#8a90a8" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="2004" y="850" font-size="11.5" fill="#8a90a8" transform="rotate(-90 2004 850)">compile filter</text>

  <!-- ═══════════ facade arrows ═══════════ -->
  <path d="M1250,120 L1470,120 L1470,334" stroke="#a78bfa" stroke-width="1.7" fill="none" marker-end="url(#arrow)" opacity="0.85"/>
  <text x="1290" y="110" font-size="11.5" fill="#a78bfa">toSql</text>
  <path d="M1250,166 L1640,166 L1640,535 L1626,535" stroke="#a78bfa" stroke-width="1.7" fill="none" marker-end="url(#arrow)" opacity="0.85"/>
  <text x="1290" y="156" font-size="11.5" fill="#a78bfa">toMongo</text>
  <path d="M1250,196 L1245,196 L1245,950 L1196,950" stroke="#a78bfa" stroke-width="1.7" fill="none" marker-end="url(#arrow)" opacity="0.85"/>
  <text x="1200" y="936" font-size="11.5" fill="#a78bfa">execute</text>

  <!-- ═══════════ legend ═══════════ -->
  <g>
    <rect x="1660" y="1100" width="300" height="126" rx="8" fill="#1e2130" stroke="#2a2e3d" stroke-width="1.3"/>
    <text x="1680" y="1128" font-size="12.5" fill="#edf0f7" font-weight="bold">Legend</text>
    <path d="M1680,1150 L1740,1150" stroke="#8a90a8" stroke-width="1.6" stroke-dasharray="7,5" fill="none" marker-end="url(#tri)"/>
    <text x="1756" y="1155" font-size="11.5" fill="#c9cdd8">implements</text>
    <path d="M1680,1178 L1744,1178" stroke="#8a90a8" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
    <text x="1756" y="1183" font-size="11.5" fill="#c9cdd8">uses / produces</text>
    <path d="M1682,1206 L1744,1206" stroke="#8a90a8" stroke-width="1.6" fill="none" marker-start="url(#diamond)"/>
    <text x="1756" y="1211" font-size="11.5" fill="#c9cdd8">composition</text>
  </g>
</svg>
