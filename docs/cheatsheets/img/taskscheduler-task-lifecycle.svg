<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1330" viewBox="0 0 2140 1330">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 z" fill="#111"/>
    </marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 z" fill="#15803d"/>
    </marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <marker id="ahp" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 z" fill="#db2777"/>
    </marker>
    <marker id="ahd" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="2140" height="1330" fill="#ffffff"/>

  <!-- ═════════ TITLE ═════════ -->
  <text x="1070" y="48" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">TASK SCHEDULER — TASK LIFECYCLE</text>
  <path d="M690,64 Q1070,80 1450,62" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ═════════ recurring loop (over the top) ═════════ -->
  <path d="M1660,158 C1450,92 720,92 476,154" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="1070" y="142" font-family="Chalkboard SE" font-size="14.5" fill="#15803d" text-anchor="middle" font-weight="bold">recurring task &#8635; reschedule at now + intervalSeconds — back on the queue</text>

  <!-- ═════════ 1: start + SCHEDULED ═════════ -->
  <circle cx="120" cy="235" r="10" fill="#111"/>
  <circle cx="168" cy="200" r="14" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="168" y="207" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <path d="M132,235 L256,235" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="193" y="258" font-family="Chalkboard SE" font-size="12.5" fill="#111" text-anchor="middle">scheduleTask()</text>

  <rect x="260" y="160" width="380" height="150" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="450" y="192" font-family="Chalkboard SE" font-size="19" fill="#2563eb" text-anchor="middle" font-weight="bold">SCHEDULED</text>
  <path d="M276,204 L624,204" stroke="#2563eb" stroke-width="2"/>
  <text x="280" y="228" font-family="Chalkboard SE" font-size="13.5" fill="#111">in taskMap + PriorityQueue</text>
  <text x="280" y="250" font-family="Chalkboard SE" font-size="13.5" fill="#111">order: scheduledTime asc,</text>
  <text x="280" y="272" font-family="Chalkboard SE" font-size="13.5" fill="#111">then Priority.level desc</text>
  <text x="280" y="296" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">waiting for its moment</text>

  <!-- ═════════ 2: SCHEDULED -> RUNNING ═════════ -->
  <path d="M640,235 L896,235" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <circle cx="700" cy="205" r="14" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="700" y="212" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">2</text>
  <text x="792" y="212" font-family="Chalkboard SE" font-size="12.5" fill="#111" text-anchor="middle">executeDueTasks()</text>
  <text x="768" y="258" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">due &#8658; poll + submit</text>

  <rect x="900" y="160" width="380" height="150" rx="12" fill="none" stroke="#ea580c" stroke-width="3.2"/>
  <text x="1090" y="192" font-family="Chalkboard SE" font-size="19" fill="#ea580c" text-anchor="middle" font-weight="bold">RUNNING</text>
  <path d="M916,204 L1264,204" stroke="#ea580c" stroke-width="2"/>
  <text x="920" y="228" font-family="Chalkboard SE" font-size="13.5" fill="#111">worker thread calls run()</text>
  <text x="920" y="250" font-family="Chalkboard SE" font-size="13.5" fill="#111">task body = any Runnable</text>
  <text x="920" y="274" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">off the queue while it runs</text>

  <!-- ═════════ 3: outcomes ═════════ -->
  <circle cx="1420" cy="128" r="14" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="1420" y="135" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">3</text>

  <path d="M1280,196 L1656,182" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="1462" y="172" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" font-weight="bold">execute() succeeds &#10003;</text>

  <rect x="1660" y="120" width="380" height="140" rx="12" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <text x="1850" y="152" font-family="Chalkboard SE" font-size="19" fill="#16a34a" text-anchor="middle" font-weight="bold">COMPLETED</text>
  <path d="M1676,164 L2024,164" stroke="#16a34a" stroke-width="2"/>
  <text x="1680" y="188" font-family="Chalkboard SE" font-size="13.5" fill="#111">returned normally</text>
  <text x="1680" y="212" font-family="Chalkboard SE" font-size="13.5" fill="#111">recurring? reschedule</text>
  <text x="1680" y="236" font-family="Chalkboard SE" font-size="13.5" fill="#111">one-time? remove from map</text>

  <!-- COMPLETED -> final -->
  <path d="M1850,260 L1850,332" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="1866" y="304" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">one-time: done</text>
  <circle cx="1850" cy="356" r="15" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="1850" cy="356" r="7" fill="#111"/>

  <!-- RUNNING -> FAILED -->
  <path d="M1200,310 L1200,388 L1656,468" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="1290" y="376" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">execute() throws &#10007;</text>

  <rect x="1660" y="420" width="380" height="140" rx="12" fill="none" stroke="#dc2626" stroke-width="3.2"/>
  <text x="1850" y="452" font-family="Chalkboard SE" font-size="19" fill="#dc2626" text-anchor="middle" font-weight="bold">FAILED</text>
  <path d="M1676,464 L2024,464" stroke="#dc2626" stroke-width="2"/>
  <text x="1680" y="488" font-family="Chalkboard SE" font-size="13.5" fill="#111">exception caught by worker</text>
  <text x="1680" y="510" font-family="Chalkboard SE" font-size="13.5" fill="#111">attemptCount++</text>
  <text x="1680" y="534" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">retry? DLQ? decided here</text>

  <!-- ═════════ 4: retry loop back ═════════ -->
  <circle cx="1620" cy="620" r="14" fill="none" stroke="#db2777" stroke-width="2.6"/>
  <text x="1620" y="627" font-family="Chalkboard SE" font-size="16" fill="#db2777" text-anchor="middle" font-weight="bold">4</text>
  <path d="M1770,560 L1770,650 L560,650 L560,314" stroke="#db2777" stroke-width="3" fill="none" marker-end="url(#ahp)"/>
  <text x="1130" y="640" font-family="Chalkboard SE" font-size="14.5" fill="#db2777" text-anchor="middle" font-weight="bold">retry &#8635; attemptCount &lt; maxRetries &#8658; scheduledTime = now + backoff, re-queue</text>

  <!-- FAILED -> DLQ -->
  <path d="M1940,560 L1940,632" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="1954" y="604" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">retries exhausted</text>
  <rect x="1790" y="636" width="300" height="90" rx="10" fill="none" stroke="#dc2626" stroke-width="2.8"/>
  <text x="1940" y="668" font-family="Chalkboard SE" font-size="15" fill="#dc2626" text-anchor="middle" font-weight="bold">DEAD-LETTER QUEUE</text>
  <text x="1940" y="694" font-family="Chalkboard SE" font-size="12.5" fill="#111" text-anchor="middle">DeadLetterEntry(task, cause)</text>

  <!-- ═════════ CANCELLED ═════════ -->
  <path d="M370,310 L330,426" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#ahd)"/>
  <text x="240" y="376" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">cancelTask()</text>

  <rect x="180" y="430" width="320" height="130" rx="12" fill="none" stroke="#6b7280" stroke-width="3"/>
  <text x="340" y="462" font-family="Chalkboard SE" font-size="19" fill="#6b7280" text-anchor="middle" font-weight="bold">CANCELLED</text>
  <path d="M196,474 L484,474" stroke="#6b7280" stroke-width="2"/>
  <text x="200" y="498" font-family="Chalkboard SE" font-size="13.5" fill="#111">removed from map + queue</text>
  <text x="200" y="522" font-family="Chalkboard SE" font-size="13.5" fill="#111">volatile cancelled flag set</text>
  <text x="200" y="546" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">only while still SCHEDULED</text>

  <!-- CANCELLED -> final -->
  <path d="M500,495 L580,495" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <circle cx="604" cy="495" r="15" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="604" cy="495" r="7" fill="#111"/>

  <!-- ═════════ THE MACHINERY GROUP ═════════ -->
  <rect x="150" y="740" width="1250" height="330" rx="16" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="14,9"/>
  <text x="180" y="778" font-family="Marker Felt" font-size="20" fill="#ea580c" font-weight="bold">THE MACHINERY — what turns SCHEDULED into RUNNING</text>

  <!-- priority queue -->
  <rect x="190" y="810" width="380" height="220" rx="10" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="380" y="840" font-family="Chalkboard SE" font-size="15.5" fill="#2563eb" text-anchor="middle" font-weight="bold">PriorityQueue&lt;ScheduledTask&gt;</text>
  <path d="M204,852 L556,852" stroke="#2563eb" stroke-width="1.8"/>
  <text x="212" y="878" font-family="Chalkboard SE" font-size="13.5" fill="#111">head &#8594; 10:00:01&#160;&#160;HIGH&#160;&#160;#42</text>
  <text x="212" y="902" font-family="Chalkboard SE" font-size="13.5" fill="#111">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;10:00:01&#160;&#160;LOW&#160;&#160;&#160;#17</text>
  <text x="212" y="926" font-family="Chalkboard SE" font-size="13.5" fill="#111">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;10:00:05&#160;&#160;MED&#160;&#160;&#160;#88</text>
  <text x="212" y="954" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">time first, priority breaks ties</text>
  <text x="212" y="978" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">O(log n) insert / poll</text>
  <text x="212" y="1008" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">comparator lives in compareTo()</text>

  <!-- poller -->
  <path d="M570,900 L666,900" stroke="#ea580c" stroke-width="2.8" fill="none" marker-end="url(#aho)"/>
  <text x="618" y="888" font-family="Chalkboard SE" font-size="12.5" fill="#ea580c" text-anchor="middle">peek/poll</text>
  <rect x="670" y="830" width="320" height="150" rx="10" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="830" y="862" font-family="Chalkboard SE" font-size="15.5" fill="#ea580c" text-anchor="middle" font-weight="bold">POLLER — 1 thread</text>
  <path d="M684,874 L976,874" stroke="#ea580c" stroke-width="1.8"/>
  <text x="692" y="898" font-family="Chalkboard SE" font-size="13.5" fill="#111">ticks every ~1s</text>
  <text x="692" y="920" font-family="Chalkboard SE" font-size="13.5" fill="#111">head due? poll it : sleep</text>
  <text x="692" y="946" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">discovery only — runs nothing</text>

  <!-- worker pool -->
  <path d="M990,900 L1086,900" stroke="#ea580c" stroke-width="2.8" fill="none" marker-end="url(#aho)"/>
  <text x="1038" y="888" font-family="Chalkboard SE" font-size="12.5" fill="#ea580c" text-anchor="middle">submit</text>
  <rect x="1090" y="830" width="290" height="150" rx="10" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="1235" y="862" font-family="Chalkboard SE" font-size="15.5" fill="#ea580c" text-anchor="middle" font-weight="bold">WORKER POOL</text>
  <path d="M1104,874 L1366,874" stroke="#ea580c" stroke-width="1.8"/>
  <text x="1112" y="898" font-family="Chalkboard SE" font-size="13.5" fill="#111">ExecutorService, fixed size</text>
  <text x="1112" y="920" font-family="Chalkboard SE" font-size="13.5" fill="#111">runs bodies concurrently</text>
  <text x="1112" y="946" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">reports success / failure</text>

  <text x="380" y="1052" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">producer / consumer &#8212; timing decoupled from CPU &#10003;</text>

  <!-- ═════════ STICKY A: two loops ═════════ -->
  <g transform="rotate(-2 1600 850)">
    <rect x="1440" y="780" width="330" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1458" y="812" font-family="Chalkboard SE" font-size="15" fill="#713f12" font-weight="bold">TWO LOOPS, ONE QUEUE:</text>
    <text x="1458" y="840" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">retry &#8594; now + backoff</text>
    <text x="1458" y="864" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">recurring &#8594; now + interval</text>
    <text x="1458" y="892" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">only scheduledTime changes —</text>
    <text x="1458" y="916" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">re-add to the SAME PQ</text>
  </g>
  <circle cx="1600" cy="784" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY B: DLQ ═════════ -->
  <g transform="rotate(2 1955 850)">
    <rect x="1800" y="780" width="310" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1818" y="812" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">DLQ = FOLLOW-UP GOLD:</text>
    <text x="1818" y="840" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">failed &#215; maxRetries &#8594; parked,</text>
    <text x="1818" y="864" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">not lost. Admin API replays</text>
    <text x="1818" y="888" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">with attemptCount reset.</text>
    <text x="1818" y="914" font-family="Chalkboard SE" font-size="13" fill="#92710c">say "poison pill" out loud</text>
  </g>
  <circle cx="1955" cy="784" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY C: cancel race ═════════ -->
  <g transform="rotate(-1.5 850 480)">
    <rect x="700" y="410" width="310" height="140" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="718" y="442" font-family="Chalkboard SE" font-size="15" fill="#713f12" font-weight="bold">CANCEL RACE:</text>
    <text x="718" y="470" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">remove from PQ is O(n) — so</text>
    <text x="718" y="494" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">also set a volatile flag; the</text>
    <text x="718" y="518" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">worker re-checks before run()</text>
  </g>
  <circle cx="850" cy="414" r="7" fill="#dc2626"/>

  <!-- ═════════ read-order strip ═════════ -->
  <text x="150" y="1130" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="360" y="1130" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; schedule into the PQ &#8594; &#9313; poller finds it due, hands to worker pool &#8594; &#9314; success / throw &#8594; &#9315; the two re-queue loops (retry, recurring) + DLQ exit</text>

  <!-- ═════════ LEGEND ═════════ -->
  <rect x="150" y="1160" width="1840" height="130" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="180" y="1236" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="330" y="1188" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/>
    <text x="364" y="1206">waiting (queued)</text>
    <rect x="330" y="1236" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/>
    <text x="364" y="1254">executing / machinery</text>
    <rect x="580" y="1188" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/>
    <text x="614" y="1206">success</text>
    <rect x="580" y="1236" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/>
    <text x="614" y="1254">failure / DLQ</text>
    <rect x="790" y="1188" width="24" height="24" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/>
    <text x="824" y="1206">cancelled</text>
    <rect x="790" y="1236" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/>
    <text x="824" y="1254">interview insight</text>
    <path d="M1010,1200 L1080,1200" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/>
    <text x="1094" y="1206">state transition</text>
    <path d="M1010,1248 L1080,1248" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
    <text x="1094" y="1254">failure path</text>
    <path d="M1250,1200 L1320,1200" stroke="#db2777" stroke-width="2.8" fill="none" marker-end="url(#ahp)"/>
    <text x="1334" y="1206">re-queue loop &#8635;</text>
    <circle cx="1262" cy="1248" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/>
    <text x="1262" y="1253" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="13">n</text>
    <text x="1290" y="1254">story step (read &#9312;&#8594;&#9315;)</text>
    <text x="1520" y="1206" fill="#6b7280">Patterns: Priority Queue &#183; Producer/Consumer &#183; Retry + DLQ</text>
    <text x="1520" y="1254" fill="#6b7280">PriorityTaskScheduler — Task Scheduler LLD</text>
  </g>
</svg>
