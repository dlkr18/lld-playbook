<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1440" viewBox="0 0 2140 1440">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
  </defs>
  <rect width="2140" height="1440" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="43" fill="#1e40af" text-anchor="middle" font-weight="bold">MEETING SCHEDULER — O(log n) OVERLAP CHECK</text>
  <path d="M540,68 Q1070,84 1600,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ===== 1: TREEMAP TIMELINE HERO ===== -->
  <rect x="50" y="150" width="2040" height="520" rx="16" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="82" cy="180" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="82" y="187" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <text x="110" y="188" font-family="Marker Felt" font-size="21" fill="#2563eb" font-weight="bold">THE TREEMAP TIMELINE — one room's bookings, keyed by start</text>

  <!-- TreeMap key row -->
  <text x="70" y="264" font-family="Chalkboard SE" font-size="14" fill="#7e22ce" font-weight="bold">TreeMap keys</text>
  <text x="70" y="284" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">(sorted by start)</text>
  <g font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">
    <rect x="260" y="246" width="120" height="44" rx="7" fill="none" stroke="#7e22ce" stroke-width="2.4"/><text x="320" y="274">09:00</text>
    <rect x="1080" y="246" width="120" height="44" rx="7" fill="none" stroke="#7e22ce" stroke-width="2.4"/><text x="1140" y="274">11:00</text>
    <rect x="1695" y="246" width="120" height="44" rx="7" fill="none" stroke="#7e22ce" stroke-width="2.4"/><text x="1755" y="274">12:30</text>
  </g>
  <path d="M320,290 L320,356" stroke="#7e22ce" stroke-width="2.2" fill="none" marker-end="url(#ahv)"/>
  <path d="M1140,290 L1140,356" stroke="#7e22ce" stroke-width="2.2" fill="none" marker-end="url(#ahv)"/>
  <path d="M1755,290 L1755,356" stroke="#7e22ce" stroke-width="2.2" fill="none" marker-end="url(#ahv)"/>

  <!-- existing booking blocks (blue) -->
  <rect x="260" y="360" width="410" height="72" rx="9" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="465" y="403" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">B1  09:00–10:00</text>
  <rect x="1080" y="360" width="410" height="72" rx="9" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1285" y="403" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">B2  11:00–12:00</text>
  <rect x="1695" y="360" width="205" height="72" rx="9" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1797" y="403" font-family="Chalkboard SE" font-size="14" fill="#111" text-anchor="middle" font-weight="bold">B3  12:30–13:00</text>

  <!-- time axis -->
  <path d="M240,436 L1935,436" stroke="#111" stroke-width="2.4" fill="none" marker-end="url(#ah)"/>
  <text x="1948" y="441" font-family="Chalkboard SE" font-size="13" fill="#6b7280">time &#8594;</text>
  <text x="260" y="458" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">09:00</text>
  <text x="1900" y="458" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">13:00</text>

  <!-- OK candidate (green) -->
  <text x="875" y="475" font-family="Chalkboard SE" font-size="15" fill="#15803d" text-anchor="middle" font-weight="bold">FREE &#10003;</text>
  <rect x="738" y="482" width="274" height="60" rx="9" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="7,4"/>
  <text x="875" y="518" font-family="Chalkboard SE" font-size="14" fill="#15803d" text-anchor="middle" font-weight="bold">NEW 10:10–10:50</text>
  <path d="M760,482 L648,434" stroke="#16a34a" stroke-width="2.4" fill="none" marker-end="url(#ahg)"/>
  <path d="M985,482 L1088,434" stroke="#16a34a" stroke-width="2.4" fill="none" marker-end="url(#ahg)"/>

  <!-- CONFLICT candidate (red) -->
  <text x="1575" y="475" font-family="Chalkboard SE" font-size="15" fill="#dc2626" text-anchor="middle" font-weight="bold">CONFLICT &#10007;</text>
  <rect x="1387" y="482" width="376" height="60" rx="9" fill="none" stroke="#dc2626" stroke-width="3" stroke-dasharray="7,4"/>
  <text x="1575" y="518" font-family="Chalkboard SE" font-size="14" fill="#dc2626" text-anchor="middle" font-weight="bold">NEW 11:45–12:40</text>
  <path d="M1410,482 L1410,436" stroke="#dc2626" stroke-width="2.6" fill="none" marker-end="url(#ahr)"/>

  <!-- OK annotation (left) -->
  <text x="80" y="500" font-family="Chalkboard SE" font-size="14.5" fill="#15803d" font-weight="bold">OK — new [10:10, 10:50)</text>
  <text x="80" y="526" font-family="Chalkboard SE" font-size="13.5" fill="#111">floorEntry(10:10)=B1 &#183; end 10:00 &#8804; 10:10 &#10003;</text>
  <text x="80" y="550" font-family="Chalkboard SE" font-size="13.5" fill="#111">ceilingEntry(10:10)=B2 &#183; start 11:00 &#8805; 10:50 &#10003;</text>
  <text x="80" y="576" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" font-weight="bold">&#8658; FREE &#8594; put(10:10, booking), CONFIRMED</text>

  <!-- CONFLICT annotation (right) -->
  <text x="1440" y="576" font-family="Chalkboard SE" font-size="14.5" fill="#dc2626" font-weight="bold">CONFLICT — new [11:45, 12:40)</text>
  <text x="1440" y="602" font-family="Chalkboard SE" font-size="13.5" fill="#111">floorEntry(11:45)=B2 &#183; end 12:00 &gt; 11:45 &#10007;</text>
  <text x="1440" y="628" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">&#8658; short-circuit &#8594; BookingConflictException</text>

  <!-- center reminder -->
  <text x="700" y="628" font-family="Chalkboard SE" font-size="13" fill="#6b7280">at most TWO neighbours can collide — found in O(log n), never a day scan</text>

  <!-- ===== 2: book() FLOW ===== -->
  <rect x="50" y="700" width="1240" height="252" rx="16" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="82" cy="730" r="15" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="82" y="737" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">2</text>
  <text x="110" y="738" font-family="Marker Felt" font-size="20" fill="#16a34a" font-weight="bold">book() — ATOMIC UNDER THE PER-ROOM LOCK</text>

  <g font-family="Chalkboard SE" font-size="13.5" fill="#111" text-anchor="middle" font-weight="bold">
    <rect x="72" y="782" width="180" height="60" rx="9" fill="none" stroke="#16a34a" stroke-width="2.6"/>
    <text x="162" y="810">&#9312; lock(roomLock)</text>
    <text x="162" y="830" font-family="Chalkboard SE" font-size="11.5" fill="#6b7280" font-weight="normal">one room only</text>

    <rect x="292" y="782" width="248" height="60" rx="9" fill="none" stroke="#16a34a" stroke-width="2.6"/>
    <text x="416" y="810">&#9313; isFree: floor + ceiling</text>
    <text x="416" y="830" font-family="Chalkboard SE" font-size="11.5" fill="#6b7280" font-weight="normal">O(log n) — 2 probes</text>

    <rect x="580" y="782" width="210" height="60" rx="9" fill="none" stroke="#16a34a" stroke-width="2.6"/>
    <text x="685" y="810">&#9314; put(start, booking)</text>
    <text x="685" y="830" font-family="Chalkboard SE" font-size="11.5" fill="#6b7280" font-weight="normal">insert into TreeMap</text>

    <rect x="830" y="782" width="180" height="60" rx="9" fill="none" stroke="#16a34a" stroke-width="2.6"/>
    <text x="920" y="810">&#9315; unlock()</text>
    <text x="920" y="830" font-family="Chalkboard SE" font-size="11.5" fill="#6b7280" font-weight="normal">in finally</text>

    <rect x="1050" y="782" width="210" height="60" rx="9" fill="none" stroke="#2563eb" stroke-width="2.6"/>
    <text x="1155" y="810">&#9316; notify attendees</text>
    <text x="1155" y="830" font-family="Chalkboard SE" font-size="11.5" fill="#6b7280" font-weight="normal">OUTSIDE the lock</text>
  </g>
  <path d="M252,812 L290,812" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#ahg)"/>
  <path d="M540,812 L578,812" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#ahg)"/>
  <path d="M790,812 L828,812" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#ahg)"/>
  <path d="M1010,812 L1048,812" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#ahb)"/>

  <!-- conflict branch off step 2 -->
  <path d="M416,842 L416,884" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="8,5" fill="none" marker-end="url(#ahr)"/>
  <text x="430" y="872" font-family="Chalkboard SE" font-size="12" fill="#dc2626">overlap</text>
  <rect x="292" y="886" width="360" height="48" rx="8" fill="none" stroke="#dc2626" stroke-width="2.6"/>
  <text x="472" y="915" font-family="Chalkboard SE" font-size="13" fill="#dc2626" text-anchor="middle" font-weight="bold">throw BookingConflictException — nothing inserted</text>

  <text x="700" y="905" font-family="Chalkboard SE" font-size="13" fill="#6b7280">bookAny(): Strategy picks a room from</text>
  <text x="700" y="925" font-family="Chalkboard SE" font-size="13" fill="#6b7280">FREE candidates, then this same path runs.</text>

  <!-- ===== RULES (right) ===== -->
  <rect x="1310" y="712" width="780" height="118" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1700" y="740" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">WHY ONLY TWO NEIGHBOURS?</text>
  <path d="M1324,752 L2076,752" stroke="#2563eb" stroke-width="1.6"/>
  <text x="1330" y="776" font-family="Chalkboard SE" font-size="13.5" fill="#111">floorEntry(s) = greatest start &#8804; s &#8594; collides iff its end &gt; s</text>
  <text x="1330" y="800" font-family="Chalkboard SE" font-size="13.5" fill="#111">ceilingEntry(s) = least start &#8805; s &#8594; collides iff its start &lt; e</text>
  <text x="1330" y="822" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">stored intervals are pairwise disjoint &#8658; no other can touch [s, e)</text>

  <rect x="1310" y="844" width="780" height="108" rx="12" fill="none" stroke="#7e22ce" stroke-width="3"/>
  <text x="1700" y="872" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">HALF-OPEN [start, end)</text>
  <path d="M1324,884 L2076,884" stroke="#7e22ce" stroke-width="1.6"/>
  <text x="1330" y="908" font-family="Chalkboard SE" font-size="13.5" fill="#111">overlap &#8660; s1 &lt; e2 AND s2 &lt; e1</text>
  <text x="1330" y="932" font-family="Chalkboard SE" font-size="13.5" fill="#111">[09:00,10:00) &amp; [10:00,11:00): s2=10 &lt; e1=10 is FALSE &#8658; NO overlap</text>
  <text x="1330" y="948" font-family="Chalkboard SE" font-size="11" fill="#6b7280">back-to-back meetings share the 10:00 instant, legally</text>

  <!-- ===== STICKIES ===== -->
  <g transform="rotate(-2 320 1075)">
    <rect x="140" y="990" width="360" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="160" y="1022" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">&quot;MY CALENDAR I&quot; INSIGHT:</text>
    <text x="160" y="1052" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">this is the classic interval-overlap</text>
    <text x="160" y="1076" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">trick. A TreeMap keyed by start</text>
    <text x="160" y="1100" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">gives the two candidate colliders</text>
    <text x="160" y="1124" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">in O(log n) — the whole point.</text>
    <text x="160" y="1150" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">name it on the whiteboard.</text>
  </g>
  <circle cx="320" cy="994" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 770 1075)">
    <rect x="590" y="990" width="360" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="610" y="1022" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">WHY TreeMap, NOT a List?</text>
    <text x="610" y="1052" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">a List = O(n) scan on every book().</text>
    <text x="610" y="1076" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">Sorted-by-start means the only two</text>
    <text x="610" y="1100" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">possible colliders are one floor +</text>
    <text x="610" y="1124" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">one ceiling lookup away.</text>
    <text x="610" y="1150" font-family="Chalkboard SE" font-size="12.5" fill="#14532d" font-weight="bold">O(log n) vs O(n) — say it.</text>
  </g>
  <circle cx="770" cy="994" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1225 1075)">
    <rect x="1045" y="990" width="360" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1065" y="1022" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">RECURRENCE = ALL-OR-NOTHING:</text>
    <text x="1065" y="1052" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">expand the rule into occurrences,</text>
    <text x="1065" y="1076" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">then under ONE lock hold verify</text>
    <text x="1065" y="1100" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">EVERY slot free before inserting</text>
    <text x="1065" y="1124" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">ANY of them.</text>
    <text x="1065" y="1150" font-family="Chalkboard SE" font-size="12.5" fill="#14532d" font-weight="bold">no half-booked series.</text>
  </g>
  <circle cx="1225" cy="994" r="7" fill="#dc2626"/>

  <!-- earliest-slot note -->
  <text x="1460" y="1024" font-family="Chalkboard SE" font-size="15" fill="#db2777" font-weight="bold">suggestSlot(window, duration):</text>
  <text x="1460" y="1052" font-family="Chalkboard SE" font-size="14" fill="#111">sweep a cursor from window.start, jump over each</text>
  <text x="1460" y="1076" font-family="Chalkboard SE" font-size="14" fill="#111">booking that intersects it (lowerEntry + subMap),</text>
  <text x="1460" y="1100" font-family="Chalkboard SE" font-size="14" fill="#111">return the first gap &#8805; duration.  O(log n + k).</text>
  <text x="1460" y="1130" font-family="Chalkboard SE" font-size="13" fill="#6b7280">the same TreeMap that answers isFree() answers &quot;when is it free?&quot;</text>

  <!-- WHITEBOARD ORDER -->
  <text x="60" y="1218" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="1218" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; draw the room's TreeMap timeline &#8594; floorEntry(s) + ceilingEntry(s) are the ONLY two colliders &#8594; &#9313; wrap it in book() under the per-room lock (conflict = throw)</text>

  <!-- LEGEND -->
  <rect x="60" y="1258" width="2020" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="1320" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="240" y="1294" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="274" y="1312">existing booking</text>
    <rect x="240" y="1340" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="274" y="1358">TreeMap key / rule</text>
    <rect x="490" y="1294" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="7,4"/><text x="524" y="1312">candidate: FREE</text>
    <rect x="490" y="1340" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3" stroke-dasharray="7,4"/><text x="524" y="1358">candidate: CONFLICT</text>
    <path d="M760,1306 L820,1306" stroke="#16a34a" stroke-width="2.6" fill="none" marker-end="url(#ahg)"/><text x="834" y="1312">floor/ceiling probe</text>
    <path d="M760,1352 L820,1352" stroke="#dc2626" stroke-width="2.6" stroke-dasharray="8,5" fill="none" marker-end="url(#ahr)"/><text x="834" y="1358">conflict path</text>
    <rect x="1060" y="1294" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.4"/><text x="1094" y="1312">interview insight</text>
    <circle cx="1072" cy="1352" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1072" y="1357" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1094" y="1358">story step</text>
    <text x="1360" y="1312" fill="#6b7280">Core: TreeMap floor/ceiling &#183; half-open intervals &#183; per-room lock</text>
    <text x="1360" y="1358" fill="#6b7280">Meeting Scheduler — LLD (O(log n) interval-overlap conflict detection)</text>
  </g>
</svg>
