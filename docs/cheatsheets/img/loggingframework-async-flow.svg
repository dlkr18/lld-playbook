<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1240" viewBox="0 0 2140 1240">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#16a34a"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahp" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#db2777"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
  </defs>

  <rect width="2140" height="1240" fill="#ffffff"/>

  <!-- ═════════ TITLE ═════════ -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="45" fill="#1e40af" text-anchor="middle" font-weight="bold">LOGGING FRAMEWORK — ASYNC PIPELINE (PRODUCER / CONSUMER)</text>
  <path d="M420,68 Q1070,84 1720,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ═════════ PRODUCER BAND ═════════ -->
  <rect x="50" y="108" width="2040" height="248" rx="16" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="82" cy="140" r="14" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="82" y="147" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <text x="104" y="147" font-family="Marker Felt" font-size="21" fill="#2563eb" font-weight="bold">PRODUCER — any of N caller threads (never touches I/O)</text>

  <!-- producer boxes -->
  <rect x="110" y="196" width="300" height="104" rx="10" fill="none" stroke="#111" stroke-width="3"/>
  <text x="260" y="224" font-family="Chalkboard SE" font-size="15.5" fill="#111" text-anchor="middle" font-weight="bold">logger.info(msg)</text>
  <path d="M124,236 L396,236" stroke="#111" stroke-width="1.8"/>
  <text x="128" y="260" font-family="Chalkboard SE" font-size="13" fill="#111">"Order created: ORD-42"</text>
  <text x="128" y="284" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">business code — one call</text>

  <rect x="470" y="196" width="290" height="104" rx="10" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="615" y="224" font-family="Chalkboard SE" font-size="15.5" fill="#2563eb" text-anchor="middle" font-weight="bold">LEVEL CHECK</text>
  <path d="M484,236 L746,236" stroke="#2563eb" stroke-width="1.8"/>
  <text x="490" y="260" font-family="Chalkboard SE" font-size="13" fill="#111">INFO.getValue() &#8805; minLevel?</text>
  <text x="490" y="284" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" font-weight="bold">pass &#10003; · O(1) int compare</text>

  <rect x="810" y="196" width="300" height="104" rx="10" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="960" y="224" font-family="Chalkboard SE" font-size="15.5" fill="#2563eb" text-anchor="middle" font-weight="bold">BUILD LogMessage</text>
  <path d="M824,236 L1096,236" stroke="#2563eb" stroke-width="1.8"/>
  <text x="828" y="260" font-family="Chalkboard SE" font-size="13" fill="#111">stamp timestamp</text>
  <text x="828" y="284" font-family="Chalkboard SE" font-size="13" fill="#111">+ MDC.getCopy() snapshot</text>

  <rect x="1160" y="196" width="290" height="104" rx="10" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1305" y="224" font-family="Chalkboard SE" font-size="15.5" fill="#2563eb" text-anchor="middle" font-weight="bold">queue.offer(msg)</text>
  <path d="M1174,236 L1436,236" stroke="#2563eb" stroke-width="1.8"/>
  <text x="1178" y="260" font-family="Chalkboard SE" font-size="13" fill="#111">non-blocking enqueue</text>
  <text x="1178" y="284" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">O(1), no wait</text>

  <rect x="1510" y="196" width="290" height="104" rx="10" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="1655" y="224" font-family="Chalkboard SE" font-size="15.5" fill="#16a34a" text-anchor="middle" font-weight="bold">RETURN — caller continues</text>
  <path d="M1524,236 L1786,236" stroke="#16a34a" stroke-width="1.8"/>
  <text x="1528" y="260" font-family="Chalkboard SE" font-size="13" fill="#111">business logic never blocked</text>
  <text x="1528" y="284" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">total caller cost: ns</text>

  <!-- producer arrows -->
  <path d="M410,248 L466,248" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/>
  <path d="M760,248 L806,248" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/>
  <path d="M1110,248 L1156,248" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/>
  <path d="M1450,248 L1506,248" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/>

  <!-- dropped path -->
  <path d="M760,278 L820,278" stroke="#dc2626" stroke-width="2.4" stroke-dasharray="8,5" fill="none" marker-end="url(#ahr)"/>
  <text x="1870" y="240" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">below threshold</text>
  <text x="1870" y="262" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">&#8658; dropped here,</text>
  <text x="1870" y="284" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">0 alloc, no queue</text>

  <!-- ═════════ 2: THE QUEUE (hand-off) ═════════ -->
  <circle cx="560" cy="418" r="14" fill="none" stroke="#db2777" stroke-width="2.6"/>
  <text x="560" y="425" font-family="Chalkboard SE" font-size="16" fill="#db2777" text-anchor="middle" font-weight="bold">2</text>
  <rect x="590" y="392" width="990" height="120" rx="12" fill="none" stroke="#db2777" stroke-width="3.2"/>
  <text x="1085" y="420" font-family="Chalkboard SE" font-size="16.5" fill="#db2777" text-anchor="middle" font-weight="bold">LinkedBlockingQueue&lt;LogMessage&gt; — bounded (capacity N) · the hand-off</text>
  <g font-family="Chalkboard SE" font-size="12.5" fill="#111" text-anchor="middle">
    <rect x="628" y="440" width="70" height="46" rx="6" fill="none" stroke="#db2777" stroke-width="2.2"/><text x="663" y="468">#1</text>
    <rect x="706" y="440" width="70" height="46" rx="6" fill="none" stroke="#db2777" stroke-width="2.2"/><text x="741" y="468">#2</text>
    <rect x="784" y="440" width="70" height="46" rx="6" fill="none" stroke="#db2777" stroke-width="2.2"/><text x="819" y="468">#3</text>
    <rect x="862" y="440" width="70" height="46" rx="6" fill="none" stroke="#db2777" stroke-width="2.2"/><text x="897" y="468">#4</text>
    <rect x="940" y="440" width="70" height="46" rx="6" fill="none" stroke="#db2777" stroke-width="2.2"/><text x="975" y="468">…</text>
  </g>
  <text x="663" y="504" font-family="Chalkboard SE" font-size="12" fill="#ea580c" text-anchor="middle" font-weight="bold">head (consumer polls)</text>
  <text x="975" y="504" font-family="Chalkboard SE" font-size="12" fill="#2563eb" text-anchor="middle" font-weight="bold">tail (producers offer)</text>
  <text x="1230" y="464" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">happens-before publishes the immutable</text>
  <text x="1230" y="486" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">event safely — no locks on the payload</text>

  <!-- offer -> queue -->
  <path d="M1305,300 L1305,340 L1085,340 L1085,388" stroke="#2563eb" stroke-width="2.8" fill="none" marker-end="url(#ahb)"/>
  <text x="1096" y="372" font-family="Chalkboard SE" font-size="12.5" fill="#2563eb">enqueue</text>

  <!-- backpressure red path -->
  <path d="M1580,452 L1660,452" stroke="#dc2626" stroke-width="2.6" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="1668" y="440" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">FULL? backpressure policy:</text>
  <text x="1668" y="462" font-family="Chalkboard SE" font-size="12.5" fill="#111">block (put) · drop newest (offer=false)</text>
  <text x="1668" y="484" font-family="Chalkboard SE" font-size="12.5" fill="#111">· drop-oldest (evict head)</text>

  <!-- ═════════ 3: CONSUMER BAND ═════════ -->
  <rect x="50" y="548" width="2040" height="256" rx="16" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="150" cy="580" r="14" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="150" y="587" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">3</text>
  <text x="172" y="587" font-family="Marker Felt" font-size="21" fill="#ea580c" font-weight="bold">CONSUMER — 1 dedicated background thread (SingleThreadExecutor)</text>

  <rect x="110" y="630" width="300" height="104" rx="10" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="260" y="658" font-family="Chalkboard SE" font-size="15.5" fill="#ea580c" text-anchor="middle" font-weight="bold">queue.take()</text>
  <path d="M124,670 L396,670" stroke="#ea580c" stroke-width="1.8"/>
  <text x="128" y="694" font-family="Chalkboard SE" font-size="13" fill="#111">blocks until a msg arrives</text>
  <text x="128" y="718" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">wakes on offer()</text>

  <rect x="470" y="630" width="290" height="104" rx="10" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="615" y="658" font-family="Chalkboard SE" font-size="15.5" fill="#ea580c" text-anchor="middle" font-weight="bold">FILTER CHAIN</text>
  <path d="M484,670 L746,670" stroke="#ea580c" stroke-width="1.8"/>
  <text x="490" y="694" font-family="Chalkboard SE" font-size="13" fill="#111">Keyword &#8594; Sampling …</text>
  <text x="490" y="718" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">short-circuit on reject</text>

  <rect x="810" y="630" width="300" height="104" rx="10" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="960" y="658" font-family="Chalkboard SE" font-size="15.5" fill="#ea580c" text-anchor="middle" font-weight="bold">FORMAT (Strategy)</text>
  <path d="M824,670 L1096,670" stroke="#ea580c" stroke-width="1.8"/>
  <text x="828" y="694" font-family="Chalkboard SE" font-size="13" fill="#111">formatter.format(msg)</text>
  <text x="828" y="718" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">text / JSON / pattern</text>

  <rect x="1160" y="630" width="290" height="104" rx="10" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="1305" y="658" font-family="Chalkboard SE" font-size="15.5" fill="#ea580c" text-anchor="middle" font-weight="bold">WRITE — fan-out</text>
  <path d="M1174,670 L1436,670" stroke="#ea580c" stroke-width="1.8"/>
  <text x="1178" y="694" font-family="Chalkboard SE" font-size="13" fill="#111">for each appender:</text>
  <text x="1178" y="718" font-family="Chalkboard SE" font-size="13" fill="#111">appender.append(line)</text>

  <!-- appender mini boxes -->
  <rect x="1510" y="608" width="290" height="52" rx="8" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="1655" y="640" font-family="Chalkboard SE" font-size="14" fill="#7e22ce" text-anchor="middle" font-weight="bold">ConsoleAppender</text>
  <rect x="1510" y="668" width="290" height="52" rx="8" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="1655" y="700" font-family="Chalkboard SE" font-size="14" fill="#7e22ce" text-anchor="middle" font-weight="bold">FileAppender</text>
  <rect x="1510" y="728" width="290" height="52" rx="8" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="1655" y="760" font-family="Chalkboard SE" font-size="14" fill="#7e22ce" text-anchor="middle" font-weight="bold">NetworkAppender (ELK)</text>

  <!-- consumer arrows -->
  <path d="M410,682 L466,682" stroke="#ea580c" stroke-width="2.8" fill="none" marker-end="url(#aho)"/>
  <path d="M760,682 L806,682" stroke="#ea580c" stroke-width="2.8" fill="none" marker-end="url(#aho)"/>
  <path d="M1110,682 L1156,682" stroke="#ea580c" stroke-width="2.8" fill="none" marker-end="url(#aho)"/>
  <path d="M1450,660 L1506,634" stroke="#7e22ce" stroke-width="2.4" fill="none" marker-end="url(#ah)"/>
  <path d="M1450,682 L1506,694" stroke="#7e22ce" stroke-width="2.4" fill="none" marker-end="url(#ah)"/>
  <path d="M1450,704 L1506,752" stroke="#7e22ce" stroke-width="2.4" fill="none" marker-end="url(#ah)"/>

  <text x="120" y="782" font-family="Chalkboard SE" font-size="13" fill="#6b7280">all filtering, formatting and I/O happen HERE — off the caller's path; a single consumer means writes never interleave (total order)</text>

  <!-- queue -> take hand-off (routed down the clear left margin) -->
  <path d="M610,512 C300,540 80,556 80,652 C80,672 92,682 106,682" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/>
  <text x="330" y="536" font-family="Chalkboard SE" font-size="12.5" fill="#111">poll / take (head)</text>

  <!-- ═════════ STICKY A: LATENCY ═════════ -->
  <g transform="rotate(-2 320 900)">
    <rect x="150" y="838" width="360" height="128" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="170" y="868" font-family="Chalkboard SE" font-size="15" fill="#713f12" font-weight="bold">LATENCY BUDGET:</text>
    <text x="170" y="896" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">caller pays ~1ns check + O(1) offer.</text>
    <text x="170" y="920" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">format (~1&#181;s) + disk I/O (5-50&#181;s)</text>
    <text x="170" y="944" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">all run on the consumer thread.</text>
  </g>
  <circle cx="320" cy="842" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY B: ORDERING ═════════ -->
  <g transform="rotate(1.5 900 900)">
    <rect x="730" y="838" width="350" height="128" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="750" y="868" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">ORDERING GUARANTEE:</text>
    <text x="750" y="896" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">one consumer ⇒ a single total order</text>
    <text x="750" y="920" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">of writes; no interleaved lines.</text>
    <text x="750" y="944" font-family="Chalkboard SE" font-size="13" fill="#92710c">FIFO queue preserves arrival order</text>
  </g>
  <circle cx="900" cy="842" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY C: SHUTDOWN ═════════ -->
  <g transform="rotate(-1.5 1490 900)">
    <rect x="1320" y="838" width="350" height="128" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1340" y="868" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">SHUTDOWN = DRAIN + FLUSH:</text>
    <text x="1340" y="896" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">shutdown() stops intake, drains the</text>
    <text x="1340" y="920" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">queue, then flush()es appenders.</text>
    <text x="1340" y="944" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">crash risk: in-queue events can be lost</text>
  </g>
  <circle cx="1490" cy="842" r="7" fill="#dc2626"/>

  <!-- decoupled note -->
  <text x="1730" y="878" font-family="Chalkboard SE" font-size="15" fill="#db2777" font-weight="bold">Producer / Consumer</text>
  <text x="1730" y="904" font-family="Chalkboard SE" font-size="13.5" fill="#111">decouples timing (caller)</text>
  <text x="1730" y="928" font-family="Chalkboard SE" font-size="13.5" fill="#111">from I/O throughput</text>
  <text x="1730" y="952" font-family="Chalkboard SE" font-size="13.5" fill="#111">(consumer). &#10003;</text>

  <!-- ═════════ read-order strip ═════════ -->
  <text x="60" y="1024" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="1024" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; caller: check &#8594; build &#8594; offer (ns, no I/O) &#8594; &#9313; safe hand-off via bounded queue &#8594; &#9314; one consumer drains: filter &#8594; format &#8594; fan-out write &#8594; full? backpressure · shutdown drains+flushes</text>

  <!-- ═════════ LEGEND ═════════ -->
  <rect x="50" y="1060" width="2040" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="80" y="1120" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="230" y="1095" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/>
    <text x="264" y="1113">producer step</text>
    <rect x="230" y="1140" width="24" height="24" rx="5" fill="none" stroke="#db2777" stroke-width="3"/>
    <text x="264" y="1158">the queue (hand-off)</text>
    <rect x="470" y="1095" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/>
    <text x="504" y="1113">consumer step</text>
    <rect x="470" y="1140" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/>
    <text x="504" y="1158">appender sinks</text>
    <rect x="700" y="1095" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/>
    <text x="734" y="1113">caller returns</text>
    <rect x="700" y="1140" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/>
    <text x="734" y="1158">interview insight</text>
    <path d="M950,1107 L1020,1107" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/>
    <text x="1034" y="1113">flow</text>
    <path d="M950,1152 L1020,1152" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
    <text x="1034" y="1158">dropped / backpressure</text>
    <circle cx="1300" cy="1107" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/>
    <text x="1300" y="1112" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="13">n</text>
    <text x="1326" y="1113">story step (read &#9312;&#8594;&#9314;)</text>
    <text x="1620" y="1113" fill="#6b7280">Patterns: Producer/Consumer · Strategy · Chain of Responsibility</text>
    <text x="1620" y="1158" fill="#6b7280">Logging Framework — async appender pipeline (LLD)</text>
  </g>
</svg>
