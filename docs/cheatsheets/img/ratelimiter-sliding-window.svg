<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1320" viewBox="0 0 2140 1320">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="ahgr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#6b7280"/></marker>
  </defs>

  <rect width="2140" height="1320" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">SLIDING WINDOW LOG — EXACT COUNTING</text>
  <path d="M580,68 Q1070,84 1560,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ① REQUEST -->
  <circle cx="80" cy="128" r="15" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="80" y="135" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">1</text>
  <rect x="110" y="150" width="260" height="110" rx="12" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <text x="240" y="182" font-family="Chalkboard SE" font-size="17" fill="#16a34a" text-anchor="middle" font-weight="bold">REQUEST</text>
  <path d="M124,194 L356,194" stroke="#16a34a" stroke-width="2"/>
  <text x="240" y="220" font-family="Chalkboard SE" font-size="13.5" fill="#111" text-anchor="middle">arrives at t = now</text>
  <text x="240" y="242" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">load client's ts queue</text>

  <!-- arrow -> evict -->
  <path d="M370,205 L426,205" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- ② EVICT -->
  <circle cx="450" cy="128" r="15" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="450" y="135" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">2</text>
  <rect x="430" y="150" width="340" height="110" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="600" y="182" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">EVICT EXPIRED</text>
  <path d="M444,194 L756,194" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="220" font-family="Chalkboard SE" font-size="13.5" fill="#111">poll head while ts &lt; now &#8722; W</text>
  <text x="450" y="242" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">amortized O(1) per timestamp</text>

  <!-- arrow -> decision -->
  <path d="M770,205 L822,205" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- ③ DECISION -->
  <circle cx="930" cy="108" r="15" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="930" y="115" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">3</text>
  <path d="M930,148 L1044,205 L930,262 L816,205 z" fill="none" stroke="#111" stroke-width="3"/>
  <text x="930" y="200" font-family="Chalkboard SE" font-size="14" fill="#111" text-anchor="middle" font-weight="bold">size &lt;</text>
  <text x="930" y="222" font-family="Chalkboard SE" font-size="14" fill="#111" text-anchor="middle" font-weight="bold">maxReq ?</text>

  <!-- yes -> add -->
  <path d="M1044,205 L1100,205" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="1072" y="193" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">yes &#10003;</text>
  <rect x="1104" y="155" width="300" height="100" rx="10" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="1254" y="187" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">ADD now</text>
  <text x="1122" y="215" font-family="Chalkboard SE" font-size="13.5" fill="#111">offer(now) to queue</text>
  <text x="1122" y="237" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">remaining = max &#8722; size</text>

  <path d="M1404,205 L1460,205" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <rect x="1464" y="155" width="290" height="100" rx="10" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <text x="1609" y="187" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">ALLOW &#8594; 200</text>
  <text x="1482" y="217" font-family="Chalkboard SE" font-size="13" fill="#111">exact count, no burst</text>
  <text x="1482" y="238" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">RateLimitResult.allowed()</text>

  <!-- no -> block -->
  <path d="M930,262 L930,320" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="944" y="296" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">no &#10007; (full)</text>
  <rect x="1104" y="290" width="420" height="100" rx="10" fill="none" stroke="#dc2626" stroke-width="3.2"/>
  <text x="1314" y="322" font-family="Chalkboard SE" font-size="16" fill="#dc2626" text-anchor="middle" font-weight="bold">BLOCK &#8594; 429</text>
  <text x="1122" y="350" font-family="Chalkboard SE" font-size="13.5" fill="#111">retryAfter = oldest + W &#8722; now</text>
  <text x="1122" y="372" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">don't add now; queue unchanged</text>
  <path d="M960,340 L1100,340" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>

  <!-- TIMELINE visual -->
  <text x="110" y="452" font-family="Marker Felt" font-size="20" fill="#15803d" font-weight="bold">THE WINDOW, VISUALLY — window slides right continuously (no boundary burst)</text>
  <!-- window shaded -->
  <rect x="800" y="486" width="470" height="120" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="9,6"/>
  <!-- axis -->
  <path d="M150,566 L1360,566" stroke="#111" stroke-width="2.6" fill="none" marker-end="url(#ah)"/>
  <text x="1372" y="571" font-family="Chalkboard SE" font-size="13" fill="#111">time</text>
  <!-- now-W and now markers -->
  <path d="M800,470 L800,606" stroke="#16a34a" stroke-width="2.2" stroke-dasharray="6,5"/>
  <text x="800" y="462" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" text-anchor="middle" font-weight="bold">now &#8722; W</text>
  <path d="M1270,470 L1270,606" stroke="#16a34a" stroke-width="2.2" stroke-dasharray="6,5"/>
  <text x="1270" y="462" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" text-anchor="middle" font-weight="bold">now</text>
  <!-- expired dots -->
  <circle cx="260" cy="566" r="13" fill="#9ca3af"/>
  <circle cx="390" cy="566" r="13" fill="#9ca3af"/>
  <circle cx="560" cy="566" r="13" fill="#9ca3af"/>
  <circle cx="700" cy="566" r="13" fill="#9ca3af"/>
  <text x="248" y="550" font-family="Chalkboard SE" font-size="15" fill="#dc2626" font-weight="bold">&#10007;</text>
  <text x="378" y="550" font-family="Chalkboard SE" font-size="15" fill="#dc2626" font-weight="bold">&#10007;</text>
  <text x="548" y="550" font-family="Chalkboard SE" font-size="15" fill="#dc2626" font-weight="bold">&#10007;</text>
  <text x="688" y="550" font-family="Chalkboard SE" font-size="15" fill="#dc2626" font-weight="bold">&#10007;</text>
  <text x="470" y="632" font-family="Chalkboard SE" font-size="13.5" fill="#6b7280" text-anchor="middle">older than now &#8722; W  &#8594;  evicted (polled off the head)</text>
  <!-- in-window dots -->
  <circle cx="850" cy="566" r="13" fill="#16a34a"/>
  <circle cx="940" cy="566" r="13" fill="#16a34a"/>
  <circle cx="1030" cy="566" r="13" fill="#16a34a"/>
  <circle cx="1120" cy="566" r="13" fill="#16a34a"/>
  <circle cx="1210" cy="566" r="13" fill="#16a34a"/>
  <text x="1035" y="632" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" text-anchor="middle" font-weight="bold">5 timestamps inside window = maxReq &#8658; next request BLOCKED</text>

  <!-- TIMELINE-EXAMPLE box -->
  <rect x="110" y="680" width="980" height="240" rx="12" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="130" y="712" font-family="Chalkboard SE" font-size="16" fill="#15803d" font-weight="bold">EXAMPLE — limit 5 requests / 10 s</text>
  <path d="M124,724 L1076,724" stroke="#16a34a" stroke-width="1.8"/>
  <text x="130" y="752" font-family="Chalkboard SE" font-size="14" fill="#111">t = 0s&#160;&#160;&#8594;&#160;&#160;req 1&#8211;5 ALLOWED&#160;&#160;queue = [0,0,0,0,0]</text>
  <text x="130" y="778" font-family="Chalkboard SE" font-size="14" fill="#111">t = 5s&#160;&#160;&#8594;&#160;&#160;req 6 BLOCKED (5 already in [0&#8211;10s])</text>
  <text x="130" y="804" font-family="Chalkboard SE" font-size="14" fill="#111">t = 10.1s &#8594; req 7: oldest (t=0) expired &#8594; evict</text>
  <text x="130" y="830" font-family="Chalkboard SE" font-size="14" fill="#111">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;queue = [10.1] &#8594; ALLOWED</text>
  <text x="130" y="870" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">every timestamp counted individually &#8658; exact, no 2&#215; edge burst &#10003;</text>
  <text x="130" y="900" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">cost: stores up to maxReq timestamps per client (O(k) memory)</text>

  <!-- CONCURRENCY box -->
  <rect x="1130" y="680" width="700" height="240" rx="12" fill="none" stroke="#7e22ce" stroke-width="3"/>
  <text x="1150" y="712" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" font-weight="bold">CONCURRENCY</text>
  <path d="M1144,724 L1816,724" stroke="#7e22ce" stroke-width="1.8"/>
  <text x="1150" y="752" font-family="Chalkboard SE" font-size="14" fill="#111">ConcurrentHashMap&lt;clientId, Queue&lt;Long&gt;&gt;</text>
  <text x="1150" y="778" font-family="Chalkboard SE" font-size="14" fill="#111">synchronized(timestamps) around the queue</text>
  <text x="1150" y="804" font-family="Chalkboard SE" font-size="14" fill="#111">evict + count + offer must be ONE atomic step</text>
  <text x="1150" y="830" font-family="Chalkboard SE" font-size="14" fill="#111">per-client lock &#8212; clients never block each other</text>
  <text x="1150" y="870" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">split them &#8594; two threads both see size = 4,</text>
  <text x="1150" y="892" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">both add &#8594; 6 in window (over the limit)</text>

  <!-- STICKIES -->
  <g transform="rotate(-2 385 1035)">
    <rect x="110" y="960" width="550" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="132" y="994" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">MOST ACCURATE ALGORITHM:</text>
    <text x="132" y="1024" font-family="Chalkboard SE" font-size="14" fill="#713f12">counts real timestamps, not buckets &#8212;</text>
    <text x="132" y="1048" font-family="Chalkboard SE" font-size="14" fill="#713f12">no window-boundary loophole at all.</text>
    <text x="132" y="1074" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">use for billing / hard quotas.</text>
  </g>
  <circle cx="385" cy="964" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 1050 1035)">
    <rect x="750" y="960" width="600" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="772" y="994" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">O(k) MEMORY &#8594; SLIDING WINDOW COUNTER:</text>
    <text x="772" y="1024" font-family="Chalkboard SE" font-size="14" fill="#713f12">approximate with 2 counters (prev + current window)</text>
    <text x="772" y="1048" font-family="Chalkboard SE" font-size="14" fill="#713f12">weighted by overlap &#8594; O(1) memory, ~exact.</text>
    <text x="772" y="1074" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">what Cloudflare actually ships.</text>
  </g>
  <circle cx="1050" cy="964" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1690 1035)">
    <rect x="1430" y="960" width="440" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1452" y="994" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">REDIS VERSION:</text>
    <text x="1452" y="1024" font-family="Chalkboard SE" font-size="14" fill="#713f12">sorted set (ZADD score=ts).</text>
    <text x="1452" y="1048" font-family="Chalkboard SE" font-size="14" fill="#713f12">ZREMRANGEBYSCORE evicts,</text>
    <text x="1452" y="1072" font-family="Chalkboard SE" font-size="14" fill="#713f12">ZCARD counts. All atomic.</text>
  </g>
  <circle cx="1690" cy="964" r="7" fill="#dc2626"/>

  <!-- WHITEBOARD ORDER -->
  <text x="110" y="1170" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="320" y="1170" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; request at now &#8594; &#9313; evict ts &lt; now&#8722;W &#8594; &#9314; size &lt; maxReq ? offer(now) &amp; ALLOW : BLOCK with retryAfter = oldest + W &#8722; now</text>

  <!-- LEGEND -->
  <rect x="110" y="1200" width="1920" height="100" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="140" y="1258" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <circle cx="300" cy="1234" r="12" fill="#16a34a"/><text x="326" y="1240">ts in window</text>
    <circle cx="470" cy="1234" r="12" fill="#9ca3af"/><text x="496" y="1240">expired ts</text>
    <rect x="640" y="1222" width="24" height="24" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/><text x="674" y="1240">active window</text>
    <rect x="890" y="1222" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="924" y="1240">block &#8594; 429</text>
    <rect x="1100" y="1222" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="1134" y="1240">concurrency</text>
    <rect x="1330" y="1222" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="1364" y="1240">insight</text>
    <text x="1520" y="1240" fill="#6b7280">O(k) memory &#183; exact, no edge burst &#183; Cloudflare</text>
  </g>
</svg>
