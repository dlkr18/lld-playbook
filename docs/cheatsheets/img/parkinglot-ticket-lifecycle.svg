<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1300" viewBox="0 0 2140 1300">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
  </defs>
  <rect width="2140" height="1300" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">PARKING LOT — TICKET LIFECYCLE</text>
  <path d="M620,68 Q1070,84 1520,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- START -->
  <circle cx="90" cy="230" r="14" fill="#111"/>
  <path d="M104,230 L196,230" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="110" y="216" font-family="Chalkboard SE" font-size="13" fill="#111">enterVehicle()</text>
  <circle cx="150" cy="150" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="150" y="157" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>

  <!-- ACTIVE -->
  <rect x="200" y="160" width="360" height="150" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="380" y="192" font-family="Chalkboard SE" font-size="19" fill="#2563eb" text-anchor="middle" font-weight="bold">ACTIVE</text>
  <path d="M214,204 L546,204" stroke="#2563eb" stroke-width="2"/>
  <text x="220" y="230" font-family="Chalkboard SE" font-size="14" fill="#111">space allocated (Strategy), ticket issued</text>
  <text x="220" y="254" font-family="Chalkboard SE" font-size="14" fill="#111">entryTime stamped, space marked OCCUPIED</text>
  <text x="220" y="284" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">the only live state — everything else is terminal</text>

  <!-- step 2 -->
  <circle cx="640" cy="150" r="15" fill="none" stroke="#15803d" stroke-width="2.6"/>
  <text x="640" y="157" font-family="Chalkboard SE" font-size="16" fill="#15803d" text-anchor="middle" font-weight="bold">2</text>

  <!-- PAID -->
  <path d="M560,220 L720,220" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="576" y="208" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" font-weight="bold">exitVehicle(payment)</text>
  <rect x="724" y="150" width="360" height="150" rx="12" fill="none" stroke="#15803d" stroke-width="3.2"/>
  <text x="904" y="182" font-family="Chalkboard SE" font-size="19" fill="#15803d" text-anchor="middle" font-weight="bold">PAID</text>
  <path d="M738,194 L1070,194" stroke="#15803d" stroke-width="2"/>
  <text x="744" y="220" font-family="Chalkboard SE" font-size="14" fill="#111">fee = PricingStrategy.price(ticket)</text>
  <text x="744" y="244" font-family="Chalkboard SE" font-size="14" fill="#111">PaymentProcessor charges, space freed</text>
  <text x="744" y="274" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">grace period &lt; 15m &#8658; free</text>

  <!-- CANCELLED -->
  <path d="M300,310 L300,392" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="312" y="356" font-family="Chalkboard SE" font-size="13.5" fill="#6b7280">cancelled before exit</text>
  <rect x="150" y="396" width="330" height="120" rx="12" fill="none" stroke="#6b7280" stroke-width="3"/>
  <text x="315" y="428" font-family="Chalkboard SE" font-size="18" fill="#6b7280" text-anchor="middle" font-weight="bold">CANCELLED</text>
  <path d="M164,440 L466,440" stroke="#6b7280" stroke-width="2"/>
  <text x="170" y="466" font-family="Chalkboard SE" font-size="14" fill="#111">space released, no charge</text>
  <text x="170" y="494" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">only reachable while ACTIVE</text>

  <!-- LOST -->
  <path d="M470,290 L560,392" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="470" y="352" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">reported lost</text>
  <rect x="530" y="396" width="330" height="120" rx="12" fill="none" stroke="#dc2626" stroke-width="3"/>
  <text x="695" y="428" font-family="Chalkboard SE" font-size="18" fill="#dc2626" text-anchor="middle" font-weight="bold">LOST</text>
  <path d="M544,440 L846,440" stroke="#dc2626" stroke-width="2"/>
  <text x="550" y="466" font-family="Chalkboard SE" font-size="14" fill="#111">flat 24h penalty fee applied</text>
  <text x="550" y="494" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">can't reconstruct entryTime</text>

  <!-- terminal sink -->
  <circle cx="1160" cy="225" r="15" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="1160" cy="225" r="8" fill="#111"/>
  <path d="M1084,225 L1140,225" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <path d="M860,470 C1000,470 1150,320 1156,246" stroke="#111" stroke-width="2.4" fill="none" marker-end="url(#ah)"/>
  <path d="M480,470 C900,540 1150,340 1152,244" stroke="#6b7280" stroke-width="2.2" fill="none" marker-end="url(#ah)"/>
  <text x="1176" y="230" font-family="Chalkboard SE" font-size="13" fill="#111">done</text>

  <!-- STRUCTURE cluster (Composite + Strategy) -->
  <rect x="1210" y="130" width="890" height="410" rx="16" fill="none" stroke="#7e22ce" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="1176" cy="150" r="15" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="1176" y="157" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">3</text>
  <text x="1240" y="166" font-family="Marker Felt" font-size="20" fill="#7e22ce" font-weight="bold">THE STRUCTURE — what ACTIVE sits on</text>

  <!-- composite -->
  <rect x="1240" y="188" width="240" height="86" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1360" y="218" font-family="Chalkboard SE" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">ParkingLot</text>
  <text x="1360" y="246" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">facade + registry</text>
  <path d="M1360,274 L1360,300" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ah)"/>
  <text x="1372" y="292" font-family="Chalkboard SE" font-size="12" fill="#7e22ce">1..*</text>
  <rect x="1240" y="304" width="240" height="80" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1360" y="334" font-family="Chalkboard SE" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">Floor</text>
  <text x="1360" y="362" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">holds spaces by type</text>
  <path d="M1360,384 L1360,410" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ah)"/>
  <text x="1372" y="402" font-family="Chalkboard SE" font-size="12" fill="#7e22ce">1..*</text>
  <rect x="1240" y="414" width="240" height="94" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1360" y="444" font-family="Chalkboard SE" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">ParkingSpace</text>
  <text x="1360" y="470" font-family="Chalkboard SE" font-size="13" fill="#111" text-anchor="middle">type, isOccupied (CAS)</text>
  <text x="1360" y="494" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">Composite: Lot &#8594; Floor &#8594; Space</text>

  <!-- strategies -->
  <rect x="1530" y="188" width="540" height="150" rx="12" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="1800" y="218" font-family="Chalkboard SE" font-size="16.5" fill="#ea580c" text-anchor="middle" font-weight="bold">Strategy ×2 (plug-in behavior)</text>
  <path d="M1544,230 L2056,230" stroke="#ea580c" stroke-width="2"/>
  <text x="1552" y="256" font-family="Chalkboard SE" font-size="14" fill="#111">PricingStrategy: Hourly / FlatRate</text>
  <text x="1552" y="282" font-family="Chalkboard SE" font-size="14" fill="#111">AllocationStrategy: Nearest / FirstAvailable</text>
  <text x="1552" y="312" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">swap at construction — Open/Closed, no if-else on type</text>

  <rect x="1530" y="356" width="540" height="152" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1800" y="386" font-family="Chalkboard SE" font-size="16.5" fill="#2563eb" text-anchor="middle" font-weight="bold">Observer</text>
  <path d="M1544,398 L2056,398" stroke="#2563eb" stroke-width="2"/>
  <text x="1552" y="424" font-family="Chalkboard SE" font-size="14" fill="#111">ParkingEventListener fires on enter / exit</text>
  <text x="1552" y="450" font-family="Chalkboard SE" font-size="14" fill="#111">e.g. LoggingEventListener, OccupancyReport</text>
  <text x="1552" y="480" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">decoupled from the ticket entity (SRP)</text>

  <!-- STICKIES -->
  <g transform="rotate(-2 380 690)">
    <rect x="200" y="600" width="360" height="176" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="220" y="634" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">CAS ALLOCATION — no double-park:</text>
    <text x="220" y="664" font-family="Chalkboard SE" font-size="14" fill="#713f12">space.tryOccupy() =</text>
    <text x="220" y="688" font-family="Chalkboard SE" font-size="14" fill="#713f12">AtomicBoolean.compareAndSet(</text>
    <text x="220" y="712" font-family="Chalkboard SE" font-size="14" fill="#713f12">&#160;&#160;false, true)</text>
    <text x="220" y="742" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">20 threads race &#8594; exactly one</text>
    <text x="220" y="764" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">wins the slot. No lock needed.</text>
  </g>
  <circle cx="380" cy="604" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 780 690)">
    <rect x="610" y="600" width="340" height="176" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="630" y="634" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">PATTERNS TO NAME:</text>
    <text x="630" y="664" font-family="Chalkboard SE" font-size="14" fill="#14532d">Composite (Lot&#8594;Floor&#8594;Space)</text>
    <text x="630" y="690" font-family="Chalkboard SE" font-size="14" fill="#14532d">Strategy (pricing + allocation)</text>
    <text x="630" y="716" font-family="Chalkboard SE" font-size="14" fill="#14532d">Observer (events)</text>
    <text x="630" y="742" font-family="Chalkboard SE" font-size="14" fill="#14532d">State (ticket lifecycle)</text>
    <text x="630" y="766" font-family="Chalkboard SE" font-size="13" fill="#6b7280">4 patterns, each earns its place</text>
  </g>
  <circle cx="780" cy="604" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1210 690)">
    <rect x="1030" y="600" width="360" height="176" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1050" y="634" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">FOLLOW-UP AMMO:</text>
    <text x="1050" y="664" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">"nearest" needs a per-type free-</text>
    <text x="1050" y="688" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">space index &#8594; O(1) find, not scan</text>
    <text x="1050" y="716" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">multi-lot &#8594; shard by lotId</text>
    <text x="1050" y="742" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">lost-ticket = distinct fee path,</text>
    <text x="1050" y="764" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">not an error</text>
  </g>
  <circle cx="1210" cy="604" r="7" fill="#dc2626"/>

  <!-- ticket-is-state note -->
  <text x="1470" y="640" font-family="Chalkboard SE" font-size="15" fill="#db2777" font-weight="bold">Why track status?</text>
  <text x="1470" y="668" font-family="Chalkboard SE" font-size="14" fill="#111">prevents double-payment, enables pay-at-kiosk-</text>
  <text x="1470" y="692" font-family="Chalkboard SE" font-size="14" fill="#111">then-exit, and every transition is validated —</text>
  <text x="1470" y="716" font-family="Chalkboard SE" font-size="14" fill="#111">an illegal move (PAID &#8594; ACTIVE) throws.</text>
  <text x="1470" y="752" font-family="Chalkboard SE" font-size="13" fill="#6b7280">ticket carries identity (ID equality), the rest is immutable.</text>

  <!-- WHITEBOARD ORDER -->
  <text x="60" y="880" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="880" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; enter &#8594; ACTIVE (allocate via Strategy) &#8594; &#9313; exit &#8594; PAID (price + free space) &#8594; &#9314; the structure it rides on &#8594; cancel / lost are the side exits</text>

  <!-- LEGEND -->
  <rect x="60" y="920" width="2020" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="982" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="240" y="956" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="274" y="974">active (live)</text>
    <rect x="240" y="1002" width="24" height="24" rx="5" fill="none" stroke="#15803d" stroke-width="3"/><text x="274" y="1020">success / paid</text>
    <rect x="470" y="956" width="24" height="24" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/><text x="504" y="974">cancelled</text>
    <rect x="470" y="1002" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="504" y="1020">lost / penalty</text>
    <rect x="700" y="956" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="734" y="974">structure (Composite)</text>
    <rect x="700" y="1002" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="734" y="1020">strategy (plug-in)</text>
    <rect x="990" y="1002" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.4"/><text x="1024" y="1020">interview insight</text>
    <path d="M990,968 L1050,968" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/><text x="1064" y="974">transition</text>
    <path d="M1230,968 L1290,968" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/><text x="1304" y="974">penalty / failure path</text>
    <circle cx="1242" cy="1014" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1242" y="1019" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1264" y="1019">story step</text>
    <text x="1560" y="974" fill="#6b7280">Patterns: Composite &#183; Strategy &#183; Observer &#183; State</text>
    <text x="1560" y="1019" fill="#6b7280">Parking Lot — LLD (ticket state machine + structure)</text>
  </g>
</svg>
