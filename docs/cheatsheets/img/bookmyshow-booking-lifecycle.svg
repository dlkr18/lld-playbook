<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1150" viewBox="0 0 2140 1150">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="ahd" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
  </defs>

  <rect width="2140" height="1150" fill="#ffffff"/>

  <!-- ═════════ TITLE ═════════ -->
  <text x="1070" y="50" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">BOOKMYSHOW — BOOKING STATE MACHINE</text>
  <path d="M600,68 Q1070,84 1540,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- START -->
  <circle cx="80" cy="255" r="13" fill="#111"/>
  <path d="M93,255 L196,255" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="100" y="240" font-family="Chalkboard SE" font-size="13" fill="#111">createBooking()</text>
  <text x="100" y="288" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">lockSeats()</text>
  <circle cx="150" cy="160" r="14" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="150" y="167" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>

  <!-- PENDING -->
  <rect x="200" y="180" width="380" height="150" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="390" y="212" font-family="Chalkboard SE" font-size="19" fill="#2563eb" text-anchor="middle" font-weight="bold">PENDING</text>
  <path d="M214,224 L566,224" stroke="#2563eb" stroke-width="2"/>
  <text x="220" y="250" font-family="Chalkboard SE" font-size="13.5" fill="#111">seats LOCKED via SeatLockManager</text>
  <text x="220" y="273" font-family="Chalkboard SE" font-size="13.5" fill="#111">5-min TTL starts ticking</text>
  <text x="220" y="302" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">the only non-terminal state — awaiting payment</text>

  <!-- PENDING -> CONFIRMED -->
  <circle cx="655" cy="158" r="14" fill="none" stroke="#15803d" stroke-width="2.6"/>
  <text x="655" y="165" font-family="Chalkboard SE" font-size="16" fill="#15803d" text-anchor="middle" font-weight="bold">2</text>
  <path d="M580,240 L731,240" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="596" y="228" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" font-weight="bold">confirmBooking(payment)</text>

  <!-- CONFIRMED -->
  <rect x="735" y="180" width="380" height="150" rx="12" fill="none" stroke="#15803d" stroke-width="3.2"/>
  <text x="925" y="212" font-family="Chalkboard SE" font-size="19" fill="#15803d" text-anchor="middle" font-weight="bold">CONFIRMED</text>
  <path d="M749,224 L1101,224" stroke="#15803d" stroke-width="2"/>
  <text x="755" y="250" font-family="Chalkboard SE" font-size="13.5" fill="#111">payment charged (PricingStrategy)</text>
  <text x="755" y="273" font-family="Chalkboard SE" font-size="13.5" fill="#111">seats &#8594; BOOKED, locks released</text>
  <text x="755" y="302" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">user notified (Observer)</text>

  <!-- CONFIRMED -> terminal -->
  <path d="M1115,255 L1157,255" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <circle cx="1182" cy="255" r="15" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="1182" cy="255" r="8" fill="#111"/>
  <text x="1170" y="290" font-family="Chalkboard SE" font-size="13" fill="#6b7280">done</text>

  <!-- PENDING -> EXPIRED -->
  <circle cx="150" cy="400" r="14" fill="none" stroke="#dc2626" stroke-width="2.6"/>
  <text x="150" y="407" font-family="Chalkboard SE" font-size="16" fill="#dc2626" text-anchor="middle" font-weight="bold">3</text>
  <path d="M320,330 L320,418" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="332" y="382" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">lock timeout (5 min)</text>

  <!-- EXPIRED -->
  <rect x="200" y="422" width="360" height="130" rx="12" fill="none" stroke="#dc2626" stroke-width="3.2"/>
  <text x="380" y="454" font-family="Chalkboard SE" font-size="18" fill="#dc2626" text-anchor="middle" font-weight="bold">EXPIRED</text>
  <path d="M214,466 L546,466" stroke="#dc2626" stroke-width="2"/>
  <text x="220" y="492" font-family="Chalkboard SE" font-size="13.5" fill="#111">TTL elapsed &#8594; locks auto-released</text>
  <text x="220" y="515" font-family="Chalkboard SE" font-size="13.5" fill="#111">seats &#8594; AVAILABLE, no charge</text>
  <text x="220" y="540" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">reachable only from PENDING</text>

  <!-- EXPIRED -> terminal -->
  <path d="M560,487 L622,487" stroke="#111" stroke-width="2.6" fill="none" marker-end="url(#ah)"/>
  <circle cx="646" cy="487" r="14" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="646" cy="487" r="7" fill="#111"/>

  <!-- CONFIRMED -> CANCELLED -->
  <path d="M900,330 L900,418" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#ahd)"/>
  <text x="912" y="382" font-family="Chalkboard SE" font-size="13.5" fill="#6b7280">cancelBooking()</text>

  <!-- CANCELLED -->
  <rect x="720" y="422" width="360" height="130" rx="12" fill="none" stroke="#6b7280" stroke-width="3.2"/>
  <text x="900" y="454" font-family="Chalkboard SE" font-size="18" fill="#6b7280" text-anchor="middle" font-weight="bold">CANCELLED</text>
  <path d="M734,466 L1066,466" stroke="#6b7280" stroke-width="2"/>
  <text x="740" y="492" font-family="Chalkboard SE" font-size="13.5" fill="#111">refund issued, seats freed</text>
  <text x="740" y="515" font-family="Chalkboard SE" font-size="13.5" fill="#111">seats &#8594; AVAILABLE, user notified</text>
  <text x="740" y="540" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">reachable only from CONFIRMED</text>

  <!-- CANCELLED -> terminal -->
  <path d="M1080,487 L1142,487" stroke="#111" stroke-width="2.6" fill="none" marker-end="url(#ah)"/>
  <circle cx="1166" cy="487" r="14" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="1166" cy="487" r="7" fill="#111"/>

  <!-- ═════════ PLUG-INS cluster ═════════ -->
  <rect x="1240" y="150" width="850" height="410" rx="16" fill="none" stroke="#7e22ce" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="1266" cy="176" r="14" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="1266" y="183" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">4</text>
  <text x="1292" y="184" font-family="Marker Felt" font-size="20" fill="#7e22ce" font-weight="bold">THE PLUG-INS — swap without touching booking</text>

  <!-- PricingStrategy -->
  <rect x="1270" y="210" width="790" height="150" rx="12" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="1288" y="240" font-family="Chalkboard SE" font-size="17" fill="#ea580c" font-weight="bold">PricingStrategy — Strategy</text>
  <path d="M1284,252 L2046,252" stroke="#ea580c" stroke-width="2"/>
  <text x="1288" y="278" font-family="Chalkboard SE" font-size="14" fill="#111">fee = strategy.price(show, seat, when)</text>
  <text x="1288" y="302" font-family="Chalkboard SE" font-size="14" fill="#111">Simple (per-tier) / Dynamic (demand &#183; day &#183; festival)</text>
  <text x="1288" y="326" font-family="Chalkboard SE" font-size="13.5" fill="#111">tiers: Regular $100 &#183; Premium $200 &#183; VIP $300 &#183; Recliner $500</text>
  <text x="1288" y="350" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" font-weight="bold">new pricing model = new class, booking logic untouched (Open/Closed) &#10003;</text>

  <!-- NotificationStrategy -->
  <rect x="1270" y="380" width="790" height="150" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1288" y="410" font-family="Chalkboard SE" font-size="17" fill="#2563eb" font-weight="bold">NotificationStrategy — Observer</text>
  <path d="M1284,422 L2046,422" stroke="#2563eb" stroke-width="2"/>
  <text x="1288" y="448" font-family="Chalkboard SE" font-size="14" fill="#111">notify(user, event) fires on CONFIRMED / CANCELLED / EXPIRED</text>
  <text x="1288" y="472" font-family="Chalkboard SE" font-size="14" fill="#111">Email &#183; SMS &#183; Multi-channel fan-out</text>
  <text x="1288" y="496" font-family="Chalkboard SE" font-size="13.5" fill="#111">Money value object (BigDecimal) carries every amount</text>
  <text x="1288" y="520" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">decoupled from the Booking entity (SRP) — add a channel, zero booking edits</text>

  <!-- ═════════ STICKY A: state guard ═════════ -->
  <g transform="rotate(-2 245 700)">
    <rect x="60" y="620" width="370" height="160" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="80" y="652" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">ILLEGAL MOVE = THROW:</text>
    <text x="80" y="682" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">confirm requires status == PENDING</text>
    <text x="80" y="706" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">else IllegalStateException.</text>
    <text x="80" y="734" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">CONFIRMED &#8594; PENDING impossible;</text>
    <text x="80" y="758" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">every transition is validated.</text>
  </g>
  <circle cx="248" cy="624" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY B: why state ═════════ -->
  <g transform="rotate(1.5 640 700)">
    <rect x="470" y="620" width="360" height="160" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="490" y="652" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">WHY A STATE MACHINE?</text>
    <text x="490" y="682" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">prevents double-charge &amp; stale</text>
    <text x="490" y="706" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">bookings; enables pay-then-exit,</text>
    <text x="490" y="730" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">expire-then-rebook.</text>
    <text x="490" y="758" font-family="Chalkboard SE" font-size="13" fill="#6b7280">status is the audit trail of a seat.</text>
  </g>
  <circle cx="643" cy="624" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY C: seat-lock teaser ═════════ -->
  <g transform="rotate(-1.5 1055 700)">
    <rect x="880" y="620" width="360" height="160" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="900" y="652" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">PENDING RIDES ON THE LOCK:</text>
    <text x="900" y="682" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">createBooking only succeeds if</text>
    <text x="900" y="706" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">SeatLockManager grants the seats.</text>
    <text x="900" y="730" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">The 5-min TTL is what fires the</text>
    <text x="900" y="754" font-family="Chalkboard SE" font-size="13.5" fill="#92710c" font-weight="bold">PENDING &#8594; EXPIRED edge. See flow &#8594;</text>
  </g>
  <circle cx="1058" cy="624" r="7" fill="#dc2626"/>

  <!-- side note -->
  <text x="1300" y="648" font-family="Chalkboard SE" font-size="15" fill="#db2777" font-weight="bold">One orchestrator, one PENDING:</text>
  <text x="1300" y="676" font-family="Chalkboard SE" font-size="14" fill="#111">EnhancedBookingService holds the in-memory maps,</text>
  <text x="1300" y="700" font-family="Chalkboard SE" font-size="14" fill="#111">calls PricingStrategy + NotificationStrategy, and</text>
  <text x="1300" y="724" font-family="Chalkboard SE" font-size="14" fill="#111">delegates every seat decision to SeatLockManager.</text>
  <text x="1300" y="758" font-family="Chalkboard SE" font-size="13" fill="#6b7280">no controllers, no DTOs — pure API + model + impl (LLD).</text>

  <!-- ═════════ read-order strip ═════════ -->
  <text x="60" y="870" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="870" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; createBooking &#8594; PENDING (seats locked) &#8594; &#9313; confirm &#8594; CONFIRMED (price + notify) &#8594; &#9314; timeout / cancel side exits &#8594; &#9315; Strategy + Observer plug-ins</text>

  <!-- ═════════ LEGEND ═════════ -->
  <rect x="60" y="910" width="2020" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="972" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="240" y="946" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="274" y="964">pending (live)</text>
    <rect x="240" y="992" width="24" height="24" rx="5" fill="none" stroke="#15803d" stroke-width="3"/><text x="274" y="1010">confirmed / success</text>
    <rect x="500" y="946" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="534" y="964">expired / timeout</text>
    <rect x="500" y="992" width="24" height="24" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/><text x="534" y="1010">cancelled</text>
    <rect x="760" y="946" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="794" y="964">pricing strategy</text>
    <rect x="760" y="992" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="794" y="1010">interview insight</text>
    <path d="M1010,958 L1080,958" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/><text x="1094" y="964">transition</text>
    <path d="M1010,1004 L1080,1004" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/><text x="1094" y="1010">timeout / failure path</text>
    <circle cx="1322" cy="958" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1322" y="963" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="13">n</text><text x="1346" y="964">story step</text>
    <text x="1560" y="964" fill="#6b7280">Patterns: State &#183; Strategy &#183; Observer</text>
    <text x="1560" y="1010" fill="#6b7280">BookMyShow — booking lifecycle (state machine) LLD</text>
  </g>
</svg>
