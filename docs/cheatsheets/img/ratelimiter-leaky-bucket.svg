<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1260" viewBox="0 0 2140 1260">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
  </defs>

  <rect width="2140" height="1260" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">LEAKY BUCKET — QUEUE DRAINS AT FIXED RATE</text>
  <path d="M540,68 Q1070,84 1600,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ① bursty arrivals -->
  <circle cx="120" cy="150" r="15" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="120" y="157" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">1</text>
  <text x="490" y="152" font-family="Chalkboard SE" font-size="15" fill="#ea580c" text-anchor="middle" font-weight="bold">bursty arrivals (variable rate) pour in</text>
  <path d="M375,168 L375,286" stroke="#ea580c" stroke-width="2.6" fill="none" marker-end="url(#aho)"/>
  <path d="M420,180 L420,286" stroke="#ea580c" stroke-width="2.6" fill="none" marker-end="url(#aho)"/>
  <path d="M470,166 L470,286" stroke="#ea580c" stroke-width="2.6" fill="none" marker-end="url(#aho)"/>
  <path d="M535,182 L535,286" stroke="#ea580c" stroke-width="2.6" fill="none" marker-end="url(#aho)"/>
  <path d="M600,170 L600,286" stroke="#ea580c" stroke-width="2.6" fill="none" marker-end="url(#aho)"/>

  <!-- BUCKET -->
  <path d="M340,290 L340,556 Q340,576 360,576 L620,576 Q640,576 640,556 L640,290" stroke="#ea580c" stroke-width="3.4" fill="none"/>
  <text x="490" y="316" font-family="Chalkboard SE" font-size="15" fill="#ea580c" text-anchor="middle" font-weight="bold">BOUNDED FIFO QUEUE</text>
  <!-- capacity line -->
  <path d="M340,352 L640,352" stroke="#fdba74" stroke-width="2" stroke-dasharray="6,5"/>
  <text x="490" y="344" font-family="Chalkboard SE" font-size="12.5" fill="#ea580c" text-anchor="middle">capacity N = 4 (full)</text>
  <!-- queued cells -->
  <rect x="365" y="516" width="250" height="36" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/><text x="490" y="540" font-family="Chalkboard SE" font-size="13" fill="#9a3412" text-anchor="middle">req #1 (head)</text>
  <rect x="365" y="474" width="250" height="36" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/><text x="490" y="498" font-family="Chalkboard SE" font-size="13" fill="#9a3412" text-anchor="middle">req #2</text>
  <rect x="365" y="432" width="250" height="36" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/><text x="490" y="456" font-family="Chalkboard SE" font-size="13" fill="#9a3412" text-anchor="middle">req #3</text>
  <rect x="365" y="390" width="250" height="36" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/><text x="490" y="414" font-family="Chalkboard SE" font-size="13" fill="#9a3412" text-anchor="middle">req #4 (tail)</text>
  <text x="490" y="606" font-family="Chalkboard SE" font-size="13" fill="#6b7280" text-anchor="middle">enqueue at tail if a slot is free</text>

  <!-- OVERFLOW -> DROP -->
  <circle cx="700" cy="240" r="15" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="700" y="247" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">2</text>
  <path d="M640,320 L744,300" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="662" y="292" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">full? overflow</text>
  <rect x="760" y="262" width="360" height="112" rx="10" fill="none" stroke="#dc2626" stroke-width="3.2"/>
  <text x="940" y="294" font-family="Chalkboard SE" font-size="16" fill="#dc2626" text-anchor="middle" font-weight="bold">DROP &#8594; 429</text>
  <text x="778" y="322" font-family="Chalkboard SE" font-size="13.5" fill="#111">if size == N &#8594; reject now</text>
  <text x="778" y="344" font-family="Chalkboard SE" font-size="13.5" fill="#111">excess is discarded, not queued</text>
  <text x="778" y="366" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">no backpressure buildup</text>

  <!-- LEAK -> backend -->
  <circle cx="700" cy="470" r="15" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="700" y="477" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">3</text>
  <path d="M640,500 L752,500" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <circle cx="666" cy="500" r="5" fill="#15803d"/>
  <circle cx="694" cy="500" r="5" fill="#15803d"/>
  <circle cx="722" cy="500" r="5" fill="#15803d"/>
  <text x="696" y="548" font-family="Chalkboard SE" font-size="12" fill="#15803d" text-anchor="middle" font-weight="bold">leak 1 / interval</text>
  <rect x="760" y="450" width="360" height="112" rx="10" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <text x="940" y="482" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">BACKEND</text>
  <text x="778" y="510" font-family="Chalkboard SE" font-size="13.5" fill="#111">processes at a FIXED rate</text>
  <text x="778" y="532" font-family="Chalkboard SE" font-size="13.5" fill="#111">output is smooth &amp; constant</text>
  <text x="778" y="554" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">downstream never sees a burst</text>

  <!-- LEAKER note -->
  <rect x="290" y="650" width="450" height="120" rx="10" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="515" y="682" font-family="Chalkboard SE" font-size="15.5" fill="#ea580c" text-anchor="middle" font-weight="bold">LEAKER — 1 background thread</text>
  <path d="M304,694 L726,694" stroke="#ea580c" stroke-width="1.8"/>
  <text x="308" y="720" font-family="Chalkboard SE" font-size="13.5" fill="#111">loop: req = queue.poll(leakInterval)</text>
  <text x="308" y="742" font-family="Chalkboard SE" font-size="13.5" fill="#111">if req != null &#8594; req.run()   (one per tick)</text>
  <text x="308" y="762" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">the drain rate IS the rate limit</text>

  <!-- CONTRAST box -->
  <rect x="1160" y="262" width="870" height="300" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1180" y="294" font-family="Chalkboard SE" font-size="16" fill="#2563eb" font-weight="bold">TOKEN BUCKET vs LEAKY BUCKET (say this out loud)</text>
  <path d="M1174,306 L2016,306" stroke="#2563eb" stroke-width="1.8"/>
  <text x="1180" y="336" font-family="Chalkboard SE" font-size="14" fill="#6b7280">&#8226; controls</text>
  <text x="1420" y="336" font-family="Chalkboard SE" font-size="14" fill="#2563eb" font-weight="bold">Token: INPUT rate</text>
  <text x="1720" y="336" font-family="Chalkboard SE" font-size="14" fill="#ea580c" font-weight="bold">Leaky: OUTPUT rate</text>
  <text x="1180" y="368" font-family="Chalkboard SE" font-size="14" fill="#6b7280">&#8226; bursts</text>
  <text x="1420" y="368" font-family="Chalkboard SE" font-size="14" fill="#111">allowed up to C</text>
  <text x="1720" y="368" font-family="Chalkboard SE" font-size="14" fill="#111">never &#8212; always constant</text>
  <text x="1180" y="400" font-family="Chalkboard SE" font-size="14" fill="#6b7280">&#8226; excess</text>
  <text x="1420" y="400" font-family="Chalkboard SE" font-size="14" fill="#111">blocked, retry later</text>
  <text x="1720" y="400" font-family="Chalkboard SE" font-size="14" fill="#111">queued, or dropped if full</text>
  <text x="1180" y="432" font-family="Chalkboard SE" font-size="14" fill="#6b7280">&#8226; analogy</text>
  <text x="1420" y="432" font-family="Chalkboard SE" font-size="14" fill="#111">refilling wallet</text>
  <text x="1720" y="432" font-family="Chalkboard SE" font-size="14" fill="#111">water leaking from a hole</text>
  <text x="1180" y="464" font-family="Chalkboard SE" font-size="14" fill="#6b7280">&#8226; use case</text>
  <text x="1420" y="464" font-family="Chalkboard SE" font-size="14" fill="#111">API throttling</text>
  <text x="1720" y="464" font-family="Chalkboard SE" font-size="14" fill="#111">traffic shaping / QoS</text>
  <text x="1180" y="512" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" font-weight="bold">both O(1) per request &#8212; the difference is what stays constant:</text>
  <text x="1180" y="536" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" font-weight="bold">token bucket smooths the INPUT allowance, leaky bucket smooths the OUTPUT.</text>

  <!-- CONCURRENCY box -->
  <rect x="1160" y="592" width="870" height="180" rx="12" fill="none" stroke="#7e22ce" stroke-width="3"/>
  <text x="1180" y="624" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" font-weight="bold">CONCURRENCY</text>
  <path d="M1174,636 L2016,636" stroke="#7e22ce" stroke-width="1.8"/>
  <text x="1180" y="664" font-family="Chalkboard SE" font-size="14" fill="#111">bounded BlockingQueue does the heavy lifting &#8212; offer() returns false when full (that's the drop)</text>
  <text x="1180" y="690" font-family="Chalkboard SE" font-size="14" fill="#111">single leaker thread = the only consumer &#8594; no consumer-side contention</text>
  <text x="1180" y="716" font-family="Chalkboard SE" font-size="14" fill="#111">many producer threads offer concurrently; the queue is already thread-safe</text>
  <text x="1180" y="750" font-family="Chalkboard SE" font-size="13" fill="#7e22ce" font-weight="bold">classic producer / consumer &#8212; timing decoupled from request threads</text>

  <!-- STICKIES -->
  <g transform="rotate(-2 375 900)">
    <rect x="110" y="820" width="540" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="132" y="854" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">DROP vs QUEUE-AND-WAIT:</text>
    <text x="132" y="884" font-family="Chalkboard SE" font-size="14" fill="#713f12">full bucket can reject (429) OR block the</text>
    <text x="132" y="908" font-family="Chalkboard SE" font-size="14" fill="#713f12">caller until a slot frees. State which.</text>
    <text x="132" y="934" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">rejecting keeps latency bounded.</text>
  </g>
  <circle cx="375" cy="824" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 1045 900)">
    <rect x="760" y="820" width="570" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="782" y="854" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">LATENCY IS THE COST:</text>
    <text x="782" y="884" font-family="Chalkboard SE" font-size="14" fill="#713f12">queued requests wait for their leak slot &#8212;</text>
    <text x="782" y="908" font-family="Chalkboard SE" font-size="14" fill="#713f12">smoothing trades throughput spikes for delay.</text>
    <text x="782" y="934" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">bad for user-facing APIs that want bursts.</text>
  </g>
  <circle cx="1045" cy="824" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1680 900)">
    <rect x="1430" y="820" width="450" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1452" y="854" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">WHERE IT SHINES:</text>
    <text x="1452" y="884" font-family="Chalkboard SE" font-size="14" fill="#713f12">network routers, message</text>
    <text x="1452" y="908" font-family="Chalkboard SE" font-size="14" fill="#713f12">pipelines, any downstream</text>
    <text x="1452" y="932" font-family="Chalkboard SE" font-size="14" fill="#713f12">that needs a steady feed.</text>
  </g>
  <circle cx="1680" cy="824" r="7" fill="#dc2626"/>

  <!-- WHITEBOARD ORDER -->
  <text x="110" y="1030" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="320" y="1030" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; requests pour into a bounded queue &#8594; &#9313; full ? DROP (429) : enqueue &#8594; &#9314; leaker thread drains 1 / interval &#8594; smooth constant output</text>

  <!-- LEGEND -->
  <rect x="110" y="1060" width="1920" height="100" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="140" y="1118" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="300" y="1094" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="334" y="1112">bucket / leaker</text>
    <rect x="540" y="1094" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="574" y="1112">smooth output</text>
    <rect x="790" y="1094" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="824" y="1112">drop &#8594; 429</text>
    <rect x="1000" y="1094" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="1034" y="1112">concurrency</text>
    <rect x="1230" y="1094" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="1264" y="1112">insight</text>
    <text x="1440" y="1112" fill="#6b7280">O(1) &#183; smooth constant output &#183; network traffic shaping, QoS</text>
  </g>
</svg>
