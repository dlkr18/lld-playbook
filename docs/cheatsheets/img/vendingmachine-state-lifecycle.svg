<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1220" viewBox="0 0 2140 1220">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahd" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
    <marker id="triv" markerWidth="17" markerHeight="15" refX="15" refY="7.5" orient="auto"><path d="M1,1 L15,7.5 L1,14 z" fill="#fff" stroke="#7e22ce" stroke-width="2"/></marker>
  </defs>
  <rect width="2140" height="1220" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">VENDING MACHINE — STATE LIFECYCLE</text>
  <path d="M560,68 Q1070,84 1580,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- START -->
  <circle cx="60" cy="200" r="13" fill="#111"/>
  <text x="66" y="180" font-family="Chalkboard SE" font-size="12.5" fill="#111">power on</text>
  <path d="M74,200 L146,200" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- (1) IDLE -->
  <rect x="150" y="125" width="380" height="150" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <circle cx="178" cy="108" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="178" y="115" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <text x="340" y="160" font-family="Chalkboard SE" font-size="19" fill="#2563eb" text-anchor="middle" font-weight="bold">IDLE</text>
  <path d="M164,172 L516,172" stroke="#2563eb" stroke-width="2"/>
  <text x="170" y="200" font-family="Chalkboard SE" font-size="14" fill="#111">no coins yet — machine at rest</text>
  <text x="170" y="224" font-family="Chalkboard SE" font-size="14" fill="#111">insertMoney() is the only legal op</text>
  <text x="170" y="254" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">select / dispense here &#8594; throws</text>

  <!-- (2) HAS_MONEY -->
  <rect x="630" y="125" width="380" height="150" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <circle cx="658" cy="108" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="658" y="115" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">2</text>
  <text x="820" y="160" font-family="Chalkboard SE" font-size="19" fill="#2563eb" text-anchor="middle" font-weight="bold">HAS_MONEY</text>
  <path d="M644,172 L996,172" stroke="#2563eb" stroke-width="2"/>
  <text x="650" y="200" font-family="Chalkboard SE" font-size="14" fill="#111">balance builds up (BigDecimal)</text>
  <text x="650" y="224" font-family="Chalkboard SE" font-size="14" fill="#111">insert more &#183; select when funded</text>
  <text x="650" y="254" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">cancel() &#8594; refund everything</text>

  <!-- (3) PRODUCT_SELECTED -->
  <rect x="1110" y="125" width="380" height="150" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <circle cx="1138" cy="108" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="1138" y="115" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">3</text>
  <text x="1300" y="160" font-family="Chalkboard SE" font-size="18" fill="#2563eb" text-anchor="middle" font-weight="bold">PRODUCT_SELECTED</text>
  <path d="M1124,172 L1476,172" stroke="#2563eb" stroke-width="2"/>
  <text x="1130" y="200" font-family="Chalkboard SE" font-size="14" fill="#111">slot picked, balance covers price</text>
  <text x="1130" y="224" font-family="Chalkboard SE" font-size="14" fill="#111">re-select or add more coins</text>
  <text x="1130" y="254" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">cancel() &#8594; back to HAS_MONEY</text>

  <!-- (4) DISPENSING -->
  <rect x="1590" y="125" width="380" height="150" rx="12" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <circle cx="1618" cy="108" r="15" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="1618" y="115" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">4</text>
  <text x="1780" y="160" font-family="Chalkboard SE" font-size="19" fill="#16a34a" text-anchor="middle" font-weight="bold">DISPENSING</text>
  <path d="M1604,172 L1956,172" stroke="#16a34a" stroke-width="2"/>
  <text x="1610" y="200" font-family="Chalkboard SE" font-size="14" fill="#111">stock--, change = balance &#8722; price</text>
  <text x="1610" y="224" font-family="Chalkboard SE" font-size="14" fill="#111">drop product + return change</text>
  <text x="1610" y="254" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">transient &#8594; auto-reset to IDLE</text>

  <!-- main flow transitions -->
  <path d="M530,200 L626,200" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="536" y="188" font-family="Chalkboard SE" font-size="13" fill="#111" font-weight="bold">insertMoney()</text>
  <path d="M1010,200 L1106,200" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="1012" y="188" font-family="Chalkboard SE" font-size="12.5" fill="#111" font-weight="bold">selectProduct()</text>
  <path d="M1490,200 L1586,200" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="1500" y="188" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">dispense()</text>

  <!-- self loops (self-transition: add more / reselect) -->
  <path d="M800,125 C800,101 840,101 840,125" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#ahb)"/>
  <path d="M1280,125 C1280,101 1320,101 1320,125" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#ahb)"/>

  <!-- cancel arcs (red dashed) -->
  <path d="M660,275 C620,335 540,335 505,278" stroke="#dc2626" stroke-width="2.6" stroke-dasharray="8,5" fill="none" marker-end="url(#ahr)"/>
  <text x="470" y="360" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">cancel() &#8594; full refund</text>
  <path d="M1140,275 C1100,335 1020,335 985,278" stroke="#dc2626" stroke-width="2.6" stroke-dasharray="8,5" fill="none" marker-end="url(#ahr)"/>
  <text x="985" y="360" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">cancel() &#8594; clear selection</text>

  <!-- reset arc (dim, long) -->
  <path d="M1650,275 C1650,432 400,432 352,278" stroke="#6b7280" stroke-width="2.6" fill="none" marker-end="url(#ahd)"/>
  <text x="1030" y="422" font-family="Chalkboard SE" font-size="13.5" fill="#6b7280" text-anchor="middle" font-weight="bold">product out + change returned &#8594; reset to IDLE</text>

  <!-- ===== STATE PATTERN cluster ===== -->
  <rect x="120" y="470" width="1150" height="350" rx="16" fill="none" stroke="#7e22ce" stroke-width="3" stroke-dasharray="14,9"/>
  <text x="150" y="502" font-family="Marker Felt" font-size="20" fill="#7e22ce" font-weight="bold">STATE PATTERN — one class per phase, guards its own ops</text>

  <!-- interface -->
  <rect x="430" y="522" width="560" height="152" rx="10" fill="none" stroke="#7e22ce" stroke-width="3"/>
  <text x="710" y="552" font-family="Chalkboard SE" font-size="16.5" fill="#111" text-anchor="middle" font-weight="bold">&#171;interface&#187; VendingMachineState</text>
  <path d="M444,564 L976,564" stroke="#7e22ce" stroke-width="2"/>
  <text x="452" y="590" font-family="Chalkboard SE" font-size="14" fill="#111">insertMoney(m) &#183; selectProduct(code)</text>
  <text x="452" y="614" font-family="Chalkboard SE" font-size="14" fill="#111">dispense() &#183; cancel()</text>
  <text x="452" y="644" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">VendingMachineImpl delegates every call to current state</text>
  <text x="452" y="664" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">illegal op &#8594; IllegalStateException from that state</text>

  <!-- concrete states -->
  <rect x="150" y="705" width="255" height="92" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="277" y="734" font-family="Chalkboard SE" font-size="14" fill="#111" text-anchor="middle" font-weight="bold">IdleState</text>
  <text x="277" y="762" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">insert only &#183; else throw</text>

  <rect x="425" y="705" width="255" height="92" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="552" y="734" font-family="Chalkboard SE" font-size="14" fill="#111" text-anchor="middle" font-weight="bold">HasMoneyState</text>
  <text x="552" y="762" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">insert &#183; select &#183; cancel</text>

  <rect x="700" y="705" width="255" height="92" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="827" y="734" font-family="Chalkboard SE" font-size="13.5" fill="#111" text-anchor="middle" font-weight="bold">ProductSelectedState</text>
  <text x="827" y="762" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">dispense &#183; cancel &#183; reselect</text>

  <rect x="975" y="705" width="255" height="92" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="1102" y="734" font-family="Chalkboard SE" font-size="14" fill="#111" text-anchor="middle" font-weight="bold">DispensingState</text>
  <text x="1102" y="762" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">vend + auto-reset</text>

  <!-- implements arrows -->
  <path d="M277,705 L520,676" stroke="#7e22ce" stroke-width="2.2" stroke-dasharray="8,6" fill="none" marker-end="url(#triv)"/>
  <path d="M552,705 L640,676" stroke="#7e22ce" stroke-width="2.2" stroke-dasharray="8,6" fill="none" marker-end="url(#triv)"/>
  <path d="M827,705 L800,676" stroke="#7e22ce" stroke-width="2.2" stroke-dasharray="8,6" fill="none" marker-end="url(#triv)"/>
  <path d="M1102,705 L910,676" stroke="#7e22ce" stroke-width="2.2" stroke-dasharray="8,6" fill="none" marker-end="url(#triv)"/>

  <!-- ===== INVENTORY box ===== -->
  <rect x="1300" y="470" width="760" height="155" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1320" y="502" font-family="Marker Felt" font-size="19" fill="#2563eb" font-weight="bold">INVENTORY — by slot</text>
  <path d="M1314,514 L2046,514" stroke="#2563eb" stroke-width="2"/>
  <text x="1320" y="542" font-family="Chalkboard SE" font-size="14" fill="#111">Map&lt;slotCode, Slot&gt;  &#183;  Slot { Product, qty }</text>
  <text x="1320" y="566" font-family="Chalkboard SE" font-size="14" fill="#111">dispense &#8594; qty--, reject when qty == 0</text>
  <text x="1320" y="596" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">out-of-stock rejected in HAS_MONEY / SELECTED, not mid-vend</text>

  <!-- ===== CHANGE-MAKING box ===== -->
  <rect x="1300" y="650" width="760" height="170" rx="12" fill="none" stroke="#15803d" stroke-width="3"/>
  <text x="1320" y="682" font-family="Marker Felt" font-size="19" fill="#15803d" font-weight="bold">CHANGE-MAKING — greedy</text>
  <path d="M1314,694 L2046,694" stroke="#15803d" stroke-width="2"/>
  <text x="1320" y="722" font-family="Chalkboard SE" font-size="14" fill="#111">change = balance &#8722; price   (BigDecimal, scale 2, HALF_UP)</text>
  <text x="1320" y="746" font-family="Chalkboard SE" font-size="14" fill="#111">greedy largest-first: 25&#162; &#183; 10&#162; &#183; 5&#162; &#183; 1&#162;</text>
  <text x="1320" y="770" font-family="Chalkboard SE" font-size="14" fill="#111">coin inventory decremented per payout</text>
  <text x="1320" y="800" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">can't form exact change &#8594; reject / exact-change warning</text>

  <!-- ===== STICKIES ===== -->
  <g transform="rotate(-2 400 950)">
    <rect x="120" y="862" width="560" height="176" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="142" y="896" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">WHY STATE, NOT if/else?</text>
    <text x="142" y="926" font-family="Chalkboard SE" font-size="14" fill="#713f12">each phase guards its own ops — no status</text>
    <text x="142" y="950" font-family="Chalkboard SE" font-size="14" fill="#713f12">flag littered across every method.</text>
    <text x="142" y="980" font-family="Chalkboard SE" font-size="14" fill="#713f12">new MAINTENANCE / ADMIN state = new class,</text>
    <text x="142" y="1004" font-family="Chalkboard SE" font-size="14" fill="#713f12">nothing else edited (Open/Closed).</text>
  </g>
  <circle cx="400" cy="866" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 1000 950)">
    <rect x="720" y="862" width="560" height="176" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="742" y="896" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">MONEY = BigDecimal (never double)</text>
    <text x="742" y="926" font-family="Chalkboard SE" font-size="14" fill="#713f12">0.1 + 0.2 != 0.3 in double &#8594; wrong change.</text>
    <text x="742" y="950" font-family="Chalkboard SE" font-size="14" fill="#713f12">compareTo for price vs balance (not ==).</text>
    <text x="742" y="980" font-family="Chalkboard SE" font-size="14" fill="#713f12">scale = 2, RoundingMode.HALF_UP.</text>
    <text x="742" y="1004" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">faster alt: track long cents, format on display.</text>
  </g>
  <circle cx="1000" cy="866" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1690 950)">
    <rect x="1360" y="862" width="700" height="176" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1382" y="896" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">PATTERNS TO NAME + FOLLOW-UPS:</text>
    <text x="1382" y="926" font-family="Chalkboard SE" font-size="14" fill="#14532d">State (lifecycle) &#183; Facade (VendingMachine API)</text>
    <text x="1382" y="950" font-family="Chalkboard SE" font-size="14" fill="#713f12">exact-change feasibility check before accepting money</text>
    <text x="1382" y="980" font-family="Chalkboard SE" font-size="14" fill="#713f12">admin RefillState &#183; concurrent users &#8594; synchronized</text>
    <text x="1382" y="1004" font-family="Chalkboard SE" font-size="14" fill="#713f12">persistent inventory &#8594; repo behind slots (state unchanged)</text>
  </g>
  <circle cx="1690" cy="866" r="7" fill="#dc2626"/>

  <!-- WHITEBOARD ORDER -->
  <text x="60" y="1082" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="1082" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; IDLE &#8594; insert &#8594; &#9313; HAS_MONEY &#8594; select &#8594; &#9314; PRODUCT_SELECTED &#8594; dispense &#8594; &#9315; DISPENSING (change + stock--) &#8594; auto-reset &#183; cancel refunds along the way</text>

  <!-- LEGEND -->
  <rect x="60" y="1108" width="2020" height="96" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="1164" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="240" y="1128" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="274" y="1146">live state</text>
    <rect x="240" y="1168" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="274" y="1186">dispense / success</text>
    <rect x="470" y="1128" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="504" y="1146">State-pattern class</text>
    <rect x="470" y="1168" width="24" height="24" rx="5" fill="none" stroke="#15803d" stroke-width="3"/><text x="504" y="1186">change-making</text>
    <path d="M720,1140 L784,1140" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/><text x="798" y="1146">transition</text>
    <path d="M720,1180 L784,1180" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="8,5" fill="none" marker-end="url(#ahr)"/><text x="798" y="1186">cancel / refund</text>
    <path d="M990,1180 L1054,1180" stroke="#7e22ce" stroke-width="2.4" stroke-dasharray="8,6" fill="none" marker-end="url(#triv)"/><text x="1068" y="1186">implements</text>
    <rect x="990" y="1128" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.4"/><text x="1024" y="1146">interview insight</text>
    <circle cx="1252" cy="1140" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1252" y="1145" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1274" y="1146">story step</text>
    <text x="1560" y="1146" fill="#6b7280">Patterns: State &#183; Facade</text>
    <text x="1560" y="1186" fill="#6b7280">Vending Machine — LLD (state machine + change-making)</text>
  </g>
</svg>
