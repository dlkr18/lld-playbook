<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1330" viewBox="0 0 2140 1330">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahd" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="triv" markerWidth="17" markerHeight="15" refX="15" refY="7.5" orient="auto"><path d="M1,1 L15,7.5 L1,14 z" fill="#fff" stroke="#7e22ce" stroke-width="2"/></marker>
  </defs>
  <rect width="2140" height="1330" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">TIC TAC TOE — GAME STATE + O(1) WIN CHECK</text>
  <path d="M470,68 Q1070,84 1670,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- START -->
  <circle cx="60" cy="210" r="13" fill="#111"/>
  <text x="62" y="190" font-family="Chalkboard SE" font-size="12.5" fill="#111">new game</text>
  <path d="M74,210 L116,210" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- (1) NOT_STARTED -->
  <rect x="120" y="140" width="340" height="140" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <circle cx="148" cy="122" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="148" y="129" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <text x="300" y="176" font-family="Chalkboard SE" font-size="19" fill="#2563eb" text-anchor="middle" font-weight="bold">NOT_STARTED</text>
  <path d="M134,190 L446,190" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="218" font-family="Chalkboard SE" font-size="14" fill="#111">empty board, X moves first</text>
  <text x="140" y="248" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">only start() is legal here</text>

  <!-- (2) IN_PROGRESS -->
  <rect x="620" y="140" width="380" height="140" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <circle cx="648" cy="122" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="648" y="129" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">2</text>
  <text x="810" y="176" font-family="Chalkboard SE" font-size="19" fill="#2563eb" text-anchor="middle" font-weight="bold">IN_PROGRESS</text>
  <path d="M634,190 L986,190" stroke="#2563eb" stroke-width="2"/>
  <text x="640" y="218" font-family="Chalkboard SE" font-size="14" fill="#111">place mark, check win/draw, switch</text>
  <text x="640" y="248" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">WinChecker runs in O(1) after each move</text>

  <!-- transitions -->
  <path d="M460,210 L616,210" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="470" y="198" font-family="Chalkboard SE" font-size="13" fill="#111" font-weight="bold">start()</text>
  <!-- self loop -->
  <path d="M790,140 C790,116 830,116 830,140" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#ahb)"/>
  <text x="842" y="126" font-family="Chalkboard SE" font-size="12" fill="#2563eb">valid move &#8635; switch player</text>

  <!-- (3) terminals -->
  <rect x="1180" y="110" width="360" height="106" rx="12" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <circle cx="1208" cy="92" r="15" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="1208" y="99" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">3</text>
  <text x="1360" y="146" font-family="Chalkboard SE" font-size="18" fill="#16a34a" text-anchor="middle" font-weight="bold">X_WON</text>
  <path d="M1194,158 L1526,158" stroke="#16a34a" stroke-width="1.8"/>
  <text x="1200" y="184" font-family="Chalkboard SE" font-size="13.5" fill="#111">X completed a row / col / diagonal</text>
  <text x="1200" y="206" font-family="Chalkboard SE" font-size="12" fill="#6b7280">terminal — reset() to replay</text>

  <rect x="1180" y="233" width="360" height="106" rx="12" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <text x="1360" y="269" font-family="Chalkboard SE" font-size="18" fill="#16a34a" text-anchor="middle" font-weight="bold">O_WON</text>
  <path d="M1194,281 L1526,281" stroke="#16a34a" stroke-width="1.8"/>
  <text x="1200" y="307" font-family="Chalkboard SE" font-size="13.5" fill="#111">O completed a line</text>
  <text x="1200" y="329" font-family="Chalkboard SE" font-size="12" fill="#6b7280">terminal</text>

  <rect x="1180" y="356" width="360" height="106" rx="12" fill="none" stroke="#6b7280" stroke-width="3.2"/>
  <text x="1360" y="392" font-family="Chalkboard SE" font-size="18" fill="#6b7280" text-anchor="middle" font-weight="bold">DRAW</text>
  <path d="M1194,404 L1526,404" stroke="#6b7280" stroke-width="1.8"/>
  <text x="1200" y="430" font-family="Chalkboard SE" font-size="13.5" fill="#111">board full, no line made</text>
  <text x="1200" y="452" font-family="Chalkboard SE" font-size="12" fill="#6b7280">terminal — no winner</text>

  <!-- fan arrows -->
  <path d="M1000,188 L1176,158" stroke="#16a34a" stroke-width="2.8" fill="none" marker-end="url(#ahg)"/>
  <text x="1018" y="150" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" font-weight="bold">X completes line</text>
  <path d="M1000,210 L1176,285" stroke="#16a34a" stroke-width="2.8" fill="none" marker-end="url(#ahg)"/>
  <text x="1012" y="243" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" font-weight="bold">O completes line</text>
  <path d="M1000,232 L1176,405" stroke="#6b7280" stroke-width="2.8" fill="none" marker-end="url(#ahd)"/>
  <text x="1008" y="392" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" font-weight="bold">board full &#8594; draw</text>

  <!-- reset arc -->
  <path d="M1360,462 C1360,560 300,560 290,282" stroke="#6b7280" stroke-width="2.6" stroke-dasharray="9,6" fill="none" marker-end="url(#ahd)"/>
  <text x="825" y="552" font-family="Chalkboard SE" font-size="13.5" fill="#6b7280" text-anchor="middle" font-weight="bold">reset() — from any terminal &#8594; NOT_STARTED (fresh board)</text>

  <!-- ===== STATE + COMMAND cluster ===== -->
  <rect x="120" y="590" width="1150" height="370" rx="16" fill="none" stroke="#7e22ce" stroke-width="3" stroke-dasharray="14,9"/>
  <text x="150" y="622" font-family="Marker Felt" font-size="20" fill="#7e22ce" font-weight="bold">STATE + COMMAND — game flow &amp; undo</text>

  <!-- interface -->
  <rect x="330" y="642" width="470" height="150" rx="10" fill="none" stroke="#7e22ce" stroke-width="3"/>
  <text x="565" y="672" font-family="Chalkboard SE" font-size="16.5" fill="#111" text-anchor="middle" font-weight="bold">&#171;interface&#187; GameState</text>
  <path d="M344,684 L786,684" stroke="#7e22ce" stroke-width="2"/>
  <text x="352" y="710" font-family="Chalkboard SE" font-size="14" fill="#111">makeMove(pos): MoveResult &#183; start()</text>
  <text x="352" y="740" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">TicTacToe delegates each op to the current phase</text>
  <text x="352" y="762" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">FinishedState.makeMove() &#8594; error, board untouched</text>

  <!-- MoveHistory (Command) -->
  <rect x="840" y="642" width="400" height="150" rx="10" fill="none" stroke="#7e22ce" stroke-width="3"/>
  <text x="1040" y="672" font-family="Chalkboard SE" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">MoveHistory — COMMAND</text>
  <path d="M854,684 L1226,684" stroke="#7e22ce" stroke-width="2"/>
  <text x="862" y="710" font-family="Chalkboard SE" font-size="14" fill="#111">Deque&lt;Move&gt; pushed each move</text>
  <text x="862" y="732" font-family="Chalkboard SE" font-size="14" fill="#111">undo(): pop &#8594; clear cell &#8594;</text>
  <text x="862" y="754" font-family="Chalkboard SE" font-size="14" fill="#111">unregister counters &#8594; restore turn</text>
  <text x="862" y="780" font-family="Chalkboard SE" font-size="12" fill="#6b7280">vs full board snapshots (memory heavy)</text>

  <!-- concrete states -->
  <rect x="150" y="835" width="300" height="100" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="300" y="866" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">NotStartedState</text>
  <text x="300" y="896" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">only start() legal</text>

  <rect x="470" y="835" width="330" height="100" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="635" y="866" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">InProgressState</text>
  <text x="635" y="896" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">place &#183; check win/draw &#183; switch</text>

  <rect x="820" y="835" width="300" height="100" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="970" y="866" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">FinishedState</text>
  <text x="970" y="896" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">moves rejected (error result)</text>

  <!-- implements arrows -->
  <path d="M300,835 L470,796" stroke="#7e22ce" stroke-width="2.2" stroke-dasharray="8,6" fill="none" marker-end="url(#triv)"/>
  <path d="M635,835 L590,796" stroke="#7e22ce" stroke-width="2.2" stroke-dasharray="8,6" fill="none" marker-end="url(#triv)"/>
  <path d="M970,835 L680,796" stroke="#7e22ce" stroke-width="2.2" stroke-dasharray="8,6" fill="none" marker-end="url(#triv)"/>

  <!-- ===== O(1) WIN DETECTION (star) ===== -->
  <rect x="1300" y="590" width="760" height="228" rx="12" fill="none" stroke="#15803d" stroke-width="3.2"/>
  <text x="1320" y="622" font-family="Marker Felt" font-size="19" fill="#15803d" font-weight="bold">O(1) WIN DETECTION — incremental counters</text>
  <path d="M1314,634 L2046,634" stroke="#15803d" stroke-width="2"/>
  <text x="1320" y="662" font-family="Chalkboard SE" font-size="14" fill="#111">per-player tallies, never a full board rescan:</text>
  <text x="1320" y="686" font-family="Chalkboard SE" font-size="14" fill="#111">rowCount[r] &#183; colCount[c] &#183; diag &#183; antiDiag</text>
  <text x="1320" y="710" font-family="Chalkboard SE" font-size="14" fill="#111">move (r,c) bumps only the &#8804; 4 lines it touches</text>
  <text x="1320" y="734" font-family="Chalkboard SE" font-size="14" fill="#111">win when any tally reaches N (= 3)</text>
  <text x="1320" y="762" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">undo decrements the same counters — still O(1) per move</text>
  <text x="1320" y="796" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">naive O(N&#178;) board scan is the anti-pattern here</text>

  <!-- mini 3x3 grid -->
  <g font-family="Chalkboard SE" font-weight="bold">
    <rect x="1880" y="648" width="150" height="150" rx="6" fill="none" stroke="#111" stroke-width="2"/>
    <path d="M1930,648 L1930,798 M1980,648 L1980,798 M1880,698 L2030,698 M1880,748 L2030,748" stroke="#111" stroke-width="1.6"/>
    <rect x="1880" y="648" width="150" height="50" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="2.6"/>
    <text x="1905" y="686" font-size="26" fill="#16a34a" text-anchor="middle">X</text>
    <text x="1955" y="686" font-size="26" fill="#16a34a" text-anchor="middle">X</text>
    <text x="2005" y="686" font-size="26" fill="#16a34a" text-anchor="middle">X</text>
    <text x="1905" y="736" font-size="26" fill="#ea580c" text-anchor="middle">O</text>
    <text x="1955" y="736" font-size="26" fill="#ea580c" text-anchor="middle">O</text>
    <text x="1955" y="642" font-size="11.5" fill="#15803d" text-anchor="middle">rowCount[0]=3 &#8594; win</text>
  </g>

  <!-- ===== BOARD / N×N box ===== -->
  <rect x="1300" y="838" width="760" height="122" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1320" y="870" font-family="Marker Felt" font-size="19" fill="#2563eb" font-weight="bold">BOARD &amp; N×N GENERALISATION</text>
  <path d="M1314,882 L2046,882" stroke="#2563eb" stroke-width="2"/>
  <text x="1320" y="910" font-family="Chalkboard SE" font-size="14" fill="#111">char[][] grid &#183; Position parses 'a1'–'c3' &#8594; (row,col)</text>
  <text x="1320" y="936" font-family="Chalkboard SE" font-size="13" fill="#6b7280">3×3 today &#8594; N×N: same counters sized N; diagonals only when r==c / r+c==N-1</text>

  <!-- ===== STICKIES ===== -->
  <g transform="rotate(-2 400 1085)">
    <rect x="120" y="1000" width="560" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="142" y="1034" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">WIN CHECK: O(1), NOT O(N&#178;)</text>
    <text x="142" y="1064" font-family="Chalkboard SE" font-size="14" fill="#713f12">naive rescans the whole board every move.</text>
    <text x="142" y="1088" font-family="Chalkboard SE" font-size="14" fill="#713f12">counters touch only the lines the last</text>
    <text x="142" y="1112" font-family="Chalkboard SE" font-size="14" fill="#713f12">move affects — that's the answer they</text>
    <text x="142" y="1136" font-family="Chalkboard SE" font-size="14" fill="#713f12">are listening for.</text>
  </g>
  <circle cx="400" cy="1004" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 1000 1085)">
    <rect x="720" y="1000" width="560" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="742" y="1034" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">STATE vs enum + switch</text>
    <text x="742" y="1064" font-family="Chalkboard SE" font-size="14" fill="#713f12">FinishedState rejects moves with no</text>
    <text x="742" y="1088" font-family="Chalkboard SE" font-size="14" fill="#713f12">if-chain in the orchestrator — each</text>
    <text x="742" y="1112" font-family="Chalkboard SE" font-size="14" fill="#713f12">phase owns its own rules.</text>
    <text x="742" y="1136" font-family="Chalkboard SE" font-size="14" fill="#713f12">new phase = new class (Open/Closed).</text>
  </g>
  <circle cx="1000" cy="1004" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1690 1085)">
    <rect x="1360" y="1000" width="700" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1382" y="1034" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">PATTERNS TO NAME + FOLLOW-UPS:</text>
    <text x="1382" y="1064" font-family="Chalkboard SE" font-size="14" fill="#14532d">State (phases) &#183; Command (undo) &#183; incremental win check</text>
    <text x="1382" y="1090" font-family="Chalkboard SE" font-size="14" fill="#713f12">N×N board &#183; minimax AI reuses WinChecker for leaf eval</text>
    <text x="1382" y="1116" font-family="Chalkboard SE" font-size="14" fill="#713f12">online play &#8594; synchronized makeMove / per-game lock</text>
    <text x="1382" y="1142" font-family="Chalkboard SE" font-size="14" fill="#713f12">redo &#8594; second stack &#183; Connect-4 changes placement rule</text>
  </g>
  <circle cx="1690" cy="1004" r="7" fill="#dc2626"/>

  <!-- WHITEBOARD ORDER -->
  <text x="60" y="1216" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="1216" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; NOT_STARTED &#8594; start() &#8594; &#9313; IN_PROGRESS (valid move &#8594; switch, WinChecker O(1)) &#8594; &#9314; X_WON / O_WON / DRAW &#8594; reset() &#183; undo pops last move</text>

  <!-- LEGEND -->
  <rect x="60" y="1242" width="2020" height="76" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="1288" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="240" y="1268" width="22" height="22" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="272" y="1285">phase (live)</text>
    <rect x="430" y="1268" width="22" height="22" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="462" y="1285">win terminal</text>
    <rect x="620" y="1268" width="22" height="22" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/><text x="652" y="1285">draw</text>
    <rect x="760" y="1268" width="22" height="22" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="792" y="1285">State / Command class</text>
    <path d="M1010,1279 L1070,1279" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/><text x="1084" y="1285">transition</text>
    <path d="M1230,1279 L1290,1279" stroke="#6b7280" stroke-width="2.6" stroke-dasharray="9,6" fill="none" marker-end="url(#ahd)"/><text x="1304" y="1285">reset()</text>
    <path d="M1430,1279 L1490,1279" stroke="#7e22ce" stroke-width="2.4" stroke-dasharray="8,6" fill="none" marker-end="url(#triv)"/><text x="1504" y="1285">implements</text>
    <rect x="1650" y="1268" width="22" height="22" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.4"/><text x="1682" y="1285">insight</text>
    <text x="1800" y="1285" fill="#6b7280">State &#183; Command &#183; O(1) win</text>
  </g>
</svg>
