<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1300" viewBox="0 0 2140 1300">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
  </defs>
  <rect width="2140" height="1300" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">PUB / SUB — MESSAGE FLOW &amp; FAN-OUT</text>
  <path d="M560,68 Q1070,84 1580,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- STORY CIRCLES -->
  <circle cx="95" cy="150" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="95" y="157" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <circle cx="418" cy="150" r="15" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="418" y="157" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">2</text>
  <circle cx="1098" cy="150" r="15" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="1098" y="157" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">3</text>
  <circle cx="1490" cy="150" r="15" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="1490" y="157" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">4</text>

  <!-- PUBLISHER -->
  <rect x="70" y="170" width="250" height="120" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="195" y="202" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">PUBLISHER</text>
  <path d="M84,214 L306,214" stroke="#2563eb" stroke-width="2"/>
  <text x="90" y="244" font-family="Chalkboard SE" font-size="13.5" fill="#111">publish(topic, msg)</text>
  <text x="90" y="272" font-family="Chalkboard SE" font-size="12" fill="#6b7280">never blocks · O(1) offer</text>

  <!-- BROKER -->
  <rect x="400" y="170" width="300" height="120" rx="12" fill="none" stroke="#7e22ce" stroke-width="3.2"/>
  <text x="550" y="202" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">BROKER — PubSubSystem</text>
  <path d="M414,214 L686,214" stroke="#7e22ce" stroke-width="2"/>
  <text x="420" y="244" font-family="Chalkboard SE" font-size="13.5" fill="#111">Singleton · topic registry</text>
  <text x="420" y="272" font-family="Chalkboard SE" font-size="12" fill="#6b7280">messageQueue.offer(msg)</text>

  <!-- QUEUE -->
  <rect x="780" y="170" width="230" height="120" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="895" y="200" font-family="Chalkboard SE" font-size="15" fill="#2563eb" text-anchor="middle" font-weight="bold">BlockingQueue</text>
  <path d="M794,210 L996,210" stroke="#2563eb" stroke-width="2"/>
  <rect x="800" y="226" width="42" height="34" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <rect x="850" y="226" width="42" height="34" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <rect x="900" y="226" width="42" height="34" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <rect x="950" y="226" width="42" height="34" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="895" y="282" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">FIFO buffer</text>

  <!-- PROCESSOR -->
  <rect x="1080" y="170" width="330" height="120" rx="12" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <text x="1245" y="198" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">MESSAGE PROCESSOR</text>
  <path d="M1094,208 L1396,208" stroke="#16a34a" stroke-width="2"/>
  <text x="1100" y="234" font-family="Chalkboard SE" font-size="13.5" fill="#111">background thread loop</text>
  <text x="1100" y="256" font-family="Chalkboard SE" font-size="13.5" fill="#111">take() &#8594; deliverMessage()</text>
  <text x="1100" y="282" font-family="Chalkboard SE" font-size="12" fill="#6b7280">lookup topicSubscribers.get(topic)</text>

  <!-- flow arrows -->
  <path d="M320,230 L398,230" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="359" y="218" font-family="Chalkboard SE" font-size="12" fill="#111" text-anchor="middle">publish</text>
  <path d="M700,230 L778,230" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="739" y="218" font-family="Chalkboard SE" font-size="12" fill="#111" text-anchor="middle">offer()</text>
  <path d="M1010,230 L1078,230" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="1044" y="218" font-family="Chalkboard SE" font-size="12" fill="#111" text-anchor="middle">take()</text>

  <!-- FAN-OUT -->
  <text x="1425" y="205" font-family="Chalkboard SE" font-size="12.5" fill="#ea580c" font-weight="bold">fan-out via ExecutorService</text>
  <path d="M1414,222 C1500,190 1560,172 1616,168" stroke="#ea580c" stroke-width="2.8" fill="none" marker-end="url(#aho)"/>
  <path d="M1414,240 C1500,285 1560,346 1616,348" stroke="#ea580c" stroke-width="2.8" fill="none" marker-end="url(#aho)"/>

  <!-- SUB A -->
  <rect x="1620" y="118" width="300" height="104" rx="12" fill="none" stroke="#ea580c" stroke-width="3.2"/>
  <text x="1770" y="148" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">Subscriber A</text>
  <path d="M1634,158 L1906,158" stroke="#ea580c" stroke-width="2"/>
  <text x="1640" y="184" font-family="Chalkboard SE" font-size="13.5" fill="#111">onMessage(msg)</text>
  <text x="1640" y="208" font-family="Chalkboard SE" font-size="12" fill="#6b7280">executor.submit(...)</text>

  <!-- SUB B -->
  <rect x="1620" y="298" width="300" height="104" rx="12" fill="none" stroke="#ea580c" stroke-width="3.2"/>
  <text x="1770" y="328" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">Subscriber B</text>
  <path d="M1634,338 L1906,338" stroke="#ea580c" stroke-width="2"/>
  <text x="1640" y="364" font-family="Chalkboard SE" font-size="13.5" fill="#111">onMessage(msg)</text>
  <text x="1640" y="388" font-family="Chalkboard SE" font-size="12" fill="#6b7280">runs in parallel — own pool thread</text>

  <!-- PUSH vs PULL cluster -->
  <rect x="100" y="460" width="1150" height="258" rx="16" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="14,9"/>
  <text x="128" y="496" font-family="Marker Felt" font-size="20" fill="#1e40af" font-weight="bold">PUSH vs PULL — two delivery models</text>

  <rect x="125" y="512" width="530" height="182" rx="10" fill="none" stroke="#16a34a" stroke-width="2.8"/>
  <text x="390" y="542" font-family="Chalkboard SE" font-size="15.5" fill="#16a34a" text-anchor="middle" font-weight="bold">PUSH — PubSubSystem</text>
  <path d="M139,552 L641,552" stroke="#16a34a" stroke-width="1.8"/>
  <text x="145" y="580" font-family="Chalkboard SE" font-size="13.5" fill="#111">broker owns a background thread</text>
  <text x="145" y="604" font-family="Chalkboard SE" font-size="13.5" fill="#111">take() &#8594; executor.submit(onMessage)</text>
  <text x="145" y="628" font-family="Chalkboard SE" font-size="13.5" fill="#111">subscriber = passive callback</text>
  <text x="145" y="656" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">low latency; broker controls the pace</text>
  <text x="145" y="680" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">slow subscriber can overwhelm the pool</text>

  <rect x="690" y="512" width="540" height="182" rx="10" fill="none" stroke="#ea580c" stroke-width="2.8"/>
  <text x="960" y="542" font-family="Chalkboard SE" font-size="15.5" fill="#ea580c" text-anchor="middle" font-weight="bold">PULL — InMemoryPubSubService</text>
  <path d="M704,552 L1216,552" stroke="#ea580c" stroke-width="1.8"/>
  <text x="710" y="580" font-family="Chalkboard SE" font-size="13.5" fill="#111">per-sub ConcurrentLinkedQueue inbox</text>
  <text x="710" y="604" font-family="Chalkboard SE" font-size="13.5" fill="#111">getMessages() + acknowledgeMessage()</text>
  <text x="710" y="628" font-family="Chalkboard SE" font-size="13.5" fill="#7e22ce" font-weight="bold">tracks per-subscriber OFFSET / cursor</text>
  <text x="710" y="656" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">consumer sets its own pace; unacked stays</text>
  <text x="710" y="680" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">slow consumer never blocks the others</text>

  <!-- THREAD SAFETY cluster -->
  <rect x="1290" y="460" width="740" height="258" rx="16" fill="none" stroke="#7e22ce" stroke-width="3" stroke-dasharray="14,9"/>
  <text x="1318" y="496" font-family="Marker Felt" font-size="20" fill="#7e22ce" font-weight="bold">THREAD SAFETY</text>
  <text x="1315" y="536" font-family="Chalkboard SE" font-size="14" fill="#111">ConcurrentHashMap&lt;topic, subs&gt; — registry</text>
  <text x="1315" y="562" font-family="Chalkboard SE" font-size="14" fill="#111">ConcurrentLinkedQueue — per-sub inbox</text>
  <text x="1315" y="588" font-family="Chalkboard SE" font-size="14" fill="#111">BlockingQueue — decouples pub &#8596; consumer</text>
  <text x="1315" y="614" font-family="Chalkboard SE" font-size="14" fill="#111">ExecutorService — async fan-out, no blocking</text>
  <text x="1315" y="648" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">ordering NOT guaranteed across pool threads:</text>
  <text x="1315" y="672" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">Sub A may process msg 2 before msg 1</text>
  <text x="1315" y="698" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">fix &#8594; single-thread executor per subscriber</text>

  <!-- STICKIES -->
  <g transform="rotate(-2 400 845)">
    <rect x="100" y="760" width="600" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="122" y="794" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">AT-LEAST-ONCE DELIVERY:</text>
    <text x="122" y="824" font-family="Chalkboard SE" font-size="14" fill="#713f12">pulled msg stays in the queue until</text>
    <text x="122" y="848" font-family="Chalkboard SE" font-size="14" fill="#713f12">acknowledgeMessage() is called.</text>
    <text x="122" y="872" font-family="Chalkboard SE" font-size="14" fill="#713f12">no ack before timeout &#8594; redeliver.</text>
    <text x="122" y="898" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">so consumers must be IDEMPOTENT (dedupe by id).</text>
  </g>
  <circle cx="400" cy="764" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 1030 845)">
    <rect x="730" y="760" width="600" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="752" y="794" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">PER-SUBSCRIBER OFFSET:</text>
    <text x="752" y="824" font-family="Chalkboard SE" font-size="14" fill="#713f12">each subscription has its own cursor +</text>
    <text x="752" y="848" font-family="Chalkboard SE" font-size="14" fill="#713f12">queue &#8594; independent read position.</text>
    <text x="752" y="872" font-family="Chalkboard SE" font-size="14" fill="#713f12">one slow / offline consumer does NOT</text>
    <text x="752" y="898" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">hold back the others (Kafka consumer-group idea).</text>
  </g>
  <circle cx="1030" cy="764" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1660 845)">
    <rect x="1360" y="760" width="600" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1382" y="794" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">WHY A BROKER QUEUE?</text>
    <text x="1382" y="824" font-family="Chalkboard SE" font-size="14" fill="#713f12">BlockingQueue decouples publishers from</text>
    <text x="1382" y="848" font-family="Chalkboard SE" font-size="14" fill="#713f12">subscribers — publish() is O(1), never waits.</text>
    <text x="1382" y="872" font-family="Chalkboard SE" font-size="14" fill="#713f12">the processor thread absorbs bursts and</text>
    <text x="1382" y="898" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">does the heavy fan-out work off the hot path.</text>
  </g>
  <circle cx="1660" cy="764" r="7" fill="#dc2626"/>

  <!-- WHITEBOARD ORDER -->
  <text x="100" y="990" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="310" y="990" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; publisher &#8594; &#9313; broker.offer() to BlockingQueue &#8594; &#9314; processor take() + lookup subscribers &#8594; &#9315; fan-out via ExecutorService (push) or per-sub queue + ack (pull)</text>

  <!-- LEGEND -->
  <rect x="100" y="1025" width="1930" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="128" y="1087" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="280" y="1061" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="314" y="1079">publisher / queue</text>
    <rect x="280" y="1107" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="314" y="1125">broker (Singleton)</text>
    <rect x="530" y="1061" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="564" y="1079">processor / push</text>
    <rect x="530" y="1107" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="564" y="1125">subscriber / pull</text>
    <rect x="770" y="1061" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="804" y="1079">interview insight</text>
    <path d="M770,1119 L830,1119" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/><text x="844" y="1125">flow</text>
    <path d="M990,1073 C1030,1060 1055,1085 1090,1073" stroke="#ea580c" stroke-width="2.8" fill="none" marker-end="url(#aho)"/><text x="1104" y="1079">fan-out (parallel)</text>
    <circle cx="1002" cy="1119" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1002" y="1124" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1024" y="1125">story step</text>
    <text x="1320" y="1079" fill="#6b7280">Patterns: Observer &#183; Strategy &#183; Singleton &#183; Repository</text>
    <text x="1320" y="1125" fill="#6b7280">Pub/Sub — LLD (broker, fan-out, push/pull, at-least-once)</text>
  </g>
</svg>
