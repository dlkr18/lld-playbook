<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1180" viewBox="0 0 2140 1180">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#16a34a"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
    <marker id="ahp" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#db2777"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
  </defs>

  <rect width="2140" height="1180" fill="#ffffff"/>

  <!-- ═════════ TITLE ═════════ -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">LOGGING SYSTEM — CENTRALIZED COLLECTION, STORAGE &amp; SEARCH</text>
  <path d="M360,68 Q1070,84 1780,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ═════════ 1: SERVICES (fan-in) ═════════ -->
  <circle cx="86" cy="150" r="14" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="86" y="157" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <text x="108" y="157" font-family="Marker Felt" font-size="19" fill="#2563eb" font-weight="bold">SERVICES — concurrent producers</text>

  <rect x="110" y="210" width="300" height="66" rx="10" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="260" y="240" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">Service A</text>
  <text x="260" y="262" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">Logger(INFO)</text>
  <rect x="110" y="292" width="300" height="66" rx="10" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="260" y="322" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">Service B</text>
  <text x="260" y="344" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">Logger(DEBUG)</text>
  <rect x="110" y="374" width="300" height="66" rx="10" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="260" y="404" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">Service C</text>
  <text x="260" y="426" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">Logger(WARN)</text>
  <text x="120" y="474" font-family="Chalkboard SE" font-size="13.5" fill="#111" font-weight="bold">… up to 10K+ concurrent threads</text>
  <text x="120" y="498" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">every service shares ONE backend instance</text>

  <!-- fan-in arrows -->
  <path d="M410,243 L496,318" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/>
  <path d="M410,325 L496,330" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/>
  <path d="M410,407 L496,344" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/>
  <text x="418" y="300" font-family="Chalkboard SE" font-size="12.5" fill="#111">log(level, msg, source)</text>

  <!-- ═════════ 2: CENTRAL SERVICE + STORE ═════════ -->
  <rect x="500" y="150" width="900" height="548" rx="16" fill="none" stroke="#7e22ce" stroke-width="3.2"/>
  <circle cx="530" cy="180" r="14" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="530" y="187" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">2</text>
  <text x="556" y="187" font-family="Marker Felt" font-size="19" fill="#7e22ce" font-weight="bold">CentralizedLoggingService — SINGLETON (one aggregation point)</text>

  <!-- ingest flow -->
  <rect x="540" y="222" width="250" height="64" rx="9" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="665" y="250" font-family="Chalkboard SE" font-size="13.5" fill="#111" text-anchor="middle" font-weight="bold">log(level,msg,source)</text>
  <text x="665" y="272" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">ingest entry point</text>

  <rect x="828" y="222" width="282" height="64" rx="9" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="969" y="250" font-family="Chalkboard SE" font-size="13.5" fill="#111" text-anchor="middle" font-weight="bold">build LogEntry (+ ts + thread)</text>
  <text x="969" y="272" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">immutable · captured at log time</text>

  <rect x="1148" y="222" width="230" height="64" rx="9" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1263" y="250" font-family="Chalkboard SE" font-size="13.5" fill="#111" text-anchor="middle" font-weight="bold">queue.offer(entry)</text>
  <text x="1263" y="272" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">lock-free O(1)</text>

  <path d="M790,254 L824,254" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ahv)"/>
  <path d="M1110,254 L1144,254" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ahv)"/>

  <!-- queue -->
  <text x="540" y="322" font-family="Chalkboard SE" font-size="15" fill="#db2777" font-weight="bold">ConcurrentLinkedQueue&lt;LogEntry&gt; — bounded ring buffer (maxLogSize)</text>
  <g font-family="Chalkboard SE" font-size="12" fill="#111" text-anchor="middle">
    <rect x="540" y="338" width="96" height="50" rx="6" fill="none" stroke="#db2777" stroke-width="2.4"/><text x="588" y="368">#1</text>
    <rect x="644" y="338" width="96" height="50" rx="6" fill="none" stroke="#db2777" stroke-width="2.4"/><text x="692" y="368">#2</text>
    <rect x="748" y="338" width="96" height="50" rx="6" fill="none" stroke="#db2777" stroke-width="2.4"/><text x="796" y="368">#3</text>
    <rect x="852" y="338" width="96" height="50" rx="6" fill="none" stroke="#db2777" stroke-width="2.4"/><text x="900" y="368">#4</text>
    <rect x="956" y="338" width="96" height="50" rx="6" fill="none" stroke="#db2777" stroke-width="2.4"/><text x="1004" y="368">#5</text>
    <rect x="1060" y="338" width="96" height="50" rx="6" fill="none" stroke="#db2777" stroke-width="2.4"/><text x="1108" y="368">…</text>
    <rect x="1164" y="338" width="96" height="50" rx="6" fill="none" stroke="#db2777" stroke-width="2.4"/><text x="1212" y="368">#N</text>
  </g>
  <text x="588" y="408" font-family="Chalkboard SE" font-size="12" fill="#dc2626" text-anchor="middle" font-weight="bold">head (oldest)</text>
  <text x="1212" y="408" font-family="Chalkboard SE" font-size="12" fill="#16a34a" text-anchor="middle" font-weight="bold">tail (newest)</text>

  <!-- offer -> tail -->
  <path d="M1263,286 L1263,318 L1212,318 L1212,334" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ahv)"/>

  <!-- eviction -->
  <path d="M588,388 L588,436" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="612" y="428" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">RETENTION — while size &gt; maxLogSize:</text>
  <text x="612" y="452" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">poll() head &#8594; oldest LogEntry evicted (GC)</text>
  <text x="540" y="452" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" text-anchor="middle">evict</text>

  <!-- notes -->
  <path d="M540,486 L1360,486" stroke="#e5e7eb" stroke-width="2"/>
  <text x="540" y="516" font-family="Chalkboard SE" font-size="14" fill="#15803d" font-weight="bold">lock-free CAS offer()/poll() · O(1) · NEVER blocks producers, even at 10K+ threads &#10003;</text>
  <text x="540" y="544" font-family="Chalkboard SE" font-size="13" fill="#111">thread name + timestamp stamped at ingest &#8594; accurate tracing when read later</text>
  <text x="540" y="568" font-family="Chalkboard SE" font-size="13" fill="#111">one shared instance = a single searchable store across ALL services</text>
  <text x="540" y="596" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">write path (ingest) and read path (query) hit the same queue — decoupled access</text>
  <text x="540" y="640" font-family="Chalkboard SE" font-size="13" fill="#7e22ce" font-weight="bold">getLogCount() — O(1) with an AtomicLong counter (queue.size() is O(n))</text>
  <text x="540" y="668" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">clearLogs() purges the queue for maintenance windows</text>

  <!-- ═════════ 3: QUERY & SEARCH (fan-out reads) ═════════ -->
  <circle cx="1456" cy="180" r="14" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="1456" y="187" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">3</text>
  <text x="1482" y="187" font-family="Marker Felt" font-size="19" fill="#16a34a" font-weight="bold">QUERY &amp; SEARCH (reads)</text>

  <rect x="1456" y="222" width="600" height="66" rx="10" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="1476" y="250" font-family="Chalkboard SE" font-size="15" fill="#111" font-weight="bold">getLogsByLevel(level)</text>
  <text x="1476" y="272" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">filter level == X · alerting dashboards</text>

  <rect x="1456" y="300" width="600" height="66" rx="10" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="1476" y="328" font-family="Chalkboard SE" font-size="15" fill="#111" font-weight="bold">getLogsBySource(source)</text>
  <text x="1476" y="350" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">all logs from one service</text>

  <rect x="1456" y="378" width="600" height="66" rx="10" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="1476" y="406" font-family="Chalkboard SE" font-size="15" fill="#111" font-weight="bold">searchLogs(keyword)</text>
  <text x="1476" y="428" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">case-insensitive · message + source</text>

  <rect x="1456" y="456" width="600" height="66" rx="10" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="1476" y="484" font-family="Chalkboard SE" font-size="15" fill="#111" font-weight="bold">getRecentLogs(n)</text>
  <text x="1476" y="506" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">tail — last n entries (like tail -n)</text>

  <!-- store -> query fan-out -->
  <path d="M1400,360 L1428,360 L1428,255 L1452,255" stroke="#16a34a" stroke-width="2.6" fill="none" marker-end="url(#ahg)"/>
  <path d="M1428,360 L1428,333 L1452,333" stroke="#16a34a" stroke-width="2.6" fill="none" marker-end="url(#ahg)"/>
  <path d="M1428,360 L1452,360" stroke="#16a34a" stroke-width="2.6" fill="none" marker-end="url(#ahg)"/>
  <path d="M1428,360 L1428,411 L1452,411" stroke="#16a34a" stroke-width="2.6" fill="none" marker-end="url(#ahg)"/>
  <path d="M1428,360 L1428,489 L1452,489" stroke="#16a34a" stroke-width="2.6" fill="none" marker-end="url(#ahg)"/>
  <text x="1300" y="352" font-family="Chalkboard SE" font-size="12.5" fill="#16a34a" font-weight="bold">scan queue</text>

  <!-- results -->
  <rect x="1610" y="566" width="340" height="74" rx="10" fill="none" stroke="#15803d" stroke-width="3.2"/>
  <text x="1780" y="596" font-family="Chalkboard SE" font-size="15.5" fill="#15803d" text-anchor="middle" font-weight="bold">List&lt;LogEntry&gt; results</text>
  <text x="1780" y="620" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">stream · filter · collect</text>
  <path d="M1780,522 L1780,562" stroke="#16a34a" stroke-width="2.6" fill="none" marker-end="url(#ahg)"/>
  <text x="1456" y="666" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">each op = O(n) stream scan over the queue &#8594; build an</text>
  <text x="1456" y="686" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">inverted index (Lucene / ES) for O(1) keyword search</text>

  <!-- ═════════ STICKY A: LOCK-FREE ═════════ -->
  <g transform="rotate(-2 320 800)">
    <rect x="150" y="736" width="360" height="128" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="170" y="766" font-family="Chalkboard SE" font-size="15" fill="#713f12" font-weight="bold">WHY ConcurrentLinkedQueue?</text>
    <text x="170" y="792" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">lock-free (CAS), not two ReentrantLocks</text>
    <text x="170" y="814" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">like LinkedBlockingQueue. The write</text>
    <text x="170" y="836" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">path must NEVER block the caller.</text>
    <text x="170" y="858" font-family="Chalkboard SE" font-size="12.5" fill="#92710c">accept memory overhead for speed</text>
  </g>
  <circle cx="320" cy="740" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY B: RETENTION ═════════ -->
  <g transform="rotate(1.5 900 800)">
    <rect x="730" y="736" width="360" height="128" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="750" y="766" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">RETENTION STRATEGIES:</text>
    <text x="750" y="792" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">size (now) · time (scheduled purge)</text>
    <text x="750" y="814" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">level (keep ERROR/FATAL longer)</text>
    <text x="750" y="836" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">tiered: hot (mem) → warm (disk) → cold (S3)</text>
    <text x="750" y="858" font-family="Chalkboard SE" font-size="12.5" fill="#92710c">FIFO eviction is the default</text>
  </g>
  <circle cx="900" cy="740" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY C: SEARCH SCALING ═════════ -->
  <g transform="rotate(-1.5 1490 800)">
    <rect x="1320" y="736" width="360" height="128" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1340" y="766" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">SCALING THE READS:</text>
    <text x="1340" y="792" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">O(n) scan is fine for monitoring.</text>
    <text x="1340" y="814" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">tokenize on write → inverted index</text>
    <text x="1340" y="836" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">(token → Set&lt;LogEntry&gt;) for O(1) search.</text>
    <text x="1340" y="858" font-family="Chalkboard SE" font-size="12.5" fill="#92710c">shard + Kafka transport for scale-out</text>
  </g>
  <circle cx="1490" cy="740" r="7" fill="#dc2626"/>

  <!-- fan-in note -->
  <text x="1740" y="770" font-family="Chalkboard SE" font-size="15" fill="#db2777" font-weight="bold">Ingest ≠ Query</text>
  <text x="1740" y="796" font-family="Chalkboard SE" font-size="13.5" fill="#111">writes fan IN from many</text>
  <text x="1740" y="820" font-family="Chalkboard SE" font-size="13.5" fill="#111">services; reads fan OUT</text>
  <text x="1740" y="844" font-family="Chalkboard SE" font-size="13.5" fill="#111">to query ops — one store. &#10003;</text>

  <!-- ═════════ read-order strip ═════════ -->
  <text x="60" y="922" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="922" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; many services log() into &#9313; the Singleton: build LogEntry &#8594; offer to the bounded queue (evict oldest when full) &#8594; &#9314; query/search reads scan the store &#8594; List&lt;LogEntry&gt;</text>

  <!-- ═════════ LEGEND ═════════ -->
  <rect x="50" y="960" width="2040" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="80" y="1020" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="230" y="995" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/>
    <text x="264" y="1013">services (producers)</text>
    <rect x="230" y="1040" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/>
    <text x="264" y="1058">central store (Singleton)</text>
    <rect x="530" y="995" width="24" height="24" rx="5" fill="none" stroke="#db2777" stroke-width="3"/>
    <text x="564" y="1013">bounded queue cell</text>
    <rect x="530" y="1040" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/>
    <text x="564" y="1058">query / results</text>
    <rect x="800" y="1040" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/>
    <text x="834" y="1058">interview insight</text>
    <path d="M800,1007 L870,1007" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/>
    <text x="884" y="1013">log / fan-in</text>
    <path d="M1100,1007 L1170,1007" stroke="#16a34a" stroke-width="2.8" fill="none" marker-end="url(#ahg)"/>
    <text x="1184" y="1013">query read</text>
    <path d="M1100,1052 L1170,1052" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
    <text x="1184" y="1058">evict oldest</text>
    <circle cx="1420" cy="1007" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/>
    <text x="1420" y="1012" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="13">n</text>
    <text x="1446" y="1013">story step (read &#9312;&#8594;&#9314;)</text>
    <text x="1420" y="1058" fill="#6b7280">Patterns: Singleton · Strategy · Observer · lock-free store</text>
    <text x="1720" y="1013" fill="#6b7280">Logging System — collection &amp; search (LLD)</text>
  </g>
</svg>
