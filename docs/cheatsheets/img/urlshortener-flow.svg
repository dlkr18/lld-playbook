<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1360" viewBox="0 0 2140 1360">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahp" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#db2777"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
  </defs>

  <rect width="2140" height="1360" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="45" fill="#1e40af" text-anchor="middle" font-weight="bold">URL SHORTENER — WRITE PATH + READ PATH</text>
  <path d="M600,68 Q1070,84 1540,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ═════════ (1) SHORTEN — write path ═════════ -->
  <rect x="60" y="95" width="640" height="480" rx="14" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <circle cx="88" cy="123" r="14" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="88" y="130" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">1</text>
  <text x="112" y="130" font-family="Marker Felt" font-size="19" fill="#16a34a" font-weight="bold">SHORTEN — write path</text>

  <g font-family="Chalkboard SE" font-size="13.5" text-anchor="middle">
    <rect x="80" y="158" width="590" height="44" rx="9" fill="none" stroke="#111" stroke-width="2.6"/><text x="375" y="185" fill="#111">client &#8594; POST /shorten  { longURL }</text>
    <rect x="80" y="218" width="590" height="44" rx="9" fill="none" stroke="#6b7280" stroke-width="2.6"/><text x="375" y="245" fill="#111">normalize: lowercase host · strip trailing /</text>
    <rect x="80" y="278" width="590" height="44" rx="9" fill="none" stroke="#16a34a" stroke-width="2.8"/><text x="375" y="305" fill="#15803d" font-weight="bold">longToShort.get(url) present? &#8594; return it (idempotent)</text>
    <rect x="80" y="338" width="590" height="44" rx="9" fill="none" stroke="#ea580c" stroke-width="2.8"/><text x="375" y="365" fill="#111">id = counter.getAndIncrement()   &#8592; Strategy</text>
    <rect x="80" y="398" width="590" height="44" rx="9" fill="none" stroke="#2563eb" stroke-width="2.8"/><text x="375" y="425" fill="#111">code = Base62.encode(id)   e.g. &#8594; "4c92"</text>
    <rect x="80" y="458" width="590" height="44" rx="9" fill="none" stroke="#16a34a" stroke-width="2.8"/><text x="375" y="485" fill="#111">save shortToLong &amp; longToShort · 201 { shortURL }</text>
  </g>
  <g stroke="#16a34a" stroke-width="2.4" fill="none">
    <path d="M375,202 L375,214" marker-end="url(#ahg)"/>
    <path d="M375,262 L375,274" marker-end="url(#ahg)"/>
    <path d="M375,322 L375,334" marker-end="url(#ahg)"/>
    <path d="M375,382 L375,394" marker-end="url(#ahg)"/>
    <path d="M375,442 L375,454" marker-end="url(#ahg)"/>
  </g>
  <text x="80" y="536" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">bidirectional maps in ConcurrentHashMap — thread-safe shorten/resolve</text>
  <text x="80" y="558" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">Repository seam → swap in Redis / Postgres for real persistence</text>

  <!-- ═════════ (2) RESOLVE — read path (redirect) ═════════ -->
  <rect x="730" y="95" width="640" height="480" rx="14" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <circle cx="758" cy="123" r="14" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="758" y="130" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">2</text>
  <text x="782" y="130" font-family="Marker Felt" font-size="19" fill="#2563eb" font-weight="bold">RESOLVE — read path (redirect)</text>

  <g font-family="Chalkboard SE" font-size="13.5" text-anchor="middle">
    <rect x="750" y="158" width="590" height="44" rx="9" fill="none" stroke="#111" stroke-width="2.6"/><text x="1045" y="185" fill="#111">client &#8594; GET /{code}   e.g. /4c92</text>
    <rect x="750" y="218" width="590" height="44" rx="9" fill="none" stroke="#2563eb" stroke-width="2.8"/><text x="1045" y="245" fill="#111">mapping = shortToLong.get(code)</text>
    <rect x="750" y="278" width="590" height="44" rx="9" fill="none" stroke="#dc2626" stroke-width="2.8"/><text x="1045" y="305" fill="#dc2626" font-weight="bold">found &amp; not expired (TTL)?   miss &#8594; 404 · expired &#8594; 410 Gone</text>
    <rect x="750" y="338" width="590" height="44" rx="9" fill="none" stroke="#7e22ce" stroke-width="2.8"/><text x="1045" y="365" fill="#7e22ce" font-weight="bold">mapping.recordAccess() — count++ (AtomicLong), ts=now</text>
    <rect x="750" y="398" width="590" height="44" rx="9" fill="none" stroke="#db2777" stroke-width="2.8"/><text x="1045" y="425" fill="#111">pick 301 (permanent, cached) or 302 (tracked)</text>
    <rect x="750" y="458" width="590" height="44" rx="9" fill="none" stroke="#16a34a" stroke-width="2.8"/><text x="1045" y="485" fill="#111">HTTP redirect &#8594; Location: longURL</text>
  </g>
  <g stroke="#2563eb" stroke-width="2.4" fill="none">
    <path d="M1045,202 L1045,214" marker-end="url(#ahb)"/>
    <path d="M1045,262 L1045,274" marker-end="url(#ahb)"/>
    <path d="M1045,322 L1045,334" marker-end="url(#ahb)"/>
    <path d="M1045,382 L1045,394" marker-end="url(#ahb)"/>
    <path d="M1045,442 L1045,454" marker-end="url(#ahb)"/>
  </g>
  <text x="750" y="536" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">every 302 hits the server → analytics stay accurate (301 would be cached away)</text>
  <text x="750" y="558" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">errors are typed: URLNotFoundException / URLExpiredException</text>

  <!-- ═════════ (3) ENCODING STRATEGY ═════════ -->
  <rect x="1400" y="95" width="680" height="480" rx="14" fill="none" stroke="#ea580c" stroke-width="3.2"/>
  <circle cx="1428" cy="123" r="14" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="1428" y="130" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">3</text>
  <text x="1452" y="130" font-family="Marker Felt" font-size="19" fill="#ea580c" font-weight="bold">ENCODING STRATEGY</text>
  <text x="1452" y="156" font-family="Chalkboard SE" font-size="13" fill="#6b7280">«interface» UrlEncodingStrategy.encode(id) → code</text>

  <rect x="1420" y="172" width="640" height="150" rx="10" fill="none" stroke="#2563eb" stroke-width="2.8"/>
  <text x="1438" y="200" font-family="Chalkboard SE" font-size="16" fill="#2563eb" font-weight="bold">COUNTER + Base62   (default)</text>
  <text x="1438" y="226" font-family="Chalkboard SE" font-size="13.5" fill="#111">AtomicLong.getAndIncrement() &#8594; Base62.encode</text>
  <text x="1438" y="250" font-family="Chalkboard SE" font-size="13.5" fill="#111">sequential · 6–7 chars · <tspan fill="#15803d" font-weight="bold">NEVER collides ✓</tspan></text>
  <text x="1438" y="274" font-family="Chalkboard SE" font-size="13.5" fill="#111">short + dense namespace usage</text>
  <text x="1438" y="300" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">tradeoff: guessable (sequential) — add salt/offset</text>

  <rect x="1420" y="336" width="640" height="150" rx="10" fill="none" stroke="#ea580c" stroke-width="2.8"/>
  <text x="1438" y="364" font-family="Chalkboard SE" font-size="16" fill="#ea580c" font-weight="bold">HASH + Base62</text>
  <text x="1438" y="390" font-family="Chalkboard SE" font-size="13.5" fill="#111">MD5(longURL) &#8594; truncate &#8594; Base62</text>
  <text x="1438" y="414" font-family="Chalkboard SE" font-size="13.5" fill="#111">deterministic per URL · not sequential</text>
  <text x="1438" y="438" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">collision POSSIBLE &#8594; linear probe code+1 … ≤ 100</text>
  <text x="1438" y="464" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">alternatives: SecureRandom · Snowflake ID</text>

  <text x="1420" y="518" font-family="Chalkboard SE" font-size="13" fill="#7e22ce" font-weight="bold">Strategy pattern → swap encode() without touching shorten / resolve flow.</text>
  <text x="1420" y="544" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">Facade (URLShortener) wires repo + chosen strategy at construction.</text>

  <!-- ═════════ (4) BASE62 ENCODE mechanism ═════════ -->
  <rect x="60" y="610" width="770" height="300" rx="14" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <circle cx="88" cy="638" r="14" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="88" y="645" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">4</text>
  <text x="112" y="645" font-family="Marker Felt" font-size="19" fill="#2563eb" font-weight="bold">BASE62 ENCODE — id → short code (the core trick)</text>

  <!-- char table strip -->
  <rect x="80" y="662" width="500" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="94" y="688" font-family="Chalkboard SE" font-size="13.5" fill="#111">0-9 → '0'..'9'  ·  10-35 → 'a'..'z'  ·  36-61 → 'A'..'Z'   (62 symbols)</text>

  <!-- loop pseudo -->
  <g font-family="Chalkboard SE" font-size="14" fill="#111">
    <text x="80" y="730"><tspan fill="#7e22ce" font-weight="bold">while</tspan> (num &gt; 0) {</text>
    <text x="104" y="754">d = num % 62;   sb.append(CHARS[d])</text>
    <text x="104" y="778">num /= 62;</text>
    <text x="80" y="802">}  &#8594; sb.<tspan fill="#15803d" font-weight="bold">reverse()</tspan>   ·   O(log₆₂ n) digits</text>
  </g>

  <!-- worked example -->
  <rect x="410" y="716" width="404" height="112" rx="9" fill="none" stroke="#6b7280" stroke-width="2.2"/>
  <text x="424" y="740" font-family="Chalkboard SE" font-size="13.5" fill="#111" font-weight="bold">id = 1,000,000 →</text>
  <text x="424" y="762" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">1000000 = 62·16129 + 2   (2)</text>
  <text x="424" y="782" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">16129 = 62·260 + 9   ·   260 = 62·4 + 12(c)</text>
  <text x="424" y="802" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">4 = 62·0 + 4  →  reverse digits</text>
  <text x="424" y="822" font-family="Chalkboard SE" font-size="14.5" fill="#2563eb" font-weight="bold">= "4c92"</text>

  <text x="80" y="856" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" font-weight="bold">62⁶ = 56.8B  ·  62⁷ = 3.52T short codes — huge namespace from few chars</text>
  <text x="80" y="882" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">URL-safe (no +,/,=), compact, reversible — the gold standard</text>

  <!-- ═════════ (5) 301 vs 302 ═════════ -->
  <rect x="860" y="610" width="560" height="300" rx="14" fill="none" stroke="#db2777" stroke-width="3.2"/>
  <circle cx="888" cy="638" r="14" fill="none" stroke="#db2777" stroke-width="2.6"/>
  <text x="888" y="645" font-family="Chalkboard SE" font-size="16" fill="#db2777" text-anchor="middle" font-weight="bold">5</text>
  <text x="912" y="645" font-family="Marker Felt" font-size="19" fill="#db2777" font-weight="bold">301 vs 302 REDIRECT</text>

  <rect x="882" y="666" width="516" height="106" rx="10" fill="none" stroke="#6b7280" stroke-width="2.6"/>
  <text x="900" y="692" font-family="Chalkboard SE" font-size="16" fill="#111" font-weight="bold">301 Moved Permanently</text>
  <text x="900" y="716" font-family="Chalkboard SE" font-size="13.5" fill="#111">browser CACHES → later hits skip our server</text>
  <text x="900" y="740" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" font-weight="bold">✓ fastest · SEO juice</text>
  <text x="900" y="762" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">✗ analytics blind after first hit</text>

  <rect x="882" y="784" width="516" height="106" rx="10" fill="none" stroke="#db2777" stroke-width="2.8"/>
  <text x="900" y="810" font-family="Chalkboard SE" font-size="16" fill="#db2777" font-weight="bold">302 Found (temporary)</text>
  <text x="900" y="834" font-family="Chalkboard SE" font-size="13.5" fill="#111">always hits server → recordAccess() fires</text>
  <text x="900" y="858" font-family="Chalkboard SE" font-size="13.5" fill="#15803d" font-weight="bold">✓ OUR CHOICE — per-click analytics, A/B, rotation</text>
  <text x="900" y="880" font-family="Chalkboard SE" font-size="13" fill="#6b7280">slight cost: one round-trip per click</text>

  <!-- ═════════ (6) COLLISION HANDLING ═════════ -->
  <rect x="1450" y="610" width="630" height="300" rx="14" fill="none" stroke="#dc2626" stroke-width="3.2"/>
  <circle cx="1478" cy="638" r="14" fill="none" stroke="#dc2626" stroke-width="2.6"/>
  <text x="1478" y="645" font-family="Chalkboard SE" font-size="16" fill="#dc2626" text-anchor="middle" font-weight="bold">6</text>
  <text x="1502" y="645" font-family="Marker Felt" font-size="19" fill="#dc2626" font-weight="bold">COLLISION HANDLING</text>
  <path d="M1464,660 L2066,660" stroke="#dc2626" stroke-width="1.6"/>
  <g font-family="Chalkboard SE" font-size="14" fill="#111">
    <text x="1470" y="692"><tspan fill="#15803d" font-weight="bold">counter + Base62</tspan> → unique id ⇒ never collides ✓</text>
    <text x="1470" y="722"><tspan fill="#ea580c" font-weight="bold">hash-based</tspan> → possible ⇒ linear probe code+1 … ≤ 100,</text>
    <text x="1494" y="746">else fail fast (namespace exhausted / bad luck)</text>
    <text x="1470" y="776"><tspan fill="#2563eb" font-weight="bold">Bloom filter</tspan> pre-check before DB (fast negative lookup)</text>
    <text x="1470" y="806"><tspan fill="#7e22ce" font-weight="bold">longToShort</tspan> index → identical URL ⇒ same code (dedup)</text>
    <text x="1470" y="840" fill="#dc2626" font-weight="bold">race: two shortens of a NEW same URL → guard the</text>
    <text x="1470" y="864" fill="#dc2626" font-weight="bold">insert (putIfAbsent) so only one code is minted.</text>
    <text x="1470" y="892" fill="#6b7280">probe count is bounded → predictable worst-case latency</text>
  </g>

  <!-- ═════════ STICKIES ═════════ -->
  <g transform="rotate(-2 360 1040)">
    <rect x="120" y="960" width="500" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="142" y="994" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">IDEMPOTENT SHORTEN:</text>
    <text x="142" y="1024" font-family="Chalkboard SE" font-size="14" fill="#713f12">normalize FIRST, then check longToShort —</text>
    <text x="142" y="1048" font-family="Chalkboard SE" font-size="14" fill="#713f12">same long URL always returns the same code,</text>
    <text x="142" y="1074" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">no wasted namespace on duplicates.</text>
  </g>
  <circle cx="360" cy="964" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 1035 1040)">
    <rect x="770" y="960" width="530" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="792" y="994" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">TTL + ANALYTICS:</text>
    <text x="792" y="1024" font-family="Chalkboard SE" font-size="14" fill="#713f12">per-mapping expireAt → 410 Gone when expired</text>
    <text x="792" y="1048" font-family="Chalkboard SE" font-size="14" fill="#713f12">(frees namespace, kills stale links). recordAccess</text>
    <text x="792" y="1074" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">= AtomicLong count + volatile timestamp per 302.</text>
  </g>
  <circle cx="1035" cy="964" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1670 1040)">
    <rect x="1450" y="960" width="500" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1472" y="994" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">CUSTOM ALIAS:</text>
    <text x="1472" y="1024" font-family="Chalkboard SE" font-size="14" fill="#713f12">user supplies the code → bypass the encoder,</text>
    <text x="1472" y="1048" font-family="Chalkboard SE" font-size="14" fill="#713f12">check availability in shortToLong, reserve it or</text>
    <text x="1472" y="1074" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">return 409 Conflict if taken.</text>
  </g>
  <circle cx="1670" cy="964" r="7" fill="#dc2626"/>

  <!-- WHITEBOARD ORDER -->
  <text x="60" y="1178" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="1178" font-family="Chalkboard SE" font-size="14.5" fill="#111">&#9312; shorten: normalize → dedup (longToShort) → counter id → Base62 encode → save → 201 · &#9313; resolve: lookup (shortToLong) → TTL check → recordAccess → 301 / 302 redirect</text>

  <!-- LEGEND -->
  <rect x="60" y="1208" width="2020" height="120" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="1256" font-family="Marker Felt" font-size="21" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="250" y="1236" width="24" height="22" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="284" y="1253">write / shorten</text>
    <rect x="470" y="1236" width="24" height="22" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="504" y="1253">read / Base62</text>
    <rect x="680" y="1236" width="24" height="22" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="714" y="1253">encoding strategy</text>
    <rect x="920" y="1236" width="24" height="22" rx="5" fill="none" stroke="#db2777" stroke-width="3"/><text x="954" y="1253">301 / 302 redirect</text>
    <rect x="1170" y="1236" width="24" height="22" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="1204" y="1253">collision / errors</text>
    <rect x="1400" y="1236" width="24" height="22" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="1434" y="1253">analytics</text>
    <rect x="1590" y="1236" width="24" height="22" rx="4" fill="#fef9c3" stroke="#eab308" stroke-width="2.4"/><text x="1624" y="1253">interview insight</text>
    <path d="M1830,1247 L1890,1247" stroke="#111" stroke-width="2.6" fill="none" marker-end="url(#ah)"/><text x="1904" y="1253">flow step</text>
  </g>
  <text x="250" y="1300" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">Patterns: Strategy (encoding) · Repository (storage) · Facade (URLShortener)</text>
  <text x="1250" y="1300" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">URL Shortener — LLD · Base62, collision handling, 301/302, TTL, analytics</text>
</svg>
