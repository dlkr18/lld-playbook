<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1340" viewBox="0 0 2140 1340">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahp" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#db2777"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="ahd" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#6b7280"/></marker>
  </defs>

  <rect width="2140" height="1340" fill="#ffffff"/>

  <!-- ═════════ TITLE ═════════ -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">ELEVATOR — STATE MACHINE + SCAN DISPATCH</text>
  <path d="M560,68 Q1070,84 1580,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ═════════ subtitle ═════════ -->
  <text x="1070" y="108" font-family="Chalkboard SE" font-size="15" fill="#6b7280" text-anchor="middle">one full SCAN sweep: IDLE → up to top → reverse → down to bottom → IDLE (destinations served in floor order)</text>

  <!-- ═════════ START ═════════ -->
  <circle cx="108" cy="330" r="10" fill="#111"/>
  <path d="M120,330 L176,330" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="150" y="316" font-family="Chalkboard SE" font-size="12.5" fill="#111" text-anchor="middle">created</text>
  <circle cx="150" cy="255" r="14" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="150" y="262" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>

  <!-- ═════════ IDLE ═════════ -->
  <rect x="180" y="255" width="320" height="152" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="340" y="287" font-family="Chalkboard SE" font-size="19" fill="#2563eb" text-anchor="middle" font-weight="bold">IDLE</text>
  <path d="M194,299 L486,299" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="324" font-family="Chalkboard SE" font-size="13.5" fill="#111">no destinations queued</text>
  <text x="200" y="346" font-family="Chalkboard SE" font-size="13.5" fill="#111">direction = IDLE, doors closed</text>
  <text x="200" y="374" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">the resting state — waiting for a call</text>

  <!-- ═════════ MOVING_UP ═════════ -->
  <circle cx="618" cy="152" r="14" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="618" y="159" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">2</text>
  <rect x="640" y="120" width="360" height="152" rx="12" fill="none" stroke="#ea580c" stroke-width="3.2"/>
  <text x="820" y="152" font-family="Chalkboard SE" font-size="19" fill="#ea580c" text-anchor="middle" font-weight="bold">MOVING_UP</text>
  <path d="M654,164 L986,164" stroke="#ea580c" stroke-width="2"/>
  <text x="662" y="190" font-family="Chalkboard SE" font-size="13.5" fill="#111">currentFloor++ each step()</text>
  <text x="662" y="212" font-family="Chalkboard SE" font-size="13.5" fill="#111">serve destinations above ⟳ keep going</text>
  <text x="662" y="240" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">status = MOVING_UP · doors open at each stop</text>

  <!-- ═════════ MOVING_DOWN ═════════ -->
  <rect x="640" y="470" width="360" height="152" rx="12" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <text x="820" y="502" font-family="Chalkboard SE" font-size="19" fill="#16a34a" text-anchor="middle" font-weight="bold">MOVING_DOWN</text>
  <path d="M654,514 L986,514" stroke="#16a34a" stroke-width="2"/>
  <text x="662" y="540" font-family="Chalkboard SE" font-size="13.5" fill="#111">currentFloor-- each step()</text>
  <text x="662" y="562" font-family="Chalkboard SE" font-size="13.5" fill="#111">serve destinations below ⟳ keep going</text>
  <text x="662" y="590" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">status = MOVING_DOWN · same sweep, reversed</text>

  <!-- IDLE -> MOVING_UP -->
  <path d="M430,255 C445,190 560,178 636,196" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#aho)"/>
  <text x="512" y="176" font-family="Chalkboard SE" font-size="13" fill="#ea580c" font-weight="bold">call above</text>

  <!-- IDLE -> MOVING_DOWN -->
  <path d="M430,407 C445,478 560,568 636,566" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="500" y="600" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">call below</text>

  <!-- MOVING_UP -> IDLE (queue empty) -->
  <path d="M700,272 C640,332 560,318 502,306" stroke="#6b7280" stroke-width="2.4" fill="none" marker-end="url(#ahd)"/>
  <text x="556" y="340" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">no dest ↑</text>

  <!-- MOVING_DOWN -> IDLE (queue empty) -->
  <path d="M700,470 C640,410 560,362 502,356" stroke="#6b7280" stroke-width="2.4" fill="none" marker-end="url(#ahd)"/>
  <text x="552" y="392" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">no dest ↓</text>

  <!-- reverse: UP -> DOWN (top reached) -->
  <path d="M905,272 L905,466" stroke="#db2777" stroke-width="3" fill="none" marker-end="url(#ahp)"/>
  <text x="918" y="360" font-family="Chalkboard SE" font-size="12.5" fill="#db2777" font-weight="bold">topmost dest</text>
  <text x="918" y="378" font-family="Chalkboard SE" font-size="12.5" fill="#db2777" font-weight="bold">reached → reverse</text>

  <!-- reverse: DOWN -> UP (bottom reached) -->
  <path d="M735,470 L735,276" stroke="#db2777" stroke-width="3" fill="none" marker-end="url(#ahp)"/>
  <text x="600" y="366" font-family="Chalkboard SE" font-size="12.5" fill="#db2777" font-weight="bold">lowest dest</text>
  <text x="600" y="384" font-family="Chalkboard SE" font-size="12.5" fill="#db2777" font-weight="bold">reached → reverse</text>

  <!-- ═════════ MAINTENANCE ═════════ -->
  <rect x="1120" y="300" width="310" height="150" rx="12" fill="none" stroke="#dc2626" stroke-width="3"/>
  <text x="1275" y="332" font-family="Chalkboard SE" font-size="18" fill="#dc2626" text-anchor="middle" font-weight="bold">MAINTENANCE</text>
  <path d="M1134,344 L1416,344" stroke="#dc2626" stroke-width="2"/>
  <text x="1140" y="370" font-family="Chalkboard SE" font-size="13.5" fill="#111">out of service — excluded</text>
  <text x="1140" y="392" font-family="Chalkboard SE" font-size="13.5" fill="#111">from dispatch, dest set cleared</text>
  <text x="1140" y="420" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">pending calls rerouted to other cars</text>

  <!-- emergency arrows to MAINT -->
  <path d="M1000,200 C1060,240 1080,300 1116,332" stroke="#dc2626" stroke-width="2.6" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="1040" y="248" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">emergency</text>
  <path d="M1000,540 C1060,500 1082,452 1116,420" stroke="#dc2626" stroke-width="2.6" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="1040" y="516" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">emergency</text>

  <!-- MAINT -> IDLE restored (clean under-route) -->
  <path d="M1200,452 C1290,706 660,708 468,414" stroke="#6b7280" stroke-width="2.4" stroke-dasharray="8,6" fill="none" marker-end="url(#ahd)"/>
  <text x="900" y="690" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle" font-weight="bold">restored → IDLE</text>

  <!-- ═════════ OBSERVER note box ═════════ -->
  <rect x="1500" y="150" width="560" height="150" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1780" y="182" font-family="Chalkboard SE" font-size="16.5" fill="#2563eb" text-anchor="middle" font-weight="bold">Observer — arrival notifications</text>
  <path d="M1514,194 L2046,194" stroke="#2563eb" stroke-width="2"/>
  <text x="1522" y="220" font-family="Chalkboard SE" font-size="14" fill="#111">ArrivalListener fires on each floor stop</text>
  <text x="1522" y="244" font-family="Chalkboard SE" font-size="14" fill="#111">FloorDisplay / chime subscribe, don't poll</text>
  <text x="1522" y="272" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">movement stays decoupled from I/O (SRP)</text>

  <!-- ═════════ MACHINERY GROUP ═════════ -->
  <rect x="150" y="710" width="1240" height="330" rx="16" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="182" cy="748" r="14" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="182" y="755" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">3</text>
  <text x="212" y="756" font-family="Marker Felt" font-size="20" fill="#ea580c" font-weight="bold">THE DISPATCH — which car answers a hall call?</text>

  <!-- Elevator entity -->
  <rect x="190" y="780" width="380" height="238" rx="10" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="380" y="810" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">Elevator (entity, State-aware)</text>
  <path d="M204,822 L556,822" stroke="#2563eb" stroke-width="1.8"/>
  <text x="212" y="848" font-family="Chalkboard SE" font-size="13.5" fill="#111">id · currentFloor (volatile)</text>
  <text x="212" y="872" font-family="Chalkboard SE" font-size="13.5" fill="#111">direction · status (volatile)</text>
  <text x="212" y="896" font-family="Chalkboard SE" font-size="13.5" fill="#111">destinationFloors:</text>
  <text x="212" y="918" font-family="Chalkboard SE" font-size="13.5" fill="#111">&#160;&#160;ConcurrentSkipListSet&lt;Integer&gt;</text>
  <text x="212" y="942" font-family="Chalkboard SE" font-size="13.5" fill="#111">minFloor · maxFloor (bounds)</text>
  <text x="212" y="972" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" font-weight="bold">sorted set ⇒ SCAN order is FREE ✓</text>
  <text x="212" y="998" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">moveToNextFloor() reverses at bounds</text>

  <!-- findBestElevator -->
  <path d="M570,900 L666,900" stroke="#ea580c" stroke-width="2.8" fill="none" marker-end="url(#aho)"/>
  <text x="618" y="888" font-family="Chalkboard SE" font-size="12.5" fill="#ea580c" text-anchor="middle">scan cars</text>
  <rect x="670" y="780" width="360" height="238" rx="10" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="850" y="810" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">findBestElevator() — 2 tiers</text>
  <path d="M684,822 L1016,822" stroke="#ea580c" stroke-width="1.8"/>
  <text x="692" y="850" font-family="Chalkboard SE" font-size="13.5" fill="#111">TIER 1 — moving SAME direction</text>
  <text x="692" y="872" font-family="Chalkboard SE" font-size="13.5" fill="#111">&#160;&#160;&amp; approaching the call floor</text>
  <text x="692" y="894" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">&#160;&#160;→ zero-detour, serve en route</text>
  <text x="692" y="922" font-family="Chalkboard SE" font-size="13.5" fill="#111">TIER 2 — nearest IDLE car</text>
  <text x="692" y="944" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">&#160;&#160;fallback: min |floor − currentFloor|</text>
  <text x="692" y="974" font-family="Chalkboard SE" font-size="12.5" fill="#db2777" font-weight="bold">neither? → queue, retry next step()</text>
  <text x="692" y="1000" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">then car.addDestination(floor)</text>

  <!-- Scheduler strategy -->
  <path d="M1030,900 L1126,900" stroke="#ea580c" stroke-width="2.8" fill="none" marker-end="url(#aho)"/>
  <text x="1078" y="888" font-family="Chalkboard SE" font-size="12.5" fill="#ea580c" text-anchor="middle">delegates</text>
  <rect x="1130" y="780" width="238" height="238" rx="10" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="1249" y="810" font-family="Chalkboard SE" font-size="14.5" fill="#16a34a" text-anchor="middle" font-weight="bold">ElevatorScheduler</text>
  <text x="1249" y="830" font-family="Chalkboard SE" font-size="12.5" fill="#16a34a" text-anchor="middle" font-weight="bold">(Strategy)</text>
  <path d="M1144,842 L1354,842" stroke="#16a34a" stroke-width="1.8"/>
  <text x="1152" y="868" font-family="Chalkboard SE" font-size="12.5" fill="#111">selectElevator(</text>
  <text x="1152" y="888" font-family="Chalkboard SE" font-size="12.5" fill="#111">&#160;&#160;req, cars)</text>
  <text x="1152" y="914" font-family="Chalkboard SE" font-size="13" fill="#111">SCAN · LOOK ·</text>
  <text x="1152" y="936" font-family="Chalkboard SE" font-size="13" fill="#111">SSTF · FCFS</text>
  <text x="1152" y="966" font-family="Chalkboard SE" font-size="12" fill="#6b7280">swap impl —</text>
  <text x="1152" y="986" font-family="Chalkboard SE" font-size="12" fill="#6b7280">controller</text>
  <text x="1152" y="1006" font-family="Chalkboard SE" font-size="12" fill="#6b7280">untouched</text>

  <!-- ═════════ STICKY A: SCAN vs LOOK ═════════ -->
  <g transform="rotate(-2 1600 800)">
    <rect x="1440" y="720" width="330" height="168" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1458" y="752" font-family="Chalkboard SE" font-size="15" fill="#713f12" font-weight="bold">SCAN vs LOOK:</text>
    <text x="1458" y="780" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">SCAN sweeps to the boundary</text>
    <text x="1458" y="804" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">floor, then reverses.</text>
    <text x="1458" y="832" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">LOOK reverses at the LAST</text>
    <text x="1458" y="856" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">request — no wasted travel.</text>
    <text x="1458" y="880" font-family="Chalkboard SE" font-size="12.5" fill="#92710c">both starvation-free (fair)</text>
  </g>
  <circle cx="1600" cy="724" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY B: SkipListSet ═════════ -->
  <g transform="rotate(1.5 1955 800)">
    <rect x="1800" y="720" width="310" height="168" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1818" y="752" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">WHY ConcurrentSkipListSet:</text>
    <text x="1818" y="780" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">sorted + thread-safe. Many</text>
    <text x="1818" y="804" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">riders press floors at once —</text>
    <text x="1818" y="828" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">no race, no lock.</text>
    <text x="1818" y="856" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">TreeSet not safe, PQ allows</text>
    <text x="1818" y="880" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">dupes. SkipList = O(log n).</text>
  </g>
  <circle cx="1955" cy="724" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY C: step simulation ═════════ -->
  <g transform="rotate(-1.5 1780 970)">
    <rect x="1620" y="905" width="470" height="120" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1638" y="937" font-family="Chalkboard SE" font-size="15" fill="#713f12" font-weight="bold">step() SIMULATION:</text>
    <text x="1638" y="965" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">one tick = every car moves one floor, then</text>
    <text x="1638" y="989" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">queued calls are re-evaluated. Deterministic</text>
    <text x="1638" y="1013" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">&amp; testable — no real threads in the demo.</text>
  </g>
  <circle cx="1780" cy="909" r="7" fill="#dc2626"/>

  <!-- ═════════ WHITEBOARD ORDER ═════════ -->
  <text x="150" y="1096" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="360" y="1096" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; IDLE waits for a call &#8594; &#9313; MOVING_UP / MOVING_DOWN sweep (SCAN, reverse at bounds) &#8594; &#9314; dispatch picks the car (2 tiers) &#8594; empty ⟳ back to IDLE · emergency ⇢ MAINTENANCE</text>

  <!-- ═════════ LEGEND ═════════ -->
  <rect x="150" y="1130" width="1840" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="180" y="1192" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="330" y="1166" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="364" y="1184">IDLE / entity</text>
    <rect x="330" y="1212" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="364" y="1230">MOVING_UP / dispatch</text>
    <rect x="580" y="1166" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="614" y="1184">MOVING_DOWN / strategy</text>
    <rect x="580" y="1212" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="614" y="1230">MAINTENANCE</text>
    <rect x="880" y="1212" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="914" y="1230">interview insight</text>
    <path d="M880,1178 L950,1178" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/><text x="964" y="1184">transition</text>
    <path d="M1120,1178 L1190,1178" stroke="#db2777" stroke-width="3" fill="none" marker-end="url(#ahp)"/><text x="1204" y="1184">SCAN reversal ⟳</text>
    <path d="M1120,1226 L1190,1226" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/><text x="1204" y="1230">emergency path</text>
    <circle cx="1432" cy="1178" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1432" y="1183" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1454" y="1183">story step</text>
    <text x="1600" y="1184" fill="#6b7280">Patterns: State · Strategy · Observer</text>
    <text x="1600" y="1230" fill="#6b7280">Elevator System — LLD (state machine + SCAN dispatch)</text>
  </g>
</svg>
