<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1320" viewBox="0 0 2140 1320">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
  </defs>

  <rect width="2140" height="1320" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">FIXED WINDOW — COUNTER PER INTERVAL</text>
  <path d="M580,68 Q1070,84 1560,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ① REQUEST -->
  <circle cx="80" cy="128" r="15" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="80" y="135" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">1</text>
  <rect x="110" y="150" width="250" height="110" rx="12" fill="none" stroke="#7e22ce" stroke-width="3.2"/>
  <text x="235" y="182" font-family="Chalkboard SE" font-size="17" fill="#7e22ce" text-anchor="middle" font-weight="bold">REQUEST</text>
  <path d="M124,194 L346,194" stroke="#7e22ce" stroke-width="2"/>
  <text x="235" y="220" font-family="Chalkboard SE" font-size="13.5" fill="#111" text-anchor="middle">arrives at t = now</text>
  <text x="235" y="242" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">from clientId</text>

  <path d="M360,205 L416,205" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- ② COMPUTE KEY -->
  <circle cx="440" cy="128" r="15" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="440" y="135" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">2</text>
  <rect x="420" y="150" width="370" height="110" rx="12" fill="none" stroke="#7e22ce" stroke-width="3"/>
  <text x="605" y="182" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">COMPUTE WINDOW KEY</text>
  <path d="M434,194 L776,194" stroke="#7e22ce" stroke-width="2"/>
  <text x="440" y="220" font-family="Chalkboard SE" font-size="13.5" fill="#111">window = floor(now / size)</text>
  <text x="440" y="242" font-family="Chalkboard SE" font-size="13" fill="#111">key = clientId + ":" + window</text>

  <path d="M790,205 L846,205" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- ③ INCR -->
  <circle cx="870" cy="128" r="15" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="870" y="135" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">3</text>
  <rect x="850" y="150" width="340" height="110" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1020" y="182" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">INCR counter</text>
  <path d="M864,194 L1176,194" stroke="#2563eb" stroke-width="2"/>
  <text x="864" y="220" font-family="Chalkboard SE" font-size="13.5" fill="#111">count = INCR(key)  (atomic)</text>
  <text x="864" y="242" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">first hit &#8594; EXPIRE(key, size)</text>

  <path d="M1190,205 L1246,205" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- DECISION -->
  <path d="M1360,148 L1478,205 L1360,262 L1242,205 z" fill="none" stroke="#111" stroke-width="3"/>
  <text x="1360" y="200" font-family="Chalkboard SE" font-size="14" fill="#111" text-anchor="middle" font-weight="bold">count</text>
  <text x="1360" y="222" font-family="Chalkboard SE" font-size="14" fill="#111" text-anchor="middle" font-weight="bold">&#8804; max ?</text>

  <path d="M1478,205 L1534,205" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="1506" y="193" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">yes &#10003;</text>
  <rect x="1538" y="155" width="300" height="100" rx="10" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <text x="1688" y="187" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">ALLOW &#8594; 200</text>
  <text x="1556" y="217" font-family="Chalkboard SE" font-size="13" fill="#111">remaining = max &#8722; count</text>
  <text x="1556" y="238" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">simplest possible check</text>

  <path d="M1360,262 L1360,318" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="1374" y="296" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">no &#10007;</text>
  <rect x="1538" y="290" width="410" height="100" rx="10" fill="none" stroke="#dc2626" stroke-width="3.2"/>
  <text x="1743" y="322" font-family="Chalkboard SE" font-size="16" fill="#dc2626" text-anchor="middle" font-weight="bold">BLOCK &#8594; 429</text>
  <text x="1556" y="350" font-family="Chalkboard SE" font-size="13.5" fill="#111">retryAfter = time to next window</text>
  <text x="1556" y="372" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">counter keeps climbing until reset</text>
  <path d="M1390,340 L1534,340" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>

  <!-- BOUNDARY BURST visual -->
  <text x="110" y="452" font-family="Marker Felt" font-size="20" fill="#dc2626" font-weight="bold">THE BOUNDARY-BURST PROBLEM — counters reset independently, so the edge leaks 2&#215;</text>

  <!-- axis -->
  <path d="M150,660 L1560,660" stroke="#111" stroke-width="2.6" fill="none" marker-end="url(#ah)"/>
  <text x="1572" y="665" font-family="Chalkboard SE" font-size="13" fill="#111">time</text>

  <!-- window 1 -->
  <rect x="250" y="500" width="450" height="120" rx="8" fill="none" stroke="#7e22ce" stroke-width="3"/>
  <text x="475" y="532" font-family="Chalkboard SE" font-size="15.5" fill="#7e22ce" text-anchor="middle" font-weight="bold">WINDOW 1  [0&#8211;60s]</text>
  <text x="475" y="560" font-family="Chalkboard SE" font-size="14" fill="#111" text-anchor="middle">limit = 10 req / min</text>
  <text x="475" y="590" font-family="Chalkboard SE" font-size="14" fill="#dc2626" text-anchor="middle" font-weight="bold">counter fills to 10 by t = 59s</text>

  <!-- window 2 -->
  <rect x="720" y="500" width="450" height="120" rx="8" fill="none" stroke="#7e22ce" stroke-width="3"/>
  <text x="945" y="532" font-family="Chalkboard SE" font-size="15.5" fill="#7e22ce" text-anchor="middle" font-weight="bold">WINDOW 2  [60&#8211;120s]</text>
  <text x="945" y="560" font-family="Chalkboard SE" font-size="14" fill="#111" text-anchor="middle">counter RESET to 0 at t = 60s</text>
  <text x="945" y="590" font-family="Chalkboard SE" font-size="14" fill="#dc2626" text-anchor="middle" font-weight="bold">10 more allowed instantly at t = 61s</text>

  <!-- boundary line -->
  <path d="M710,470 L710,700" stroke="#dc2626" stroke-width="2.6" stroke-dasharray="7,5"/>
  <text x="710" y="490" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" text-anchor="middle" font-weight="bold">t = 60s boundary</text>

  <!-- burst brackets -->
  <path d="M620,660 L620,700 L700,700 L700,660" stroke="#dc2626" stroke-width="2.4" fill="none"/>
  <text x="660" y="722" font-family="Chalkboard SE" font-size="13" fill="#dc2626" text-anchor="middle" font-weight="bold">10 req @ 59s</text>
  <path d="M720,660 L720,700 L800,700 L800,660" stroke="#dc2626" stroke-width="2.4" fill="none"/>
  <text x="760" y="722" font-family="Chalkboard SE" font-size="13" fill="#dc2626" text-anchor="middle" font-weight="bold">10 req @ 61s</text>

  <!-- burst callout -->
  <text x="960" y="680" font-family="Chalkboard SE" font-size="17" fill="#dc2626" font-weight="bold">&#8658; 20 requests in ~1 second!</text>
  <text x="960" y="704" font-family="Chalkboard SE" font-size="13.5" fill="#6b7280">double the intended rate, right at the seam</text>

  <!-- MITIGATION box -->
  <rect x="110" y="770" width="960" height="200" rx="12" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="130" y="802" font-family="Chalkboard SE" font-size="16" fill="#15803d" font-weight="bold">FIX &#8594; SLIDING WINDOW COUNTER (hybrid)</text>
  <path d="M124,814 L1056,814" stroke="#16a34a" stroke-width="1.8"/>
  <text x="130" y="842" font-family="Chalkboard SE" font-size="14" fill="#111">weight = 1 &#8722; (elapsedInCurrent / windowSize)</text>
  <text x="130" y="866" font-family="Chalkboard SE" font-size="14" fill="#111">effective = prevCount &#215; weight + currentCount</text>
  <text x="130" y="892" font-family="Chalkboard SE" font-size="14" fill="#111">e.g. 30s into window: prev=8, cur=4, weight=0.5</text>
  <text x="130" y="916" font-family="Chalkboard SE" font-size="14" fill="#111">effective = 8&#215;0.5 + 4 = 8  (still under 10 &#8594; allow)</text>
  <text x="130" y="950" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">O(1) memory, smooths the seam &#8212; keeps Fixed Window's cheapness &#10003;</text>

  <!-- CONCURRENCY box -->
  <rect x="1110" y="770" width="720" height="200" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1130" y="802" font-family="Chalkboard SE" font-size="16" fill="#2563eb" font-weight="bold">WHY IT'S REDIS-NATIVE</text>
  <path d="M1124,814 L1816,814" stroke="#2563eb" stroke-width="1.8"/>
  <text x="1130" y="842" font-family="Chalkboard SE" font-size="14" fill="#111">just INCR + EXPIRE &#8212; both atomic on the server</text>
  <text x="1130" y="866" font-family="Chalkboard SE" font-size="14" fill="#111">no read-modify-write race, no lock needed</text>
  <text x="1130" y="890" font-family="Chalkboard SE" font-size="14" fill="#111">TTL auto-cleans old windows (no cron sweep)</text>
  <text x="1130" y="914" font-family="Chalkboard SE" font-size="14" fill="#111">local variant: AtomicInteger per key</text>
  <text x="1130" y="948" font-family="Chalkboard SE" font-size="13" fill="#7e22ce" font-weight="bold">this is why NGINX &amp; API gateways default to it</text>

  <!-- STICKIES -->
  <g transform="rotate(-2 380 1085)">
    <rect x="110" y="1010" width="540" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="132" y="1044" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">SIMPLEST TO SHIP:</text>
    <text x="132" y="1074" font-family="Chalkboard SE" font-size="14" fill="#713f12">one integer per client per window.</text>
    <text x="132" y="1098" font-family="Chalkboard SE" font-size="14" fill="#713f12">O(1) time, O(1) memory, trivial in Redis.</text>
    <text x="132" y="1124" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">pick it when a small edge burst is OK.</text>
  </g>
  <circle cx="380" cy="1014" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 1075 1085)">
    <rect x="770" y="1010" width="610" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="792" y="1044" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">NAME THE TRADE-OFF OUT LOUD:</text>
    <text x="792" y="1074" font-family="Chalkboard SE" font-size="14" fill="#713f12">worst case = 2&#215; the limit across a boundary.</text>
    <text x="792" y="1098" font-family="Chalkboard SE" font-size="14" fill="#713f12">acceptable for coarse limits; NOT for billing.</text>
    <text x="792" y="1124" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">upgrade to sliding-window counter if it bites.</text>
  </g>
  <circle cx="1075" cy="1014" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1680 1085)">
    <rect x="1440" y="1010" width="450" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1462" y="1044" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">CLOCK ALIGNMENT:</text>
    <text x="1462" y="1074" font-family="Chalkboard SE" font-size="14" fill="#713f12">windows are wall-clock aligned,</text>
    <text x="1462" y="1098" font-family="Chalkboard SE" font-size="14" fill="#713f12">so ALL clients reset together &#8594;</text>
    <text x="1462" y="1122" font-family="Chalkboard SE" font-size="14" fill="#713f12">synchronized stampede risk.</text>
  </g>
  <circle cx="1680" cy="1014" r="7" fill="#dc2626"/>

  <!-- WHITEBOARD ORDER -->
  <text x="110" y="1210" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="320" y="1210" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; request at now &#8594; &#9313; key = clientId:floor(now/size) &#8594; &#9314; count = INCR(key); count &#8804; max ? ALLOW : BLOCK &#8212; beware the 2&#215; edge burst</text>

  <!-- LEGEND -->
  <rect x="110" y="1240" width="1920" height="70" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <text x="140" y="1282" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
    <rect x="300" y="1263" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="334" y="1281">window / counter</text>
    <rect x="560" y="1263" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="594" y="1281">allow / fix</text>
    <rect x="780" y="1263" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="814" y="1281">block / burst</text>
    <rect x="1010" y="1263" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="1044" y="1281">insight</text>
    <text x="1220" y="1281" fill="#6b7280">O(1) &#183; simplest &#183; 2&#215; burst at edge &#183; NGINX, Redis INCR</text>
  </g>
</svg>
