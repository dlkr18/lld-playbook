<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1300" viewBox="0 0 2140 1300">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahgr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
  </defs>
  <rect width="2140" height="1300" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">RIDE HAILING — TRIP STATE MACHINE</text>
  <path d="M580,68 Q1070,84 1560,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- START -->
  <circle cx="62" cy="235" r="13" fill="#111"/>
  <path d="M75,235 L104,235" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="14" y="222" font-family="Chalkboard SE" font-size="12" fill="#111">requestRide()</text>

  <!-- STORY CIRCLES -->
  <circle cx="150" cy="150" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="150" y="157" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <circle cx="630" cy="150" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="630" y="157" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">2</text>
  <circle cx="1110" cy="150" r="15" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="1110" y="157" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">3</text>

  <!-- B1 REQUESTED -->
  <rect x="110" y="160" width="340" height="150" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="280" y="192" font-family="Chalkboard SE" font-size="17" fill="#2563eb" text-anchor="middle" font-weight="bold">REQUESTED</text>
  <path d="M124,204 L436,204" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="232" font-family="Chalkboard SE" font-size="13.5" fill="#111">rider requests a ride</text>
  <text x="130" y="256" font-family="Chalkboard SE" font-size="13.5" fill="#111">pickup + drop-off set</text>
  <text x="130" y="288" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">RequestedState (singleton)</text>

  <!-- B2 ACCEPTED -->
  <rect x="590" y="160" width="340" height="150" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="760" y="192" font-family="Chalkboard SE" font-size="17" fill="#2563eb" text-anchor="middle" font-weight="bold">ACCEPTED</text>
  <path d="M604,204 L916,204" stroke="#2563eb" stroke-width="2"/>
  <text x="610" y="232" font-family="Chalkboard SE" font-size="13.5" fill="#111">driver matched &amp; accepts</text>
  <text x="610" y="256" font-family="Chalkboard SE" font-size="13.5" fill="#111">en route to pickup</text>
  <text x="610" y="288" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">AcceptedState (singleton)</text>

  <!-- B3 IN_PROGRESS -->
  <rect x="1070" y="160" width="340" height="150" rx="12" fill="none" stroke="#ea580c" stroke-width="3.2"/>
  <text x="1240" y="192" font-family="Chalkboard SE" font-size="17" fill="#ea580c" text-anchor="middle" font-weight="bold">IN_PROGRESS</text>
  <path d="M1084,204 L1396,204" stroke="#ea580c" stroke-width="2"/>
  <text x="1090" y="232" font-family="Chalkboard SE" font-size="13.5" fill="#111">trip underway</text>
  <text x="1090" y="256" font-family="Chalkboard SE" font-size="13.5" fill="#111">meter / route running</text>
  <text x="1090" y="288" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">InProgressState (singleton)</text>

  <!-- B4 COMPLETED -->
  <rect x="1550" y="160" width="340" height="150" rx="12" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <text x="1720" y="192" font-family="Chalkboard SE" font-size="17" fill="#16a34a" text-anchor="middle" font-weight="bold">COMPLETED</text>
  <path d="M1564,204 L1876,204" stroke="#16a34a" stroke-width="2"/>
  <text x="1570" y="232" font-family="Chalkboard SE" font-size="13.5" fill="#111">fare charged</text>
  <text x="1570" y="256" font-family="Chalkboard SE" font-size="13.5" fill="#111">bilateral ratings opened</text>
  <text x="1570" y="288" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">terminal &#10003;</text>

  <!-- forward transitions -->
  <path d="M450,235 L586,235" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="518" y="223" font-family="Chalkboard SE" font-size="12.5" fill="#111" text-anchor="middle">accept(driverId)</text>
  <path d="M930,235 L1066,235" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="998" y="223" font-family="Chalkboard SE" font-size="12.5" fill="#111" text-anchor="middle">start()</text>
  <path d="M1410,235 L1546,235" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="1478" y="223" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" text-anchor="middle">complete(fare)</text>

  <!-- terminal sink after COMPLETED -->
  <path d="M1890,235 L1938,235" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <circle cx="1960" cy="235" r="14" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="1960" cy="235" r="7" fill="#111"/>
  <text x="1960" y="273" font-family="Chalkboard SE" font-size="12.5" fill="#111" text-anchor="middle">done</text>

  <!-- CANCELLED side exit -->
  <rect x="590" y="378" width="360" height="122" rx="12" fill="none" stroke="#6b7280" stroke-width="3"/>
  <text x="770" y="410" font-family="Chalkboard SE" font-size="17" fill="#6b7280" text-anchor="middle" font-weight="bold">CANCELLED</text>
  <path d="M604,422 L936,422" stroke="#6b7280" stroke-width="2"/>
  <text x="610" y="450" font-family="Chalkboard SE" font-size="13.5" fill="#111">fee depends on state at cancel time</text>
  <text x="610" y="478" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">CancelledState — terminal; each state owns its cancel()</text>

  <!-- cancel arrows with fees -->
  <path d="M280,310 C280,352 520,360 616,376" stroke="#6b7280" stroke-width="2.6" fill="none" marker-end="url(#ahgr)"/>
  <text x="360" y="344" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" font-weight="bold">cancel — no fee</text>
  <path d="M760,310 L772,374" stroke="#6b7280" stroke-width="2.6" fill="none" marker-end="url(#ahgr)"/>
  <text x="784" y="348" font-family="Chalkboard SE" font-size="12.5" fill="#ea580c" font-weight="bold">cancel — $25</text>
  <path d="M1240,310 C1240,352 1000,360 904,376" stroke="#6b7280" stroke-width="2.6" fill="none" marker-end="url(#ahgr)"/>
  <text x="1030" y="344" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">cancel — full fare</text>

  <!-- cancelled terminal -->
  <path d="M950,438 L998,438" stroke="#6b7280" stroke-width="2.6" fill="none" marker-end="url(#ahgr)"/>
  <circle cx="1020" cy="438" r="14" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="1020" cy="438" r="7" fill="#111"/>
  <text x="1020" y="476" font-family="Chalkboard SE" font-size="12.5" fill="#111" text-anchor="middle">done</text>

  <!-- STATE PATTERN cluster -->
  <rect x="100" y="540" width="920" height="252" rx="16" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="132" cy="568" r="15" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="132" y="575" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">4</text>
  <text x="162" y="576" font-family="Marker Felt" font-size="20" fill="#16a34a" font-weight="bold">STATE — 5 stateless singletons</text>

  <text x="125" y="612" font-family="Chalkboard SE" font-size="14" fill="#111">interface TripState { accept · start · complete · cancel · getStatus }</text>
  <text x="125" y="638" font-family="Chalkboard SE" font-size="14" fill="#111">Requested · Accepted · InProgress · Completed · Cancelled</text>
  <text x="125" y="666" font-family="Chalkboard SE" font-size="14.5" fill="#111" font-weight="bold">Trip delegates &#8594; state = state.accept(this, driverId)</text>
  <text x="125" y="690" font-family="Chalkboard SE" font-size="13.5" fill="#111">each method returns the NEXT state; illegal moves throw</text>
  <text x="125" y="716" font-family="Chalkboard SE" font-size="13.5" fill="#111">states hold NO data — mutable state lives on Trip (setXxxInternal)</text>
  <text x="125" y="762" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">new state = new class, zero if/else — Open/Closed &#10003;</text>

  <!-- STRATEGY + DECORATOR cluster -->
  <rect x="1050" y="540" width="980" height="252" rx="16" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="1082" cy="568" r="15" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="1082" y="575" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">5</text>
  <text x="1112" y="576" font-family="Marker Felt" font-size="20" fill="#ea580c" font-weight="bold">STRATEGY + DECORATOR — pricing &amp; matching</text>

  <text x="1075" y="612" font-family="Chalkboard SE" font-size="14.5" fill="#111" font-weight="bold">PricingStrategy — BasePricing (EnumMap by VehicleType)</text>
  <text x="1075" y="636" font-family="Chalkboard SE" font-size="13" fill="#111">BIKE 3+2/km &#183; AUTO 4+3/km &#183; SEDAN 5+3.5/km &#183; SUV 7+5/km</text>
  <text x="1075" y="664" font-family="Chalkboard SE" font-size="14.5" fill="#7e22ce" font-weight="bold">SurgePricingStrategy — DECORATOR (wraps any strategy &#215; N)</text>
  <text x="1075" y="688" font-family="Chalkboard SE" font-size="13" fill="#111">stackable: surge(1.5) &#8728; peak-hour &#8728; base &#8594; one PricingStrategy</text>
  <text x="1075" y="716" font-family="Chalkboard SE" font-size="14.5" fill="#111" font-weight="bold">DriverMatchingStrategy — NearestDriver (Haversine)</text>
  <text x="1075" y="762" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">swap or stack at runtime — no service changes &#10003;</text>

  <!-- STICKIES -->
  <g transform="rotate(-2 400 905)">
    <rect x="100" y="820" width="600" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="122" y="854" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">FINE-GRAINED LOCKING:</text>
    <text x="122" y="884" font-family="Chalkboard SE" font-size="14" fill="#713f12">lock per-Trip, NOT one global lock &#8594; two riders'</text>
    <text x="122" y="908" font-family="Chalkboard SE" font-size="14" fill="#713f12">trips advance in parallel.</text>
    <text x="122" y="932" font-family="Chalkboard SE" font-size="14" fill="#713f12">lock + state guard = no double-accept race when</text>
    <text x="122" y="956" font-family="Chalkboard SE" font-size="14" fill="#713f12">two drivers grab the same request.</text>
  </g>
  <circle cx="400" cy="824" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 1030 905)">
    <rect x="730" y="820" width="600" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="752" y="854" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">CANCELLATION FEES = state fn:</text>
    <text x="752" y="884" font-family="Chalkboard SE" font-size="14" fill="#713f12">REQUESTED &#8594; free (no driver committed yet)</text>
    <text x="752" y="908" font-family="Chalkboard SE" font-size="14" fill="#713f12">ACCEPTED &#8594; $25 (driver already en route)</text>
    <text x="752" y="932" font-family="Chalkboard SE" font-size="14" fill="#713f12">IN_PROGRESS &#8594; full fare</text>
    <text x="752" y="958" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">the fee logic lives inside each state's cancel().</text>
  </g>
  <circle cx="1030" cy="824" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1660 905)">
    <rect x="1360" y="820" width="600" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1382" y="854" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">BILATERAL RATINGS:</text>
    <text x="1382" y="884" font-family="Chalkboard SE" font-size="14" fill="#713f12">after COMPLETED, rider rates driver AND</text>
    <text x="1382" y="908" font-family="Chalkboard SE" font-size="14" fill="#713f12">driver rates rider (Rating value object).</text>
    <text x="1382" y="932" font-family="Chalkboard SE" font-size="14" fill="#713f12">running average updated on both parties.</text>
    <text x="1382" y="958" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">Observer notifies rider + driver on each change.</text>
  </g>
  <circle cx="1660" cy="824" r="7" fill="#dc2626"/>

  <!-- WHITEBOARD ORDER -->
  <text x="100" y="1050" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="310" y="1050" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; REQUESTED &#8594; &#9313; match driver &amp; ACCEPTED &#8594; &#9314; start &#8594; IN_PROGRESS &#8594; complete(fare) &#8594; COMPLETED &#183; CANCELLED exits with a state-dependent fee</text>

  <!-- LEGEND -->
  <rect x="100" y="1085" width="1930" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="128" y="1147" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="280" y="1121" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="314" y="1139">requested / accepted</text>
    <rect x="280" y="1167" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="314" y="1185">in progress / strategy</text>
    <rect x="560" y="1121" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="594" y="1139">completed (State)</text>
    <rect x="560" y="1167" width="24" height="24" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/><text x="594" y="1185">cancelled</text>
    <rect x="820" y="1121" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="854" y="1139">interview insight</text>
    <path d="M820,1179 L880,1179" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/><text x="894" y="1185">transition</text>
    <path d="M1060,1133 L1120,1133" stroke="#6b7280" stroke-width="2.6" fill="none" marker-end="url(#ahgr)"/><text x="1134" y="1139">cancel path</text>
    <circle cx="1072" cy="1179" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1072" y="1184" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1094" y="1185">story step</text>
    <circle cx="1332" cy="1133" r="12" fill="none" stroke="#111" stroke-width="3"/><circle cx="1332" cy="1133" r="6" fill="#111"/><text x="1354" y="1139">terminal</text>
    <text x="1560" y="1139" fill="#6b7280">Patterns: State &#183; Strategy &#183; Decorator &#183; Observer</text>
    <text x="1560" y="1185" fill="#6b7280">Ride Hailing — LLD (trip state machine + pricing)</text>
  </g>
</svg>
