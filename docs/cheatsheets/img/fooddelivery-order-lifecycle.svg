<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1300" viewBox="0 0 2140 1300">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahgr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
  </defs>
  <rect width="2140" height="1300" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">FOOD DELIVERY — ORDER STATE MACHINE</text>
  <path d="M560,68 Q1070,84 1580,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- START -->
  <circle cx="60" cy="240" r="13" fill="#111"/>
  <path d="M73,240 L98,240" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="56" y="218" font-family="Chalkboard SE" font-size="12.5" fill="#111">placeOrder()</text>

  <!-- STORY CIRCLES -->
  <circle cx="135" cy="150" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="135" y="157" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <circle cx="769" cy="150" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="769" y="157" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">2</text>
  <circle cx="1403" cy="150" r="15" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="1403" y="157" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">3</text>

  <!-- B1 PLACED -->
  <rect x="105" y="170" width="265" height="140" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="237" y="200" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">PLACED</text>
  <path d="M119,212 L356,212" stroke="#2563eb" stroke-width="2"/>
  <text x="123" y="240" font-family="Chalkboard SE" font-size="13" fill="#111">order created — Factory</text>
  <text x="123" y="262" font-family="Chalkboard SE" font-size="13" fill="#111">UUID · subtotal+tax+fee</text>
  <text x="123" y="290" font-family="Chalkboard SE" font-size="12" fill="#6b7280">restaurant must be OPEN</text>

  <!-- B2 CONFIRMED -->
  <rect x="422" y="170" width="265" height="140" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="554" y="200" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">CONFIRMED</text>
  <path d="M436,212 L673,212" stroke="#2563eb" stroke-width="2"/>
  <text x="440" y="240" font-family="Chalkboard SE" font-size="13" fill="#111">restaurant accepted</text>
  <text x="440" y="262" font-family="Chalkboard SE" font-size="13" fill="#111">→ kitchen queue</text>
  <text x="440" y="290" font-family="Chalkboard SE" font-size="12" fill="#6b7280">Observer: notify customer</text>

  <!-- B3 PREPARING -->
  <rect x="739" y="170" width="265" height="140" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="871" y="200" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">PREPARING</text>
  <path d="M753,212 L990,212" stroke="#2563eb" stroke-width="2"/>
  <text x="757" y="240" font-family="Chalkboard SE" font-size="13" fill="#111">kitchen cooking</text>
  <text x="757" y="262" font-family="Chalkboard SE" font-size="13" fill="#111">food being prepared</text>
  <text x="757" y="290" font-family="Chalkboard SE" font-size="12" fill="#6b7280">prep-time estimate shown</text>

  <!-- B4 READY_FOR_PICKUP -->
  <rect x="1056" y="170" width="265" height="140" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="1188" y="200" font-family="Chalkboard SE" font-size="14.5" fill="#2563eb" text-anchor="middle" font-weight="bold">READY_FOR_PICKUP</text>
  <path d="M1070,212 L1307,212" stroke="#2563eb" stroke-width="2"/>
  <text x="1074" y="240" font-family="Chalkboard SE" font-size="13" fill="#111">food packed &amp; waiting</text>
  <text x="1074" y="262" font-family="Chalkboard SE" font-size="13" fill="#111">awaiting a partner</text>
  <text x="1074" y="290" font-family="Chalkboard SE" font-size="12" fill="#6b7280">no cancel past this point</text>

  <!-- B5 OUT_FOR_DELIVERY -->
  <rect x="1373" y="170" width="265" height="140" rx="12" fill="none" stroke="#ea580c" stroke-width="3.2"/>
  <text x="1505" y="200" font-family="Chalkboard SE" font-size="14.5" fill="#ea580c" text-anchor="middle" font-weight="bold">OUT_FOR_DELIVERY</text>
  <path d="M1387,212 L1624,212" stroke="#ea580c" stroke-width="2"/>
  <text x="1391" y="240" font-family="Chalkboard SE" font-size="13" fill="#111">partner assigned</text>
  <text x="1391" y="262" font-family="Chalkboard SE" font-size="13" fill="#111">Strategy: nearest</text>
  <text x="1391" y="290" font-family="Chalkboard SE" font-size="12" fill="#6b7280">live GPS tracking</text>

  <!-- B6 DELIVERED -->
  <rect x="1690" y="170" width="265" height="140" rx="12" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <text x="1822" y="200" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">DELIVERED</text>
  <path d="M1704,212 L1941,212" stroke="#16a34a" stroke-width="2"/>
  <text x="1708" y="240" font-family="Chalkboard SE" font-size="13" fill="#111">handed to customer</text>
  <text x="1708" y="262" font-family="Chalkboard SE" font-size="13" fill="#111">actualDeliveryTime set</text>
  <text x="1708" y="290" font-family="Chalkboard SE" font-size="12" fill="#6b7280">terminal &#10003;</text>

  <!-- forward transitions -->
  <path d="M370,240 L418,240" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="394" y="228" font-family="Chalkboard SE" font-size="12" fill="#111" text-anchor="middle">accept</text>
  <path d="M687,240 L735,240" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="711" y="228" font-family="Chalkboard SE" font-size="12" fill="#111" text-anchor="middle">cook</text>
  <path d="M1004,240 L1052,240" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="1028" y="228" font-family="Chalkboard SE" font-size="12" fill="#111" text-anchor="middle">ready</text>
  <path d="M1321,240 L1369,240" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#aho)"/>
  <text x="1345" y="228" font-family="Chalkboard SE" font-size="12" fill="#ea580c" text-anchor="middle">pick&#160;up</text>
  <path d="M1638,240 L1686,240" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="1662" y="228" font-family="Chalkboard SE" font-size="12" fill="#15803d" text-anchor="middle">deliver</text>

  <!-- terminal sink after DELIVERED -->
  <path d="M1955,240 L1998,240" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <circle cx="2020" cy="240" r="14" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="2020" cy="240" r="7" fill="#111"/>
  <text x="2020" y="278" font-family="Chalkboard SE" font-size="12.5" fill="#111" text-anchor="middle">done</text>

  <!-- CANCELLED side exit -->
  <rect x="520" y="378" width="360" height="120" rx="12" fill="none" stroke="#6b7280" stroke-width="3"/>
  <text x="700" y="410" font-family="Chalkboard SE" font-size="17" fill="#6b7280" text-anchor="middle" font-weight="bold">CANCELLED</text>
  <path d="M534,422 L866,422" stroke="#6b7280" stroke-width="2"/>
  <text x="540" y="450" font-family="Chalkboard SE" font-size="13.5" fill="#111">no delivery · refund issued</text>
  <text x="540" y="478" font-family="Chalkboard SE" font-size="12" fill="#6b7280">DELIVERED can never be cancelled (throws)</text>

  <!-- cancel arrows -->
  <path d="M237,310 C237,352 470,362 560,376" stroke="#6b7280" stroke-width="2.6" fill="none" marker-end="url(#ahgr)"/>
  <text x="330" y="346" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">customer cancels</text>
  <path d="M554,310 L640,374" stroke="#6b7280" stroke-width="2.6" fill="none" marker-end="url(#ahgr)"/>
  <text x="560" y="352" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">timeout</text>
  <path d="M871,310 C871,352 810,362 776,374" stroke="#6b7280" stroke-width="2.6" fill="none" marker-end="url(#ahgr)"/>
  <text x="828" y="352" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">rejected</text>

  <!-- cancelled terminal -->
  <path d="M880,438 L928,438" stroke="#6b7280" stroke-width="2.6" fill="none" marker-end="url(#ahgr)"/>
  <circle cx="950" cy="438" r="14" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="950" cy="438" r="7" fill="#111"/>
  <text x="950" y="476" font-family="Chalkboard SE" font-size="12.5" fill="#111" text-anchor="middle">done</text>

  <!-- ACTORS cluster -->
  <rect x="100" y="540" width="920" height="252" rx="16" fill="none" stroke="#7e22ce" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="132" cy="568" r="15" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="132" y="575" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">4</text>
  <text x="162" y="576" font-family="Marker Felt" font-size="20" fill="#7e22ce" font-weight="bold">THREE ACTORS — Observer notifications</text>

  <rect x="125" y="596" width="270" height="82" rx="10" fill="none" stroke="#2563eb" stroke-width="2.8"/>
  <text x="260" y="626" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">Customer</text>
  <text x="260" y="652" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">places · tracks · cancels</text>
  <rect x="420" y="596" width="270" height="82" rx="10" fill="none" stroke="#16a34a" stroke-width="2.8"/>
  <text x="555" y="626" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">Restaurant</text>
  <text x="555" y="652" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">accepts / rejects · cooks</text>
  <rect x="715" y="596" width="270" height="82" rx="10" fill="none" stroke="#ea580c" stroke-width="2.8"/>
  <text x="850" y="626" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">Delivery Partner</text>
  <text x="850" y="652" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">picks up · delivers</text>

  <text x="125" y="712" font-family="Chalkboard SE" font-size="14" fill="#111">Order holds List&lt;OrderObserver&gt; &#8594; fires on every setStatus()</text>
  <text x="125" y="736" font-family="Chalkboard SE" font-size="14" fill="#111">OrderNotifier pushes updates to customer + restaurant</text>
  <text x="125" y="762" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">decoupled from Order (SRP) — add SMS/push listener = 0 core edits &#10003;</text>

  <!-- STRATEGY cluster -->
  <rect x="1050" y="540" width="980" height="252" rx="16" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="1082" cy="568" r="15" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="1082" y="575" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">5</text>
  <text x="1112" y="576" font-family="Marker Felt" font-size="20" fill="#ea580c" font-weight="bold">STRATEGY + FACTORY — matching &amp; money</text>

  <text x="1075" y="616" font-family="Chalkboard SE" font-size="14.5" fill="#111" font-weight="bold">DriverMatchingStrategy — NearestDriver</text>
  <text x="1075" y="640" font-family="Chalkboard SE" font-size="13.5" fill="#111">scans AVAILABLE partners &#8594; min Haversine distance</text>
  <text x="1075" y="662" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">assign &#8594; mark partner BUSY; on DELIVERED &#8594; back to AVAILABLE</text>
  <text x="1075" y="694" font-family="Chalkboard SE" font-size="14.5" fill="#111" font-weight="bold">PricingStrategy &#183; Factory</text>
  <text x="1075" y="718" font-family="Chalkboard SE" font-size="13.5" fill="#111">total = subtotal + tax + delivery fee</text>
  <text x="1075" y="740" font-family="Chalkboard SE" font-size="13.5" fill="#111">placeOrder() = Factory: UUID + totals + PLACED default</text>
  <text x="1075" y="766" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">swap algorithms w/o touching the service — Open/Closed &#10003;</text>

  <!-- STICKIES -->
  <g transform="rotate(-2 400 905)">
    <rect x="100" y="820" width="600" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="122" y="854" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">STATE MACHINE — guards illegal moves:</text>
    <text x="122" y="884" font-family="Chalkboard SE" font-size="14" fill="#713f12">each status names its legal next states;</text>
    <text x="122" y="908" font-family="Chalkboard SE" font-size="14" fill="#713f12">anything else throws InvalidOperationException.</text>
    <text x="122" y="932" font-family="Chalkboard SE" font-size="14" fill="#713f12">can't deliver an order that was never picked up.</text>
    <text x="122" y="958" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">DELIVERED &amp; CANCELLED are terminal sinks.</text>
  </g>
  <circle cx="400" cy="824" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 1030 905)">
    <rect x="730" y="820" width="600" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="752" y="854" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">DRIVER ASSIGNMENT:</text>
    <text x="752" y="884" font-family="Chalkboard SE" font-size="14" fill="#713f12">nearest AVAILABLE partner by great-circle</text>
    <text x="752" y="908" font-family="Chalkboard SE" font-size="14" fill="#713f12">(Haversine) distance to the restaurant.</text>
    <text x="752" y="932" font-family="Chalkboard SE" font-size="14" fill="#713f12">O(n) scan here &#8594; geo-index / quadtree in prod</text>
    <text x="752" y="958" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">for O(log n) nearest lookup.</text>
  </g>
  <circle cx="1030" cy="824" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1660 905)">
    <rect x="1360" y="820" width="600" height="170" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1382" y="854" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">PATTERNS TO NAME:</text>
    <text x="1382" y="884" font-family="Chalkboard SE" font-size="14" fill="#14532d">State (order lifecycle)</text>
    <text x="1382" y="908" font-family="Chalkboard SE" font-size="14" fill="#14532d">Strategy (matching + pricing)</text>
    <text x="1382" y="932" font-family="Chalkboard SE" font-size="14" fill="#14532d">Observer (notifications)</text>
    <text x="1382" y="958" font-family="Chalkboard SE" font-size="14" fill="#14532d">Factory (placeOrder) &#183; Repository (stores)</text>
  </g>
  <circle cx="1660" cy="824" r="7" fill="#dc2626"/>

  <!-- WHITEBOARD ORDER -->
  <text x="100" y="1050" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="310" y="1050" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; PLACED (Factory) &#8594; CONFIRMED &#8594; PREPARING &#8594; READY &#8594; &#9313; assign partner (Strategy) &#8594; OUT_FOR_DELIVERY &#8594; &#9314; DELIVERED &#183; CANCELLED is the side exit</text>

  <!-- LEGEND -->
  <rect x="100" y="1085" width="1930" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="128" y="1147" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="280" y="1121" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="314" y="1139">in-progress state</text>
    <rect x="280" y="1167" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="314" y="1185">delivered (success)</text>
    <rect x="520" y="1121" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="554" y="1139">delivery / strategy</text>
    <rect x="520" y="1167" width="24" height="24" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/><text x="554" y="1185">cancelled</text>
    <rect x="760" y="1121" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="794" y="1139">actors (Observer)</text>
    <rect x="760" y="1167" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="794" y="1185">interview insight</text>
    <path d="M1000,1133 L1060,1133" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/><text x="1074" y="1139">transition</text>
    <path d="M1000,1179 L1060,1179" stroke="#6b7280" stroke-width="2.6" fill="none" marker-end="url(#ahgr)"/><text x="1074" y="1185">cancel path</text>
    <circle cx="1272" cy="1133" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1272" y="1138" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1294" y="1139">story step</text>
    <circle cx="1272" cy="1179" r="12" fill="none" stroke="#111" stroke-width="3"/><circle cx="1272" cy="1179" r="6" fill="#111"/><text x="1294" y="1185">terminal</text>
    <text x="1500" y="1139" fill="#6b7280">Patterns: State &#183; Strategy &#183; Observer &#183; Factory &#183; Repository</text>
    <text x="1500" y="1185" fill="#6b7280">Food Delivery — LLD (order state machine + assignment)</text>
  </g>
</svg>
