<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1320" viewBox="0 0 2140 1320">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahp" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#db2777"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
  </defs>

  <rect width="2140" height="1320" fill="#ffffff"/>

  <!-- ═════════ TITLE ═════════ -->
  <text x="1070" y="50" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">SPLITWISE — SPLITS &#8594; BALANCES &#8594; MINIMAL SETTLEMENT</text>
  <path d="M470,68 Q1070,84 1670,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ═════════ 1: SPLIT STRATEGY ═════════ -->
  <rect x="55" y="155" width="440" height="280" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <circle cx="77" cy="179" r="13" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="77" y="186" font-family="Chalkboard SE" font-size="15" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <text x="100" y="186" font-family="Chalkboard SE" font-size="17" fill="#2563eb" font-weight="bold">SPLIT STRATEGY (&#215;3)</text>
  <path d="M69,200 L481,200" stroke="#2563eb" stroke-width="2"/>
  <text x="72" y="228" font-family="Chalkboard SE" font-size="13.5" fill="#111">EQUAL&#160;&#160;&#160;&#8594; total / N</text>
  <text x="72" y="252" font-family="Chalkboard SE" font-size="13.5" fill="#111">EXACT&#160;&#160;&#160;&#8594; given amounts (&#931; = total)</text>
  <text x="72" y="276" font-family="Chalkboard SE" font-size="13.5" fill="#111">PERCENT &#8594; total &#215; pct / 100</text>
  <text x="72" y="306" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">&#931; splits == total &#8212; hard invariant &#10003;</text>
  <text x="72" y="336" font-family="Chalkboard SE" font-size="13" fill="#6b7280">$300 dinner &#247; 3 = $100 each</text>
  <text x="72" y="366" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">penny remainder &#8594; first participant</text>
  <text x="72" y="396" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">one enum &#8594; one calculation. New type = 1 case,</text>
  <text x="72" y="418" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">expense flow untouched (Open/Closed).</text>

  <!-- 1 -> 2 -->
  <path d="M495,295 L536,295" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="515" y="285" font-family="Chalkboard SE" font-size="12" fill="#111" text-anchor="middle">apply</text>

  <!-- ═════════ 2: BALANCE GRAPH ═════════ -->
  <rect x="540" y="155" width="490" height="280" rx="12" fill="none" stroke="#7e22ce" stroke-width="3.2"/>
  <circle cx="562" cy="179" r="13" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="562" y="186" font-family="Chalkboard SE" font-size="15" fill="#7e22ce" text-anchor="middle" font-weight="bold">2</text>
  <text x="585" y="186" font-family="Chalkboard SE" font-size="17" fill="#7e22ce" font-weight="bold">PAIRWISE BALANCE GRAPH</text>
  <path d="M554,200 L1016,200" stroke="#7e22ce" stroke-width="2"/>

  <!-- edges (X -> Y = X owes Y) -->
  <path d="M636,352 L909,263" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ahv)"/>
  <text x="748" y="296" font-family="Chalkboard SE" font-size="13.5" fill="#7e22ce" font-weight="bold">$50</text>
  <path d="M637,364 L908,399" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ahv)"/>
  <text x="752" y="398" font-family="Chalkboard SE" font-size="13.5" fill="#7e22ce" font-weight="bold">$20</text>
  <path d="M935,282 L935,377" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ahv)"/>
  <text x="948" y="335" font-family="Chalkboard SE" font-size="13.5" fill="#7e22ce" font-weight="bold">$30</text>

  <!-- nodes -->
  <circle cx="610" cy="360" r="27" fill="#fff" stroke="#7e22ce" stroke-width="3"/>
  <text x="610" y="367" font-family="Chalkboard SE" font-size="19" fill="#111" text-anchor="middle" font-weight="bold">A</text>
  <circle cx="935" cy="255" r="27" fill="#fff" stroke="#7e22ce" stroke-width="3"/>
  <text x="935" y="262" font-family="Chalkboard SE" font-size="19" fill="#111" text-anchor="middle" font-weight="bold">B</text>
  <circle cx="935" cy="405" r="27" fill="#fff" stroke="#7e22ce" stroke-width="3"/>
  <text x="935" y="412" font-family="Chalkboard SE" font-size="19" fill="#111" text-anchor="middle" font-weight="bold">C</text>

  <text x="560" y="424" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">arrow = &#8220;owes&#8221; &#183; up to N(N&#8722;1)/2 edges</text>

  <!-- 2 -> 3 -->
  <path d="M1030,295 L1071,295" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="1050" y="285" font-family="Chalkboard SE" font-size="12" fill="#111" text-anchor="middle">net</text>

  <!-- ═════════ 3: NET BALANCE ═════════ -->
  <rect x="1075" y="155" width="360" height="280" rx="12" fill="none" stroke="#ea580c" stroke-width="3.2"/>
  <circle cx="1097" cy="179" r="13" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="1097" y="186" font-family="Chalkboard SE" font-size="15" fill="#ea580c" text-anchor="middle" font-weight="bold">3</text>
  <text x="1120" y="186" font-family="Chalkboard SE" font-size="17" fill="#ea580c" font-weight="bold">NET BALANCE / USER</text>
  <path d="M1089,200 L1421,200" stroke="#ea580c" stroke-width="2"/>
  <text x="1092" y="226" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">collapse the graph &#8594; one number each</text>
  <text x="1110" y="266" font-family="Chalkboard SE" font-size="17" fill="#dc2626" font-weight="bold">A :  &#8722;70</text>
  <text x="1290" y="266" font-family="Chalkboard SE" font-size="13" fill="#6b7280">owes 50 + 20</text>
  <text x="1110" y="302" font-family="Chalkboard SE" font-size="17" fill="#15803d" font-weight="bold">B :  +20</text>
  <text x="1290" y="302" font-family="Chalkboard SE" font-size="13" fill="#6b7280">owed 50, owes 30</text>
  <text x="1110" y="338" font-family="Chalkboard SE" font-size="17" fill="#15803d" font-weight="bold">C :  +50</text>
  <text x="1290" y="338" font-family="Chalkboard SE" font-size="13" fill="#6b7280">owed 30 + 20</text>
  <text x="1092" y="378" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">&#931; of all nets == 0  (always) &#10003;</text>
  <text x="1092" y="406" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">+ = is owed (creditor) &#183; &#8722; = owes (debtor)</text>

  <!-- 3 -> 4 -->
  <path d="M1255,435 C1255,470 960,455 910,472" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="1085" y="462" font-family="Chalkboard SE" font-size="12" fill="#111" text-anchor="middle">sort &amp; match</text>

  <!-- ═════════ 4: GREEDY TWO-POINTER ═════════ -->
  <rect x="540" y="476" width="760" height="272" rx="12" fill="none" stroke="#db2777" stroke-width="3.2"/>
  <circle cx="562" cy="500" r="13" fill="none" stroke="#db2777" stroke-width="2.6"/>
  <text x="562" y="507" font-family="Chalkboard SE" font-size="15" fill="#db2777" text-anchor="middle" font-weight="bold">4</text>
  <text x="585" y="507" font-family="Chalkboard SE" font-size="17" fill="#db2777" font-weight="bold">GREEDY TWO-POINTER MATCH</text>
  <path d="M554,521 L1286,521" stroke="#db2777" stroke-width="2"/>
  <text x="560" y="547" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">sort nets ascending: most negative (debtor) left, most positive (creditor) right</text>

  <!-- sorted cells -->
  <rect x="600" y="562" width="150" height="52" rx="8" fill="none" stroke="#dc2626" stroke-width="2.6"/>
  <text x="675" y="595" font-family="Chalkboard SE" font-size="16" fill="#dc2626" text-anchor="middle" font-weight="bold">A  &#8722;70</text>
  <rect x="770" y="562" width="150" height="52" rx="8" fill="none" stroke="#15803d" stroke-width="2.6"/>
  <text x="845" y="595" font-family="Chalkboard SE" font-size="16" fill="#15803d" text-anchor="middle" font-weight="bold">B  +20</text>
  <rect x="940" y="562" width="150" height="52" rx="8" fill="none" stroke="#15803d" stroke-width="2.6"/>
  <text x="1015" y="595" font-family="Chalkboard SE" font-size="16" fill="#15803d" text-anchor="middle" font-weight="bold">C  +50</text>
  <text x="675" y="636" font-family="Chalkboard SE" font-size="13" fill="#db2777" text-anchor="middle" font-weight="bold">&#8593; L</text>
  <text x="1015" y="636" font-family="Chalkboard SE" font-size="13" fill="#db2777" text-anchor="middle" font-weight="bold">R &#8593;</text>

  <text x="560" y="672" font-family="Chalkboard SE" font-size="13.5" fill="#111">L=A(&#8722;70), R=C(+50) &#8594; min(70,50)=50 &#8594; A pays C $50 &#183; C settled, R&#8722;&#8722;</text>
  <text x="560" y="696" font-family="Chalkboard SE" font-size="13.5" fill="#111">L=A(&#8722;20), R=B(+20) &#8594; min(20,20)=20 &#8594; A pays B $20 &#183; both settled</text>
  <text x="560" y="726" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">sort O(N log N) + one linear sweep O(N) &#8594; overall O(N log N), space O(N)</text>

  <!-- 4 -> 5 -->
  <path d="M1300,612 L1341,612" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="1320" y="602" font-family="Chalkboard SE" font-size="12" fill="#111" text-anchor="middle">emit</text>

  <!-- ═════════ 5: MINIMAL TRANSFERS ═════════ -->
  <rect x="1345" y="476" width="735" height="272" rx="12" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <circle cx="1367" cy="500" r="13" fill="none" stroke="#16a34a" stroke-width="2.6"/>
  <text x="1367" y="507" font-family="Chalkboard SE" font-size="15" fill="#16a34a" text-anchor="middle" font-weight="bold">5</text>
  <text x="1390" y="507" font-family="Chalkboard SE" font-size="17" fill="#16a34a" font-weight="bold">MINIMAL TRANSFERS (output)</text>
  <path d="M1359,521 L2066,521" stroke="#16a34a" stroke-width="2"/>

  <rect x="1385" y="556" width="360" height="56" rx="10" fill="none" stroke="#16a34a" stroke-width="2.8"/>
  <text x="1408" y="591" font-family="Chalkboard SE" font-size="18" fill="#111" font-weight="bold">A</text>
  <path d="M1440,585 L1560,585" stroke="#16a34a" stroke-width="2.8" fill="none" marker-end="url(#ahg)"/>
  <text x="1500" y="576" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" text-anchor="middle">pays</text>
  <text x="1580" y="591" font-family="Chalkboard SE" font-size="18" fill="#111" font-weight="bold">C</text>
  <text x="1670" y="591" font-family="Chalkboard SE" font-size="18" fill="#15803d" text-anchor="middle" font-weight="bold">$50</text>

  <rect x="1385" y="628" width="360" height="56" rx="10" fill="none" stroke="#16a34a" stroke-width="2.8"/>
  <text x="1408" y="663" font-family="Chalkboard SE" font-size="18" fill="#111" font-weight="bold">A</text>
  <path d="M1440,657 L1560,657" stroke="#16a34a" stroke-width="2.8" fill="none" marker-end="url(#ahg)"/>
  <text x="1500" y="648" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" text-anchor="middle">pays</text>
  <text x="1580" y="663" font-family="Chalkboard SE" font-size="18" fill="#111" font-weight="bold">B</text>
  <text x="1670" y="663" font-family="Chalkboard SE" font-size="18" fill="#15803d" text-anchor="middle" font-weight="bold">$20</text>

  <text x="1775" y="580" font-family="Chalkboard SE" font-size="15" fill="#15803d" font-weight="bold">3 edges &#8594; 2 transfers</text>
  <text x="1775" y="606" font-family="Chalkboard SE" font-size="14" fill="#111">guaranteed &#8804; N&#8722;1 payments</text>
  <text x="1775" y="644" font-family="Chalkboard SE" font-size="13" fill="#6b7280">nobody pays more than they owe;</text>
  <text x="1775" y="666" font-family="Chalkboard SE" font-size="13" fill="#6b7280">nobody receives more than owed.</text>
  <text x="1385" y="720" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">simplify &#8800; settle &#8212; actual payback is a separate recordPayment() follow-up</text>

  <!-- ═════════ STICKY A: BigDecimal ═════════ -->
  <g transform="rotate(-2 245 878)">
    <rect x="60" y="800" width="370" height="156" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="80" y="832" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">MONEY = BigDecimal, NEVER double:</text>
    <text x="80" y="862" font-family="Chalkboard SE" font-size="14" fill="#713f12">0.1 + 0.2 &#8800; 0.3 in double &#8594;</text>
    <text x="80" y="886" font-family="Chalkboard SE" font-size="14" fill="#713f12">pennies drift, balances rot.</text>
    <text x="80" y="914" font-family="Chalkboard SE" font-size="14" fill="#713f12">SCALE = 2, RoundingMode.HALF_UP</text>
    <text x="80" y="940" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">remainder handed to first payer.</text>
  </g>
  <circle cx="248" cy="804" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY B: symmetric ═════════ -->
  <g transform="rotate(1.5 640 878)">
    <rect x="470" y="800" width="350" height="156" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="490" y="832" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">PAIRWISE &amp; SYMMETRIC:</text>
    <text x="490" y="862" font-family="Chalkboard SE" font-size="14" fill="#713f12">A.bal[B] = &#8722; B.bal[A]</text>
    <text x="490" y="888" font-family="Chalkboard SE" font-size="14" fill="#713f12">store BOTH sides on each user &#8594;</text>
    <text x="490" y="912" font-family="Chalkboard SE" font-size="14" fill="#713f12">O(1) &#8220;who do I owe?&#8221; view,</text>
    <text x="490" y="936" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">no global recompute per expense.</text>
  </g>
  <circle cx="643" cy="804" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY C: greedy vs optimal ═════════ -->
  <g transform="rotate(-1.5 1055 878)">
    <rect x="880" y="800" width="350" height="156" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="900" y="832" font-family="Chalkboard SE" font-size="15" fill="#7f1d1d" font-weight="bold">GREEDY &#8800; PROVABLY OPTIMAL:</text>
    <text x="900" y="862" font-family="Chalkboard SE" font-size="13.5" fill="#14532d">true min-txn is NP-hard</text>
    <text x="900" y="886" font-family="Chalkboard SE" font-size="13.5" fill="#14532d">(reduces to subset-sum)</text>
    <text x="900" y="912" font-family="Chalkboard SE" font-size="13.5" fill="#14532d">two-pointer &#8594; &#8804; N&#8722;1, fast</text>
    <text x="900" y="936" font-family="Chalkboard SE" font-size="13" fill="#6b7280">for 3&#8211;10 people = effectively optimal</text>
  </g>
  <circle cx="1058" cy="804" r="7" fill="#dc2626"/>

  <!-- ═════════ PATTERNS note (right) ═════════ -->
  <text x="1300" y="828" font-family="Chalkboard SE" font-size="16" fill="#db2777" font-weight="bold">PATTERNS TO NAME:</text>
  <text x="1300" y="858" font-family="Chalkboard SE" font-size="14.5" fill="#111">Strategy &#8212; split rules (Equal / Exact / Percent)</text>
  <text x="1300" y="884" font-family="Chalkboard SE" font-size="14.5" fill="#111">Facade &#8212; Splitwise, the single entry point</text>
  <text x="1300" y="910" font-family="Chalkboard SE" font-size="14.5" fill="#111">Observer &#8212; notify on expense added / settled</text>
  <text x="1300" y="936" font-family="Chalkboard SE" font-size="14.5" fill="#111">Greedy &#8212; BalanceSimplifier (sort nets, two-pointer)</text>
  <text x="1300" y="962" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">thread-safety: ConcurrentHashMap registries + synchronized applyExpense</text>

  <!-- ═════════ read-order strip ═════════ -->
  <text x="60" y="1050" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="1050" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; pick split Strategy &#8594; &#9313; update pairwise balance graph &#8594; &#9314; collapse to net per user &#8594; &#9315; greedy two-pointer match &#8594; &#9316; minimal transfers (&#8804; N&#8722;1)</text>

  <!-- ═════════ LEGEND ═════════ -->
  <rect x="60" y="1090" width="2020" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="1152" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="240" y="1126" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="274" y="1144">split strategy</text>
    <rect x="240" y="1172" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="274" y="1190">balance graph</text>
    <rect x="470" y="1126" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="504" y="1144">net balances</text>
    <rect x="470" y="1172" width="24" height="24" rx="5" fill="none" stroke="#db2777" stroke-width="3"/><text x="504" y="1190">greedy match</text>
    <rect x="700" y="1126" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="734" y="1144">final transfers</text>
    <rect x="700" y="1172" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="734" y="1190">interview insight</text>
    <path d="M960,1138 L1030,1138" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/><text x="1044" y="1144">pipeline flow</text>
    <path d="M960,1184 L1030,1184" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ahv)"/><text x="1044" y="1190">&#8220;owes&#8221; edge</text>
    <circle cx="1242" cy="1138" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1242" y="1143" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="13">n</text><text x="1266" y="1144">story step (read &#9312;&#8594;&#9316;)</text>
    <text x="1560" y="1144" fill="#6b7280">Patterns: Strategy &#183; Facade &#183; Observer &#183; Greedy</text>
    <text x="1560" y="1190" fill="#6b7280">Splitwise — expense splitting + debt simplification LLD</text>
  </g>
</svg>
