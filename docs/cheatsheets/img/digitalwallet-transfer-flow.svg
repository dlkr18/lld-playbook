<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1200" viewBox="0 0 2140 1200">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
  </defs>

  <rect width="2140" height="1200" fill="#ffffff"/>

  <!-- ═════════ TITLE ═════════ -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="45" fill="#1e40af" text-anchor="middle" font-weight="bold">DEADLOCK-FREE TRANSFER — ordered locking + double-entry ledger</text>
  <path d="M400,68 Q1070,86 1740,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- START dot -->
  <circle cx="34" cy="240" r="12" fill="#111"/>
  <path d="M46,240 L66,240" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- ① IDEMPOTENCY GATE -->
  <circle cx="110" cy="132" r="15" fill="#fff" stroke="#2563eb" stroke-width="2.8"/>
  <text x="110" y="138" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <rect x="70" y="150" width="350" height="180" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="245" y="182" font-family="Chalkboard SE" font-size="17" fill="#2563eb" text-anchor="middle" font-weight="bold">IDEMPOTENCY GATE</text>
  <path d="M84,194 L406,194" stroke="#2563eb" stroke-width="2"/>
  <text x="84" y="220" font-family="Chalkboard SE" font-size="13.5" fill="#111">computeIfAbsent(key)</text>
  <text x="84" y="244" font-family="Chalkboard SE" font-size="13.5" fill="#111">seen? &#8594; return cached txn</text>
  <text x="84" y="268" font-family="Chalkboard SE" font-size="13.5" fill="#111">replay moves 0 funds</text>
  <text x="84" y="300" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">fast path: store.get(key)</text>

  <path d="M420,240 L461,240" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- ② POLICY GATE -->
  <circle cx="505" cy="132" r="15" fill="#fff" stroke="#ea580c" stroke-width="2.8"/>
  <text x="505" y="138" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">2</text>
  <rect x="465" y="150" width="350" height="180" rx="12" fill="none" stroke="#ea580c" stroke-width="3.2"/>
  <text x="640" y="182" font-family="Chalkboard SE" font-size="17" fill="#ea580c" text-anchor="middle" font-weight="bold">POLICY GATE</text>
  <path d="M479,194 L801,194" stroke="#ea580c" stroke-width="2"/>
  <text x="479" y="220" font-family="Chalkboard SE" font-size="13.5" fill="#111">validate(from,to,amt)</text>
  <text x="479" y="244" font-family="Chalkboard SE" font-size="13.5" fill="#111">daily-limit check</text>
  <text x="479" y="268" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">veto &#8594; LimitExceeded</text>
  <text x="479" y="300" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">pluggable TransferPolicy (Strategy)</text>

  <path d="M815,240 L856,240" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- ③ LOCK IN ID ORDER -->
  <circle cx="900" cy="132" r="15" fill="#fff" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="900" y="138" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">3</text>
  <rect x="860" y="150" width="350" height="180" rx="12" fill="none" stroke="#7e22ce" stroke-width="3.2"/>
  <text x="1035" y="182" font-family="Chalkboard SE" font-size="17" fill="#7e22ce" text-anchor="middle" font-weight="bold">LOCK IN ID ORDER</text>
  <path d="M874,194 L1196,194" stroke="#7e22ce" stroke-width="2"/>
  <text x="874" y="220" font-family="Chalkboard SE" font-size="13.5" fill="#111">lo = lower(a,b).lock()</text>
  <text x="874" y="244" font-family="Chalkboard SE" font-size="13.5" fill="#111">hi = higher(a,b).lock()</text>
  <text x="874" y="268" font-family="Chalkboard SE" font-size="13.5" fill="#111">lo.lock(); hi.lock()</text>
  <text x="874" y="300" font-family="Chalkboard SE" font-size="12.5" fill="#dc2626" font-weight="bold">one global order &#8658; no deadlock</text>

  <path d="M1210,240 L1251,240" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- ④ FUNDS CHECK + MOVE -->
  <circle cx="1295" cy="132" r="15" fill="#fff" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1295" y="138" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">4</text>
  <rect x="1255" y="150" width="350" height="180" rx="12" fill="none" stroke="#7e22ce" stroke-width="3.2"/>
  <text x="1430" y="182" font-family="Chalkboard SE" font-size="17" fill="#7e22ce" text-anchor="middle" font-weight="bold">FUNDS CHECK + MOVE</text>
  <path d="M1269,194 L1591,194" stroke="#7e22ce" stroke-width="2"/>
  <text x="1269" y="220" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">bal &lt; amt? &#8594; throw</text>
  <text x="1269" y="244" font-family="Chalkboard SE" font-size="13.5" fill="#111">from.debit(amt)</text>
  <text x="1269" y="268" font-family="Chalkboard SE" font-size="13.5" fill="#111">to.credit(amt)</text>
  <text x="1269" y="300" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">check BEFORE any mutation</text>

  <path d="M1605,240 L1646,240" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ahg)"/>

  <!-- ⑤ LEDGER + COMPLETE -->
  <circle cx="1690" cy="132" r="15" fill="#fff" stroke="#15803d" stroke-width="2.8"/>
  <text x="1690" y="138" font-family="Chalkboard SE" font-size="16" fill="#15803d" text-anchor="middle" font-weight="bold">5</text>
  <rect x="1650" y="150" width="350" height="180" rx="12" fill="none" stroke="#15803d" stroke-width="3.2"/>
  <text x="1825" y="182" font-family="Chalkboard SE" font-size="17" fill="#15803d" text-anchor="middle" font-weight="bold">LEDGER + COMPLETE</text>
  <path d="M1664,194 L1986,194" stroke="#15803d" stroke-width="2"/>
  <text x="1664" y="220" font-family="Chalkboard SE" font-size="13.5" fill="#111">record &#8594; DR/CR pair</text>
  <text x="1664" y="244" font-family="Chalkboard SE" font-size="13.5" fill="#111">markCompleted(pair)</text>
  <text x="1664" y="268" font-family="Chalkboard SE" font-size="13.5" fill="#111">unlock &#183; accrue &#183; notify</text>
  <text x="1664" y="300" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" font-weight="bold">PENDING &#8594; COMPLETED</text>

  <!-- CRITICAL SECTION bracket under B3+B4 -->
  <path d="M860,346 L860,338 L1605,338 L1605,346" stroke="#7e22ce" stroke-width="2.4" stroke-dasharray="9,6" fill="none"/>
  <text x="1232" y="368" font-family="Chalkboard SE" font-size="14" fill="#7e22ce" text-anchor="middle" font-weight="bold">CRITICAL SECTION — both locks held &#8658; debit + credit indivisible</text>

  <!-- ═════════ DEADLOCK CLUSTER ═════════ -->
  <rect x="70" y="410" width="730" height="300" rx="16" fill="none" stroke="#dc2626" stroke-width="3" stroke-dasharray="14,9"/>
  <text x="94" y="444" font-family="Marker Felt" font-size="19" fill="#dc2626" font-weight="bold">THE DEADLOCK — why lock ORDER matters</text>

  <rect x="94" y="458" width="320" height="92" rx="10" fill="none" stroke="#6b7280" stroke-width="2.8"/>
  <text x="106" y="484" font-family="Chalkboard SE" font-size="15" fill="#111" font-weight="bold">Thread 1:  A &#8594; B</text>
  <text x="106" y="508" font-family="Chalkboard SE" font-size="13.5" fill="#111">grabs lock A, then B</text>
  <text x="106" y="532" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">naive: lock by direction</text>

  <rect x="456" y="458" width="320" height="92" rx="10" fill="none" stroke="#6b7280" stroke-width="2.8"/>
  <text x="468" y="484" font-family="Chalkboard SE" font-size="15" fill="#111" font-weight="bold">Thread 2:  B &#8594; A</text>
  <text x="468" y="508" font-family="Chalkboard SE" font-size="13.5" fill="#111">grabs lock B, then A</text>
  <text x="468" y="532" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">naive: lock by direction</text>

  <!-- circular wait arrows -->
  <path d="M414,494 L452,494" stroke="#dc2626" stroke-width="2.6" stroke-dasharray="7,5" fill="none" marker-end="url(#ahr)"/>
  <path d="M456,520 L418,520" stroke="#dc2626" stroke-width="2.6" stroke-dasharray="7,5" fill="none" marker-end="url(#ahr)"/>
  <text x="435" y="576" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" text-anchor="middle" font-weight="bold">circular wait &#8658; DEADLOCK &#10007;</text>

  <text x="94" y="626" font-family="Chalkboard SE" font-size="14.5" fill="#15803d" font-weight="bold">FIX &#10003;  always acquire in ascending account-id order:</text>
  <text x="94" y="652" font-family="Chalkboard SE" font-size="14" fill="#111">lower(from,to) then higher(from,to) &#8212; direction-independent.</text>
  <text x="94" y="682" font-family="Chalkboard SE" font-size="14" fill="#15803d" font-weight="bold">the A&#8594;B / B&#8594;A cycle can never form &#8594; deadlock-free.</text>

  <!-- ═════════ LEDGER BOX ═════════ -->
  <rect x="830" y="410" width="600" height="300" rx="12" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="1130" y="444" font-family="Chalkboard SE" font-size="18" fill="#15803d" text-anchor="middle" font-weight="bold">DOUBLE-ENTRY LEDGER</text>
  <path d="M844,456 L1416,456" stroke="#16a34a" stroke-width="2"/>
  <text x="846" y="484" font-family="Chalkboard SE" font-size="14" fill="#111">every movement appends a balanced pair:</text>
  <text x="862" y="516" font-family="Chalkboard SE" font-size="14" fill="#dc2626">DEBIT&#160;&#160;payer&#160;&#160;&#160;&#8722; $100.00</text>
  <text x="862" y="540" font-family="Chalkboard SE" font-size="14" fill="#15803d">CREDIT payee&#160;&#160;&#160;+ $100.00</text>
  <path d="M862,552 L1200,552" stroke="#6b7280" stroke-width="1.6"/>
  <text x="862" y="578" font-family="Chalkboard SE" font-size="14" fill="#111" font-weight="bold">signed sum of pair = $0.00</text>
  <text x="846" y="614" font-family="Chalkboard SE" font-size="14" fill="#15803d" font-weight="bold">totalLedgerBalance() &#8801; 0.00 (system invariant)</text>
  <text x="846" y="644" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">SYSTEM cash acct = external counterparty; even</text>
  <text x="846" y="666" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">top-up / withdraw net to zero across all accounts</text>

  <!-- ═════════ IDEMPOTENCY BOX ═════════ -->
  <rect x="1460" y="410" width="540" height="300" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1730" y="444" font-family="Chalkboard SE" font-size="18" fill="#2563eb" text-anchor="middle" font-weight="bold">IDEMPOTENCY — at most once</text>
  <path d="M1474,456 L1986,456" stroke="#2563eb" stroke-width="2"/>
  <text x="1476" y="486" font-family="Chalkboard SE" font-size="14" fill="#111">replay(key) &#8594; returns cached txn,</text>
  <text x="1476" y="510" font-family="Chalkboard SE" font-size="14" fill="#111">moves 0 funds.</text>
  <text x="1476" y="544" font-family="Chalkboard SE" font-size="14" fill="#111">first attempt THROWS &#8658;</text>
  <text x="1476" y="568" font-family="Chalkboard SE" font-size="14" fill="#111">computeIfAbsent stores nothing</text>
  <text x="1476" y="598" font-family="Chalkboard SE" font-size="14" fill="#15803d" font-weight="bold">&#8658; key stays free for a real retry</text>
  <text x="1476" y="634" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">trade-off: cache SUCCESSES only &#8212; caching</text>
  <text x="1476" y="656" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">failures would echo the failure on replay</text>

  <!-- ═════════ STICKY A: REENTRANT ═════════ -->
  <g transform="rotate(-2 275 850)">
    <rect x="70" y="760" width="410" height="180" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="90" y="792" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">REENTRANT LOCK = FREE RE-ENTRY</text>
    <text x="90" y="820" font-family="Chalkboard SE" font-size="14" fill="#713f12">Account.lock() is a ReentrantLock.</text>
    <text x="90" y="844" font-family="Chalkboard SE" font-size="14" fill="#713f12">the two-account op holds it, then</text>
    <text x="90" y="868" font-family="Chalkboard SE" font-size="14" fill="#713f12">debit() / credit() lock the SAME</text>
    <text x="90" y="892" font-family="Chalkboard SE" font-size="14" fill="#713f12">account again &#8212; free re-entry,</text>
    <text x="90" y="916" font-family="Chalkboard SE" font-size="14" fill="#713f12">never a self-deadlock.</text>
  </g>
  <circle cx="275" cy="764" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY B: ALL-OR-NOTHING ═════════ -->
  <g transform="rotate(1.5 775 850)">
    <rect x="570" y="760" width="410" height="180" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="590" y="792" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">ALL-OR-NOTHING MOVE</text>
    <text x="590" y="820" font-family="Chalkboard SE" font-size="14" fill="#713f12">funds check runs UNDER both locks,</text>
    <text x="590" y="844" font-family="Chalkboard SE" font-size="14" fill="#713f12">BEFORE any mutation.</text>
    <text x="590" y="872" font-family="Chalkboard SE" font-size="14" fill="#713f12">a rejected transfer mutates</text>
    <text x="590" y="896" font-family="Chalkboard SE" font-size="14" fill="#713f12">neither balance.</text>
    <text x="590" y="922" font-family="Chalkboard SE" font-size="13" fill="#14532d" font-weight="bold">debit + credit are indivisible</text>
  </g>
  <circle cx="775" cy="764" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY C: ALTERNATIVES ═════════ -->
  <g transform="rotate(-1.5 1275 850)">
    <rect x="1070" y="760" width="410" height="180" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1090" y="792" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">ALTERNATIVES CONSIDERED</text>
    <text x="1090" y="820" font-family="Chalkboard SE" font-size="14" fill="#713f12">one global wallet lock &#8212; correct</text>
    <text x="1090" y="844" font-family="Chalkboard SE" font-size="14" fill="#713f12">but serial, zero concurrency.</text>
    <text x="1090" y="868" font-family="Chalkboard SE" font-size="14" fill="#713f12">tryLock + back-off &#8212; livelock risk.</text>
    <text x="1090" y="892" font-family="Chalkboard SE" font-size="14" fill="#713f12">DB row locks / optimistic version</text>
    <text x="1090" y="916" font-family="Chalkboard SE" font-size="13" fill="#14532d" font-weight="bold">columns = the production answer.</text>
  </g>
  <circle cx="1275" cy="764" r="7" fill="#dc2626"/>

  <!-- ═════════ MECHANISMS box (right) ═════════ -->
  <rect x="1520" y="760" width="480" height="180" rx="12" fill="none" stroke="#6b7280" stroke-width="2.6"/>
  <text x="1544" y="790" font-family="Chalkboard SE" font-size="15.5" fill="#111" font-weight="bold">CONCURRENCY TOOLKIT</text>
  <path d="M1534,802 L1986,802" stroke="#6b7280" stroke-width="1.6"/>
  <text x="1544" y="828" font-family="Chalkboard SE" font-size="13" fill="#111">ReentrantLock / account &#183; ordered acquire</text>
  <text x="1544" y="852" font-family="Chalkboard SE" font-size="13" fill="#111">ConcurrentHashMap &#183; txns + idempotency</text>
  <text x="1544" y="876" font-family="Chalkboard SE" font-size="13" fill="#111">CopyOnWriteArrayList &#183; observers</text>
  <text x="1544" y="900" font-family="Chalkboard SE" font-size="13" fill="#111">AtomicLong &#183; txn / entry id sequences</text>
  <text x="1544" y="926" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">immutable Money (BigDecimal, scale 2, never double)</text>

  <!-- ═════════ WHITEBOARD ORDER ═════════ -->
  <text x="60" y="984" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="984" font-family="Chalkboard SE" font-size="15" fill="#111">&#9312; idempotency gate &#8594; &#9313; policy gate &#8594; &#9314; lock in id order &#8594; &#9315; funds check + debit/credit &#8594; &#9316; ledger pair + COMPLETE &#8594; unlock/notify &#160;|&#160; replay = free read</text>

  <!-- ═════════ LEGEND ═════════ -->
  <rect x="60" y="1018" width="2020" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="1080" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="240" y="1054" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="274" y="1072">idempotency gate</text>
    <rect x="240" y="1100" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="274" y="1118">policy gate (Strategy)</text>
    <rect x="500" y="1054" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="534" y="1072">locking / critical section</text>
    <rect x="500" y="1100" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="534" y="1118">ledger / completed</text>
    <rect x="800" y="1054" width="24" height="24" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/><text x="834" y="1072">thread (naive)</text>
    <rect x="800" y="1100" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="834" y="1118">interview insight</text>
    <path d="M1030,1066 L1092,1066" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/><text x="1106" y="1072">happy-path flow</text>
    <path d="M1030,1112 L1092,1112" stroke="#dc2626" stroke-width="3" stroke-dasharray="7,5" fill="none" marker-end="url(#ahr)"/><text x="1106" y="1118">circular wait / deadlock</text>
    <circle cx="1362" cy="1066" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1362" y="1071" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1386" y="1072">story step</text>
    <text x="1560" y="1072" fill="#6b7280">Patterns: Command &#183; Strategy &#183; Observer &#183; Facade &#183; State</text>
    <text x="1560" y="1118" fill="#6b7280">Digital Wallet — atomic P2P transfer (ordered locks + ledger)</text>
  </g>
</svg>
