<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1320" viewBox="0 0 2140 1320">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="aha" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#b45309"/></marker>
  </defs>

  <rect width="2140" height="1320" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">TOKEN BUCKET — REFILL RATE + CAPACITY</text>
  <path d="M600,68 Q1070,84 1540,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ① REFILLER -->
  <circle cx="70" cy="128" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="70" y="135" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <rect x="110" y="108" width="330" height="66" rx="10" fill="none" stroke="#b45309" stroke-width="2.8"/>
  <text x="275" y="138" font-family="Chalkboard SE" font-size="15" fill="#b45309" text-anchor="middle" font-weight="bold">REFILLER — ScheduledExecutor</text>
  <text x="275" y="160" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">every 100ms: add R/10 tokens</text>

  <!-- drip arrows into bucket -->
  <path d="M190,176 L190,214" stroke="#b45309" stroke-width="2.4" stroke-dasharray="5,5" fill="none" marker-end="url(#aha)"/>
  <path d="M275,176 L275,214" stroke="#b45309" stroke-width="2.4" stroke-dasharray="5,5" fill="none" marker-end="url(#aha)"/>
  <path d="M360,176 L360,214" stroke="#b45309" stroke-width="2.4" stroke-dasharray="5,5" fill="none" marker-end="url(#aha)"/>
  <text x="470" y="196" font-family="Chalkboard SE" font-size="13" fill="#b45309" font-weight="bold">+R tokens/sec, capped at C</text>

  <!-- BUCKET -->
  <path d="M120,224 L120,520 Q120,540 140,540 L360,540 Q380,540 380,520 L380,224" stroke="#2563eb" stroke-width="3.4" fill="none"/>
  <text x="250" y="248" font-family="Chalkboard SE" font-size="15" fill="#2563eb" text-anchor="middle" font-weight="bold">BUCKET (per client)</text>
  <!-- capacity marker -->
  <path d="M120,270 L380,270" stroke="#93c5fd" stroke-width="2" stroke-dasharray="6,5"/>
  <text x="392" y="266" font-family="Chalkboard SE" font-size="12.5" fill="#2563eb">capacity C = 10 (full line)</text>
  <!-- tokens -->
  <circle cx="175" cy="510" r="20" fill="#fcd34d" stroke="#b45309" stroke-width="2.4"/>
  <circle cx="235" cy="510" r="20" fill="#fcd34d" stroke="#b45309" stroke-width="2.4"/>
  <circle cx="295" cy="510" r="20" fill="#fcd34d" stroke="#b45309" stroke-width="2.4"/>
  <circle cx="205" cy="468" r="20" fill="#fcd34d" stroke="#b45309" stroke-width="2.4"/>
  <circle cx="265" cy="468" r="20" fill="#fcd34d" stroke="#b45309" stroke-width="2.4"/>
  <text x="250" y="580" font-family="Chalkboard SE" font-size="14" fill="#111" text-anchor="middle" font-weight="bold">holds 5 / 10 tokens right now</text>

  <!-- ② REQUEST -->
  <circle cx="470" cy="300" r="15" fill="none" stroke="#111" stroke-width="2.6"/>
  <text x="470" y="307" font-family="Chalkboard SE" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">2</text>
  <rect x="500" y="278" width="250" height="90" rx="10" fill="none" stroke="#111" stroke-width="3"/>
  <text x="625" y="308" font-family="Chalkboard SE" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">REQUEST</text>
  <text x="625" y="332" font-family="Chalkboard SE" font-size="13" fill="#111" text-anchor="middle">client-42 needs</text>
  <text x="625" y="352" font-family="Chalkboard SE" font-size="13" fill="#111" text-anchor="middle">exactly 1 token</text>

  <!-- bucket -> diamond (tryConsume) -->
  <path d="M380,400 L862,400" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="400" y="428" font-family="Chalkboard SE" font-size="13" fill="#111">tryConsume() — synchronized</text>
  <!-- request drops onto tryConsume flow -->
  <path d="M625,368 L625,396" stroke="#111" stroke-width="2.4" fill="none" marker-end="url(#ah)"/>

  <!-- DECISION -->
  <path d="M960,340 L1062,400 L960,460 L858,400 z" fill="none" stroke="#111" stroke-width="3"/>
  <text x="960" y="395" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">tokens</text>
  <text x="960" y="418" font-family="Chalkboard SE" font-size="15" fill="#111" text-anchor="middle" font-weight="bold">&gt; 0 ?</text>

  <!-- YES -> consume -->
  <path d="M1062,400 L1148,400" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="1100" y="388" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">yes &#10003;</text>
  <rect x="1152" y="350" width="330" height="100" rx="10" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1317" y="382" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">CONSUME 1</text>
  <text x="1170" y="410" font-family="Chalkboard SE" font-size="13.5" fill="#111">tokens-- &#8594; now 4</text>
  <text x="1170" y="432" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">no refill needed here</text>

  <path d="M1482,400 L1548,400" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <rect x="1552" y="350" width="300" height="100" rx="10" fill="none" stroke="#16a34a" stroke-width="3.2"/>
  <text x="1702" y="382" font-family="Chalkboard SE" font-size="16" fill="#16a34a" text-anchor="middle" font-weight="bold">ALLOW &#8594; 200</text>
  <text x="1570" y="410" font-family="Chalkboard SE" font-size="13.5" fill="#111">remaining = tokens</text>
  <text x="1570" y="432" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">RateLimitResult.allowed()</text>

  <!-- NO -> block -->
  <path d="M960,460 L960,528" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="974" y="500" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">no &#10007; (empty)</text>
  <rect x="790" y="532" width="360" height="110" rx="10" fill="none" stroke="#dc2626" stroke-width="3.2"/>
  <text x="970" y="564" font-family="Chalkboard SE" font-size="16" fill="#dc2626" text-anchor="middle" font-weight="bold">BLOCK &#8594; 429</text>
  <text x="808" y="592" font-family="Chalkboard SE" font-size="13.5" fill="#111">retryAfter = 1000 / R  ms</text>
  <text x="808" y="614" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">bucket stays empty until next refill tick</text>

  <!-- TIMELINE box -->
  <rect x="110" y="670" width="1000" height="250" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="130" y="702" font-family="Chalkboard SE" font-size="16" fill="#2563eb" font-weight="bold">TIMELINE — C = 10, R = 5 tokens/sec</text>
  <path d="M124,714 L1096,714" stroke="#2563eb" stroke-width="1.8"/>
  <text x="130" y="742" font-family="Chalkboard SE" font-size="14" fill="#111">t = 0.0s&#160;&#160;&#8594;&#160;&#160;10 tokens (bucket full)</text>
  <text x="130" y="768" font-family="Chalkboard SE" font-size="14" fill="#111">t = 0.1s&#160;&#160;&#8594;&#160;&#160;5 requests consume &#8594; 5 tokens left</text>
  <text x="130" y="794" font-family="Chalkboard SE" font-size="14" fill="#111">t = 1.0s&#160;&#160;&#8594;&#160;&#160;refilled +5 &#8594; back to 10 tokens</text>
  <text x="130" y="820" font-family="Chalkboard SE" font-size="14" fill="#111">t = 1.1s&#160;&#160;&#8594;&#160;&#160;15 requests &#8594; 10 allowed, 5 BLOCKED</text>
  <text x="130" y="846" font-family="Chalkboard SE" font-size="14" fill="#111">t = 2.0s&#160;&#160;&#8594;&#160;&#160;refilled +5 &#8594; 5 tokens available</text>
  <text x="130" y="886" font-family="Chalkboard SE" font-size="13" fill="#15803d" font-weight="bold">burst of 10 tolerated, then throttled to the steady rate R &#10003;</text>

  <!-- CONCURRENCY box -->
  <rect x="1150" y="670" width="700" height="250" rx="12" fill="none" stroke="#7e22ce" stroke-width="3"/>
  <text x="1170" y="702" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" font-weight="bold">CONCURRENCY</text>
  <path d="M1164,714 L1836,714" stroke="#7e22ce" stroke-width="1.8"/>
  <text x="1170" y="742" font-family="Chalkboard SE" font-size="14" fill="#111">ConcurrentHashMap&lt;clientId, TokenBucket&gt;</text>
  <text x="1170" y="768" font-family="Chalkboard SE" font-size="14" fill="#111">computeIfAbsent &#8594; no double-init race</text>
  <text x="1170" y="794" font-family="Chalkboard SE" font-size="14" fill="#111">tryConsume() / refill() are synchronized</text>
  <text x="1170" y="820" font-family="Chalkboard SE" font-size="14" fill="#111">per bucket &#8212; fine-grained, not a global lock</text>
  <text x="1170" y="860" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">TOCTOU bug if unsynced: 2 threads read tokens=1,</text>
  <text x="1170" y="882" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">both decrement &#8594; 2 pass when only 1 should</text>

  <!-- STICKIES -->
  <g transform="rotate(-2 370 1040)">
    <rect x="110" y="960" width="500" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="132" y="994" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">TWO KNOBS: C vs R</text>
    <text x="132" y="1024" font-family="Chalkboard SE" font-size="14" fill="#713f12">C (capacity) = how big a burst is OK</text>
    <text x="132" y="1048" font-family="Chalkboard SE" font-size="14" fill="#713f12">R (refill) = the steady long-run rate</text>
    <text x="132" y="1074" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">tune them independently.</text>
  </g>
  <circle cx="370" cy="964" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 1035 1040)">
    <rect x="750" y="960" width="570" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="772" y="994" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">LAZY REFILL (interview upgrade):</text>
    <text x="772" y="1024" font-family="Chalkboard SE" font-size="14" fill="#713f12">drop the background thread &#8212; on each request</text>
    <text x="772" y="1048" font-family="Chalkboard SE" font-size="14" fill="#713f12">compute tokens += (now &#8722; last) &#215; R, cap at C.</text>
    <text x="772" y="1074" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">O(1), no scheduler, Redis-friendly.</text>
  </g>
  <circle cx="1035" cy="964" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1660 1040)">
    <rect x="1400" y="960" width="450" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1422" y="994" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">RETRY-AFTER:</text>
    <text x="1422" y="1024" font-family="Chalkboard SE" font-size="14" fill="#713f12">time until 1 token exists again</text>
    <text x="1422" y="1048" font-family="Chalkboard SE" font-size="14" fill="#713f12">= 1000 / R ms. Hand it to the</text>
    <text x="1422" y="1072" font-family="Chalkboard SE" font-size="14" fill="#713f12">client so it backs off precisely.</text>
  </g>
  <circle cx="1660" cy="964" r="7" fill="#dc2626"/>

  <!-- WHITEBOARD ORDER -->
  <text x="110" y="1170" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="320" y="1170" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; refiller drips tokens (cap C) &#8594; &#9313; request calls tryConsume() &#8594; tokens&gt;0 ? consume &amp; ALLOW : BLOCK with retryAfter = 1000/R</text>

  <!-- LEGEND -->
  <rect x="110" y="1200" width="1920" height="100" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="140" y="1258" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <circle cx="300" cy="1234" r="12" fill="#fcd34d" stroke="#b45309" stroke-width="2.2"/><text x="326" y="1240">token</text>
    <rect x="430" y="1222" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="464" y="1240">bucket / consume</text>
    <rect x="690" y="1222" width="24" height="24" rx="5" fill="none" stroke="#16a34a" stroke-width="3"/><text x="724" y="1240">allow &#8594; 200</text>
    <rect x="910" y="1222" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="944" y="1240">block &#8594; 429</text>
    <rect x="1120" y="1222" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="1154" y="1240">concurrency</text>
    <rect x="1350" y="1222" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="1384" y="1240">insight</text>
    <text x="1540" y="1240" fill="#6b7280">O(1) per request &#183; allows bursts up to C &#183; AWS, Stripe</text>
  </g>
</svg>
