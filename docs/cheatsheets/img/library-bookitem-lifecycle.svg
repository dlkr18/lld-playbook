<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1300" viewBox="0 0 2140 1300">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahgy" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
  </defs>
  <rect width="2140" height="1300" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">LIBRARY — BOOKITEM LIFECYCLE</text>
  <path d="M640,68 Q1070,84 1500,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- bookFound long recovery curve (drawn first, behind boxes) -->
  <path d="M1065,180 C1065,108 400,108 342,178" stroke="#15803d" stroke-width="2.6" fill="none" marker-end="url(#ahg)"/>
  <text x="600" y="102" font-family="Chalkboard SE" font-size="14" fill="#15803d" font-weight="bold">bookFound() — recovered copy re-shelved</text>

  <!-- START -->
  <circle cx="70" cy="250" r="14" fill="#111"/>
  <path d="M86,250 L176,250" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="92" y="238" font-family="Chalkboard SE" font-size="13" fill="#111">addBook()</text>
  <circle cx="120" cy="150" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="120" y="157" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>

  <!-- AVAILABLE (hub) -->
  <rect x="180" y="180" width="270" height="140" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="315" y="212" font-family="Chalkboard SE" font-size="19" fill="#2563eb" text-anchor="middle" font-weight="bold">AVAILABLE</text>
  <path d="M194,224 L436,224" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="250" font-family="Chalkboard SE" font-size="14" fill="#111">on shelf, no active loan</text>
  <text x="200" y="274" font-family="Chalkboard SE" font-size="14" fill="#111">the hub state — reachable</text>
  <text x="200" y="296" font-family="Chalkboard SE" font-size="14" fill="#111">from every terminal move</text>

  <!-- BORROWED -->
  <circle cx="605" cy="150" r="15" fill="none" stroke="#15803d" stroke-width="2.6"/>
  <text x="605" y="157" font-family="Chalkboard SE" font-size="16" fill="#15803d" text-anchor="middle" font-weight="bold">2</text>
  <rect x="560" y="180" width="270" height="140" rx="12" fill="none" stroke="#15803d" stroke-width="3.2"/>
  <text x="695" y="212" font-family="Chalkboard SE" font-size="19" fill="#15803d" text-anchor="middle" font-weight="bold">BORROWED</text>
  <path d="M574,224 L816,224" stroke="#15803d" stroke-width="2"/>
  <text x="580" y="250" font-family="Chalkboard SE" font-size="14" fill="#111">Loan opened, dueDate set</text>
  <text x="580" y="274" font-family="Chalkboard SE" font-size="14" fill="#111">member holds the copy</text>
  <text x="580" y="296" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">renew() only if no reservation queue</text>

  <!-- LOST -->
  <rect x="940" y="180" width="250" height="140" rx="12" fill="none" stroke="#dc2626" stroke-width="3.2"/>
  <text x="1065" y="212" font-family="Chalkboard SE" font-size="19" fill="#dc2626" text-anchor="middle" font-weight="bold">LOST</text>
  <path d="M954,224 L1176,224" stroke="#dc2626" stroke-width="2"/>
  <text x="960" y="250" font-family="Chalkboard SE" font-size="14" fill="#111">replacement fee charged</text>
  <text x="960" y="274" font-family="Chalkboard SE" font-size="14" fill="#111">copy removed from circulation</text>
  <text x="960" y="296" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">member fine blocks new borrows</text>

  <!-- MAINTENANCE -->
  <rect x="120" y="440" width="250" height="120" rx="12" fill="none" stroke="#6b7280" stroke-width="3"/>
  <text x="245" y="472" font-family="Chalkboard SE" font-size="18" fill="#6b7280" text-anchor="middle" font-weight="bold">MAINTENANCE</text>
  <path d="M134,484 L356,484" stroke="#6b7280" stroke-width="2"/>
  <text x="140" y="510" font-family="Chalkboard SE" font-size="14" fill="#111">damaged / rebinding</text>
  <text x="140" y="538" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">not lendable while here</text>

  <!-- RESERVED -->
  <circle cx="440" cy="410" r="15" fill="none" stroke="#ea580c" stroke-width="2.6"/>
  <text x="440" y="417" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">3</text>
  <rect x="470" y="440" width="270" height="120" rx="12" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="605" y="472" font-family="Chalkboard SE" font-size="18" fill="#ea580c" text-anchor="middle" font-weight="bold">RESERVED</text>
  <path d="M484,484 L726,484" stroke="#ea580c" stroke-width="2"/>
  <text x="490" y="510" font-family="Chalkboard SE" font-size="14" fill="#111">held for next in FIFO queue</text>
  <text x="490" y="538" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">auto-fulfilled on return</text>

  <!-- transitions: borrow / return -->
  <path d="M450,220 L556,220" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="470" y="210" font-family="Chalkboard SE" font-size="13.5" fill="#111" font-weight="bold">borrowBook()</text>
  <path d="M556,278 L454,278" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="470" y="300" font-family="Chalkboard SE" font-size="13.5" fill="#111" font-weight="bold">returnBook()</text>

  <!-- reportLost -->
  <path d="M830,240 L936,240" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="838" y="228" font-family="Chalkboard SE" font-size="13" fill="#dc2626" font-weight="bold">reportLost()</text>

  <!-- reserve (AVAILABLE -> RESERVED) -->
  <path d="M370,320 L560,436" stroke="#ea580c" stroke-width="3" fill="none" marker-end="url(#aho)"/>
  <text x="398" y="388" font-family="Chalkboard SE" font-size="13.5" fill="#ea580c" font-weight="bold">reserve()</text>

  <!-- borrow (RESERVED -> BORROWED) -->
  <path d="M700,440 L700,324" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="712" y="400" font-family="Chalkboard SE" font-size="13.5" fill="#111" font-weight="bold">borrowBook()</text>

  <!-- repair / repairDone (AVAILABLE <-> MAINTENANCE) -->
  <path d="M232,320 L232,436" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#ahgy)"/>
  <text x="122" y="392" font-family="Chalkboard SE" font-size="13" fill="#6b7280" font-weight="bold">repair()</text>
  <path d="M300,436 L300,320" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#ahgy)"/>
  <text x="310" y="392" font-family="Chalkboard SE" font-size="13" fill="#6b7280" font-weight="bold">repairDone()</text>

  <!-- ═════════ STRUCTURE CLUSTER ═════════ -->
  <rect x="1210" y="110" width="880" height="450" rx="16" fill="none" stroke="#7e22ce" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="1178" cy="150" r="15" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="1178" y="157" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">4</text>
  <text x="1240" y="152" font-family="Marker Felt" font-size="20" fill="#7e22ce" font-weight="bold">THE STRUCTURE — catalog, copies &amp; loans</text>

  <!-- Book -->
  <rect x="1245" y="178" width="250" height="90" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1370" y="206" font-family="Chalkboard SE" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">Book — catalog</text>
  <text x="1370" y="232" font-family="Chalkboard SE" font-size="13" fill="#111" text-anchor="middle">isbn, title, authors</text>
  <text x="1370" y="254" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">one entry per ISBN</text>

  <!-- Book -> BookItem 1..* -->
  <path d="M1370,268 L1370,306" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ahv)"/>
  <text x="1382" y="292" font-family="Chalkboard SE" font-size="12" fill="#7e22ce">1..*</text>

  <!-- BookItem -->
  <rect x="1245" y="310" width="250" height="100" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1370" y="338" font-family="Chalkboard SE" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">BookItem — copy</text>
  <text x="1370" y="364" font-family="Chalkboard SE" font-size="13" fill="#111" text-anchor="middle">barcode, status</text>
  <text x="1370" y="388" font-family="Chalkboard SE" font-size="12" fill="#db2777" text-anchor="middle" font-weight="bold">this is the State machine ↖</text>

  <!-- Member -->
  <rect x="1540" y="178" width="250" height="90" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1665" y="206" font-family="Chalkboard SE" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">Member</text>
  <text x="1665" y="232" font-family="Chalkboard SE" font-size="13" fill="#111" text-anchor="middle">id, outstandingFine</text>
  <text x="1665" y="254" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">borrowedItems set</text>

  <!-- Member -> Loan -->
  <path d="M1665,268 L1665,306" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ahv)"/>
  <text x="1677" y="292" font-family="Chalkboard SE" font-size="12" fill="#7e22ce">borrows</text>

  <!-- Loan -->
  <rect x="1540" y="310" width="250" height="100" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1665" y="338" font-family="Chalkboard SE" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">Loan</text>
  <text x="1665" y="364" font-family="Chalkboard SE" font-size="13" fill="#111" text-anchor="middle">item + member</text>
  <text x="1665" y="388" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">dueDate · renew()</text>

  <!-- BookItem -> Loan loaned -->
  <path d="M1495,360 L1536,360" stroke="#111" stroke-width="2.4" fill="none" marker-end="url(#ah)"/>
  <text x="1498" y="352" font-family="Chalkboard SE" font-size="11.5" fill="#111">loaned</text>

  <!-- Reservation -->
  <rect x="1835" y="178" width="230" height="128" rx="10" fill="none" stroke="#ea580c" stroke-width="2.8"/>
  <text x="1950" y="206" font-family="Chalkboard SE" font-size="16" fill="#ea580c" text-anchor="middle" font-weight="bold">Reservation</text>
  <path d="M1849,218 L2051,218" stroke="#ea580c" stroke-width="1.8"/>
  <text x="1950" y="244" font-family="Chalkboard SE" font-size="13" fill="#111" text-anchor="middle">FIFO queue per ISBN</text>
  <text x="1950" y="268" font-family="Chalkboard SE" font-size="13" fill="#111" text-anchor="middle">member waits for a copy</text>
  <text x="1950" y="292" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">fulfilled on returnBook()</text>

  <!-- PATTERNS strip inside cluster -->
  <text x="1245" y="452" font-family="Marker Felt" font-size="17" fill="#16a34a" font-weight="bold">PATTERNS TO NAME</text>
  <text x="1245" y="480" font-family="Chalkboard SE" font-size="14" fill="#111"><tspan fill="#2563eb" font-weight="bold">State</tspan> — BookItem status owns legal moves &#183; <tspan fill="#2563eb" font-weight="bold">Observer</tspan> — reservation-ready / overdue alerts</text>
  <text x="1245" y="506" font-family="Chalkboard SE" font-size="14" fill="#111"><tspan fill="#2563eb" font-weight="bold">Repository</tspan> — in-memory maps for books / items / members (swap for DB)</text>
  <text x="1245" y="536" font-family="Chalkboard SE" font-size="13.5" fill="#6b7280">Value Objects: ISBN, Barcode, Money(fine) — immutable &amp; self-validating</text>

  <!-- ═════════ STICKIES ═════════ -->
  <g transform="rotate(-2 355 700)">
    <rect x="120" y="612" width="470" height="176" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="142" y="646" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">PER-ITEM LOCKING — no double checkout:</text>
    <text x="142" y="676" font-family="Chalkboard SE" font-size="14" fill="#713f12">synchronized(bookItem) around the</text>
    <text x="142" y="700" font-family="Chalkboard SE" font-size="14" fill="#713f12">borrow / return transition</text>
    <text x="142" y="726" font-family="Chalkboard SE" font-size="14" fill="#713f12">state check + mutation are atomic —</text>
    <text x="142" y="750" font-family="Chalkboard SE" font-size="14" fill="#713f12">two members racing one copy → one</text>
    <text x="142" y="772" font-family="Chalkboard SE" font-size="14" fill="#713f12">wins, other sees BORROWED.</text>
  </g>
  <circle cx="355" cy="616" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 875 700)">
    <rect x="640" y="612" width="470" height="176" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="662" y="646" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">FIFO RESERVATIONS:</text>
    <text x="662" y="676" font-family="Chalkboard SE" font-size="14" fill="#713f12">reserve() enqueues member per ISBN</text>
    <text x="662" y="700" font-family="Chalkboard SE" font-size="14" fill="#713f12">on returnBook → head of queue gets</text>
    <text x="662" y="724" font-family="Chalkboard SE" font-size="14" fill="#713f12">the copy (RESERVED), notified</text>
    <text x="662" y="750" font-family="Chalkboard SE" font-size="14" fill="#713f12">renew() blocked while queue non-empty</text>
    <text x="662" y="772" font-family="Chalkboard SE" font-size="13" fill="#6b7280">fairness beats convenience</text>
  </g>
  <circle cx="875" cy="616" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1390 700)">
    <rect x="1160" y="612" width="460" height="176" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1182" y="646" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">FINES &amp; DUE DATES:</text>
    <text x="1182" y="676" font-family="Chalkboard SE" font-size="14" fill="#713f12">dueDate = borrowedAt + loanPeriod</text>
    <text x="1182" y="700" font-family="Chalkboard SE" font-size="14" fill="#713f12">fine = $1 &#215; overdue days</text>
    <text x="1182" y="724" font-family="Chalkboard SE" font-size="14" fill="#713f12">accrued on return / reportLost</text>
    <text x="1182" y="750" font-family="Chalkboard SE" font-size="14" fill="#713f12">unpaid fine → new borrows blocked</text>
    <text x="1182" y="772" font-family="Chalkboard SE" font-size="13" fill="#6b7280">Money value object, never a raw double</text>
  </g>
  <circle cx="1390" cy="616" r="7" fill="#dc2626"/>

  <!-- why state machine note -->
  <text x="1680" y="646" font-family="Chalkboard SE" font-size="15" fill="#db2777" font-weight="bold">Why a state machine?</text>
  <text x="1680" y="674" font-family="Chalkboard SE" font-size="14" fill="#111">every transition is validated by the current</text>
  <text x="1680" y="698" font-family="Chalkboard SE" font-size="14" fill="#111">status — an illegal move (borrow a LOST or</text>
  <text x="1680" y="722" font-family="Chalkboard SE" font-size="14" fill="#111">MAINTENANCE copy) is rejected, not silently</text>
  <text x="1680" y="746" font-family="Chalkboard SE" font-size="14" fill="#111">allowed. Reserved → Borrowed only by the</text>
  <text x="1680" y="770" font-family="Chalkboard SE" font-size="14" fill="#111">member at the head of the queue.</text>

  <!-- WHITEBOARD ORDER -->
  <text x="60" y="880" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="880" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; addBook &#8594; AVAILABLE &#8594; &#9313; borrow &#8594; BORROWED (return loops back) &#8594; &#9314; reserve holds a copy (FIFO) &#8594; &#9315; lost / maintenance are side states — every move State-validated</text>

  <!-- LEGEND -->
  <rect x="60" y="920" width="2020" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="982" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="240" y="956" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="274" y="974">available (hub)</text>
    <rect x="240" y="1002" width="24" height="24" rx="5" fill="none" stroke="#15803d" stroke-width="3"/><text x="274" y="1020">borrowed / recovery</text>
    <rect x="500" y="956" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="534" y="974">reserved (hold)</text>
    <rect x="500" y="1002" width="24" height="24" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/><text x="534" y="1020">maintenance</text>
    <rect x="740" y="956" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="774" y="974">lost / penalty</text>
    <rect x="740" y="1002" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="774" y="1020">structure (entities)</text>
    <rect x="990" y="1002" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.4"/><text x="1024" y="1020">interview insight</text>
    <path d="M990,968 L1050,968" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/><text x="1064" y="974">transition</text>
    <path d="M1230,968 L1290,968" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/><text x="1304" y="974">lost / failure path</text>
    <circle cx="1242" cy="1014" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1242" y="1019" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1264" y="1019">story step</text>
    <text x="1560" y="974" fill="#6b7280">Patterns: State &#183; Observer &#183; Repository &#183; Value Objects</text>
    <text x="1560" y="1019" fill="#6b7280">Library Management — LLD (BookItem state machine + catalog)</text>
  </g>
</svg>
