<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1140" viewBox="0 0 2140 1140">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
  </defs>

  <rect width="2140" height="1140" fill="#ffffff"/>

  <!-- ═════════ TITLE ═════════ -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="45" fill="#1e40af" text-anchor="middle" font-weight="bold">TRANSACTION STATE MACHINE — enum-guarded lifecycle</text>
  <path d="M470,68 Q1070,86 1670,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- START dot -->
  <circle cx="46" cy="258" r="13" fill="#111"/>
  <path d="M59,258 L118,258" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="60" y="244" font-family="Chalkboard SE" font-size="13" fill="#111">new Transaction()</text>

  <!-- ① PENDING -->
  <circle cx="160" cy="168" r="15" fill="#fff" stroke="#2563eb" stroke-width="2.8"/>
  <text x="160" y="174" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>
  <rect x="122" y="186" width="330" height="158" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="287" y="218" font-family="Chalkboard SE" font-size="20" fill="#2563eb" text-anchor="middle" font-weight="bold">PENDING</text>
  <path d="M136,230 L438,230" stroke="#2563eb" stroke-width="2"/>
  <text x="142" y="256" font-family="Chalkboard SE" font-size="14" fill="#111">txn created, id assigned</text>
  <text x="142" y="280" font-family="Chalkboard SE" font-size="14" fill="#111">no money moved yet</text>
  <text x="142" y="308" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">the only non-terminal state —</text>
  <text x="142" y="328" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">the fork point of the lifecycle</text>

  <!-- PENDING -> COMPLETED -->
  <path d="M452,258 L616,258" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/>
  <text x="534" y="246" font-family="Chalkboard SE" font-size="13" fill="#15803d" text-anchor="middle" font-weight="bold">movement recorded</text>

  <!-- ② COMPLETED -->
  <circle cx="658" cy="168" r="15" fill="#fff" stroke="#15803d" stroke-width="2.8"/>
  <text x="658" y="174" font-family="Chalkboard SE" font-size="16" fill="#15803d" text-anchor="middle" font-weight="bold">2</text>
  <rect x="620" y="186" width="360" height="158" rx="12" fill="none" stroke="#15803d" stroke-width="3.2"/>
  <text x="800" y="218" font-family="Chalkboard SE" font-size="20" fill="#15803d" text-anchor="middle" font-weight="bold">COMPLETED &#10003;</text>
  <path d="M634,230 L966,230" stroke="#15803d" stroke-width="2"/>
  <text x="640" y="256" font-family="Chalkboard SE" font-size="14" fill="#111">balanced DEBIT/CREDIT pair</text>
  <text x="640" y="280" font-family="Chalkboard SE" font-size="14" fill="#111">attached: markCompleted(pair)</text>
  <text x="640" y="308" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">balances updated, funds settled —</text>
  <text x="640" y="328" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">the successful terminal (until reversed)</text>

  <!-- COMPLETED -> REVERSED -->
  <path d="M980,258 L1144,258" stroke="#7e22ce" stroke-width="3" fill="none" marker-end="url(#ahv)"/>
  <text x="1062" y="246" font-family="Chalkboard SE" font-size="13" fill="#7e22ce" text-anchor="middle" font-weight="bold">compensating</text>

  <!-- ③ REVERSED -->
  <circle cx="1186" cy="168" r="15" fill="#fff" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1186" y="174" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">3</text>
  <rect x="1148" y="186" width="360" height="158" rx="12" fill="none" stroke="#7e22ce" stroke-width="3.2"/>
  <text x="1328" y="218" font-family="Chalkboard SE" font-size="20" fill="#7e22ce" text-anchor="middle" font-weight="bold">REVERSED</text>
  <path d="M1162,230 L1494,230" stroke="#7e22ce" stroke-width="2"/>
  <text x="1168" y="256" font-family="Chalkboard SE" font-size="14" fill="#111">opposite pair appended</text>
  <text x="1168" y="280" font-family="Chalkboard SE" font-size="14" fill="#111">original flipped, ledger balanced</text>
  <text x="1168" y="308" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">undo is itself a movement —</text>
  <text x="1168" y="328" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">never rewrites history, appends</text>

  <!-- PENDING -> FAILED -->
  <path d="M287,344 L287,432" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="300" y="396" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">insufficient funds / limit</text>

  <!-- FAILED -->
  <rect x="122" y="436" width="330" height="150" rx="12" fill="none" stroke="#dc2626" stroke-width="3.2"/>
  <text x="287" y="468" font-family="Chalkboard SE" font-size="20" fill="#dc2626" text-anchor="middle" font-weight="bold">FAILED &#10007;</text>
  <path d="M136,480 L438,480" stroke="#dc2626" stroke-width="2"/>
  <text x="142" y="506" font-family="Chalkboard SE" font-size="14" fill="#111">markFailed(reason)</text>
  <text x="142" y="530" font-family="Chalkboard SE" font-size="14" fill="#111">nothing mutated — clean abort</text>
  <text x="142" y="558" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">idempotency key NOT cached (retryable)</text>

  <!-- terminal sinks -->
  <!-- REVERSED -> done -->
  <circle cx="1600" cy="258" r="15" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="1600" cy="258" r="8" fill="#111"/>
  <path d="M1508,258 L1580,258" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="1618" y="263" font-family="Chalkboard SE" font-size="13" fill="#111">terminal</text>
  <!-- FAILED -> done -->
  <circle cx="600" cy="511" r="15" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="600" cy="511" r="8" fill="#111"/>
  <path d="M452,511 L580,511" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="618" y="516" font-family="Chalkboard SE" font-size="13" fill="#111">terminal</text>

  <!-- ═════════ ENUM RULE CLUSTER ═════════ -->
  <rect x="1560" y="360" width="530" height="330" rx="16" fill="none" stroke="#7e22ce" stroke-width="3" stroke-dasharray="14,9"/>
  <text x="1584" y="396" font-family="Marker Felt" font-size="20" fill="#7e22ce" font-weight="bold">THE ENUM RULE — canTransitionTo()</text>
  <rect x="1584" y="414" width="482" height="180" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1600" y="444" font-family="Chalkboard SE" font-size="15" fill="#2563eb" font-weight="bold">PENDING</text>
  <text x="1730" y="444" font-family="Chalkboard SE" font-size="15" fill="#111">&#8594; COMPLETED | FAILED</text>
  <text x="1600" y="474" font-family="Chalkboard SE" font-size="15" fill="#15803d" font-weight="bold">COMPLETED</text>
  <text x="1730" y="474" font-family="Chalkboard SE" font-size="15" fill="#111">&#8594; REVERSED</text>
  <text x="1600" y="504" font-family="Chalkboard SE" font-size="15" fill="#dc2626" font-weight="bold">FAILED</text>
  <text x="1730" y="504" font-family="Chalkboard SE" font-size="15" fill="#6b7280">&#8594; (terminal, no exits)</text>
  <text x="1600" y="534" font-family="Chalkboard SE" font-size="15" fill="#7e22ce" font-weight="bold">REVERSED</text>
  <text x="1730" y="534" font-family="Chalkboard SE" font-size="15" fill="#6b7280">&#8594; (terminal, no exits)</text>
  <path d="M1596,548 L2054,548" stroke="#7e22ce" stroke-width="1.6"/>
  <text x="1600" y="574" font-family="Chalkboard SE" font-size="13.5" fill="#111">isTerminal() = FAILED or REVERSED</text>
  <text x="1600" y="632" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">any other move &#8658; IllegalStateException</text>
  <text x="1600" y="658" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">the switch table IS the state machine — no GoF classes</text>

  <!-- ═════════ STICKY A: WHY ENUM ═════════ -->
  <g transform="rotate(-2 350 790)">
    <rect x="150" y="700" width="400" height="180" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="170" y="732" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">WHY ENUM, NOT CLASS-PER-STATE?</text>
    <text x="170" y="760" font-family="Chalkboard SE" font-size="14" fill="#713f12">lifecycle is linear + carries NO</text>
    <text x="170" y="784" font-family="Chalkboard SE" font-size="14" fill="#713f12">per-state behaviour, so a transition</text>
    <text x="170" y="808" font-family="Chalkboard SE" font-size="14" fill="#713f12">table on the enum beats GoF State.</text>
    <text x="170" y="836" font-family="Chalkboard SE" font-size="13" fill="#14532d">contrast: Payment Gateway DOES use</text>
    <text x="170" y="858" font-family="Chalkboard SE" font-size="13" fill="#14532d">class-per-state — its states act.</text>
  </g>
  <circle cx="350" cy="704" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY B: ILLEGAL MOVE ═════════ -->
  <g transform="rotate(1.5 800 790)">
    <rect x="600" y="700" width="400" height="180" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="620" y="732" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">ILLEGAL MOVE = THROW</text>
    <text x="620" y="760" font-family="Chalkboard SE" font-size="14" fill="#713f12">transitionTo() consults the enum</text>
    <text x="620" y="784" font-family="Chalkboard SE" font-size="14" fill="#713f12">BEFORE mutating status.</text>
    <text x="620" y="812" font-family="Chalkboard SE" font-size="14" fill="#713f12">e.g. COMPLETED &#8594; PENDING throws;</text>
    <text x="620" y="836" font-family="Chalkboard SE" font-size="14" fill="#713f12">reverse of a non-COMPLETED throws.</text>
    <text x="620" y="862" font-family="Chalkboard SE" font-size="13" fill="#14532d" font-weight="bold">a corrupted audit trail is impossible</text>
  </g>
  <circle cx="800" cy="704" r="7" fill="#dc2626"/>

  <!-- ═════════ STICKY C: TERMINAL ═════════ -->
  <g transform="rotate(-1.5 1250 790)">
    <rect x="1050" y="700" width="400" height="180" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1070" y="732" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">TWO WAYS TO END</text>
    <text x="1070" y="760" font-family="Chalkboard SE" font-size="14" fill="#713f12">FAILED  = never touched money;</text>
    <text x="1070" y="784" font-family="Chalkboard SE" font-size="14" fill="#713f12">key stays free for a real retry.</text>
    <text x="1070" y="812" font-family="Chalkboard SE" font-size="14" fill="#713f12">REVERSED = money moved, then</text>
    <text x="1070" y="836" font-family="Chalkboard SE" font-size="14" fill="#713f12">compensated by an opposite pair.</text>
    <text x="1070" y="862" font-family="Chalkboard SE" font-size="13" fill="#6b7280">both are dead-ends — no further moves</text>
  </g>
  <circle cx="1250" cy="704" r="7" fill="#dc2626"/>

  <!-- ═════════ WHITEBOARD ORDER ═════════ -->
  <text x="60" y="936" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="936" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; PENDING (created, no money) &#8594; &#9313; COMPLETED (ledger pair attached) &#8594; &#9314; REVERSED (compensate) &#160;&#160;|&#160;&#160; PENDING &#8594; FAILED is the side exit</text>

  <!-- ═════════ LEGEND ═════════ -->
  <rect x="60" y="972" width="2020" height="146" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="1032" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="240" y="1008" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="274" y="1026">pending (live)</text>
    <rect x="240" y="1052" width="24" height="24" rx="5" fill="none" stroke="#15803d" stroke-width="3"/><text x="274" y="1070">completed (success)</text>
    <rect x="480" y="1008" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="514" y="1026">reversed (compensated)</text>
    <rect x="480" y="1052" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="514" y="1070">failed (clean abort)</text>
    <rect x="760" y="1052" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/><text x="794" y="1070">interview insight</text>
    <path d="M760,1020 L822,1020" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#ahg)"/><text x="836" y="1026">valid transition</text>
    <path d="M1030,1020 L1092,1020" stroke="#dc2626" stroke-width="3" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/><text x="1106" y="1026">failure path</text>
    <circle cx="1042" cy="1064" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1042" y="1069" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1064" y="1069">story step</text>
    <circle cx="1290" cy="1020" r="11" fill="none" stroke="#111" stroke-width="3"/><circle cx="1290" cy="1020" r="5.5" fill="#111"/><text x="1314" y="1026">terminal (done)</text>
    <text x="1560" y="1026" fill="#6b7280">enum table (canTransitionTo) — not GoF class-per-state</text>
    <text x="1560" y="1069" fill="#6b7280">Digital Wallet — transaction lifecycle + guarded transitions</text>
  </g>
</svg>
