<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="1300" viewBox="0 0 2140 1300">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#111"/></marker>
    <marker id="ahg" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="ahr" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#dc2626"/></marker>
    <marker id="aho" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#ea580c"/></marker>
    <marker id="ahb" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#2563eb"/></marker>
    <marker id="ahv" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#7e22ce"/></marker>
    <marker id="trib" markerWidth="17" markerHeight="15" refX="15" refY="7.5" orient="auto"><path d="M1,1 L15,7.5 L1,14 z" fill="#fff" stroke="#2563eb" stroke-width="2"/></marker>
    <marker id="trio" markerWidth="17" markerHeight="15" refX="15" refY="7.5" orient="auto"><path d="M1,1 L15,7.5 L1,14 z" fill="#fff" stroke="#ea580c" stroke-width="2"/></marker>
    <marker id="triv" markerWidth="17" markerHeight="15" refX="15" refY="7.5" orient="auto"><path d="M1,1 L15,7.5 L1,14 z" fill="#fff" stroke="#7e22ce" stroke-width="2"/></marker>
  </defs>
  <rect width="2140" height="1300" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="1070" y="52" font-family="Marker Felt" font-size="44" fill="#1e40af" text-anchor="middle" font-weight="bold">MEETING SCHEDULER — BOOKING LIFECYCLE</text>
  <path d="M560,68 Q1070,84 1580,66" stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- START -->
  <circle cx="90" cy="235" r="14" fill="#111"/>
  <text x="108" y="220" font-family="Chalkboard SE" font-size="13" fill="#111">book(request)</text>
  <path d="M104,235 L196,235" stroke="#111" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <circle cx="150" cy="150" r="15" fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="150" y="157" font-family="Chalkboard SE" font-size="16" fill="#2563eb" text-anchor="middle" font-weight="bold">1</text>

  <!-- CONFIRMED -->
  <rect x="200" y="160" width="400" height="160" rx="12" fill="none" stroke="#2563eb" stroke-width="3.2"/>
  <text x="400" y="192" font-family="Chalkboard SE" font-size="19" fill="#2563eb" text-anchor="middle" font-weight="bold">CONFIRMED</text>
  <path d="M214,204 L586,204" stroke="#2563eb" stroke-width="2"/>
  <text x="220" y="230" font-family="Chalkboard SE" font-size="14" fill="#111">atomic reserve under per-room ReentrantLock</text>
  <text x="220" y="254" font-family="Chalkboard SE" font-size="14" fill="#111">calendar.put(start, booking) — no overlap</text>
  <text x="220" y="278" font-family="Chalkboard SE" font-size="14" fill="#111">status = CONFIRMED · attendees notified</text>
  <text x="220" y="304" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">the only live state — cancel is the one exit</text>

  <!-- step 2 -->
  <circle cx="660" cy="150" r="15" fill="none" stroke="#6b7280" stroke-width="2.6"/>
  <text x="660" y="157" font-family="Chalkboard SE" font-size="16" fill="#6b7280" text-anchor="middle" font-weight="bold">2</text>

  <!-- cancel transition -->
  <path d="M600,220 L720,220" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="608" y="208" font-family="Chalkboard SE" font-size="13.5" fill="#6b7280" font-weight="bold">cancel(bookingId)</text>

  <!-- CANCELLED -->
  <rect x="724" y="160" width="360" height="160" rx="12" fill="none" stroke="#6b7280" stroke-width="3.2"/>
  <text x="904" y="192" font-family="Chalkboard SE" font-size="19" fill="#6b7280" text-anchor="middle" font-weight="bold">CANCELLED</text>
  <path d="M738,204 L1070,204" stroke="#6b7280" stroke-width="2"/>
  <text x="744" y="230" font-family="Chalkboard SE" font-size="14" fill="#111">returns a NEW immutable Booking copy</text>
  <text x="744" y="254" font-family="Chalkboard SE" font-size="14" fill="#111">calendar.cancel() frees the slot</text>
  <text x="744" y="278" font-family="Chalkboard SE" font-size="14" fill="#111">status = CANCELLED (terminal)</text>
  <text x="744" y="304" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">reachable only from CONFIRMED</text>

  <!-- terminal sink -->
  <circle cx="1160" cy="225" r="15" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="1160" cy="225" r="8" fill="#111"/>
  <path d="M1084,224 L1140,224" stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="1176" y="230" font-family="Chalkboard SE" font-size="13" fill="#111">done</text>

  <!-- CONFLICT failure branch -->
  <path d="M172,246 C158,320 178,400 296,438" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/>
  <text x="80" y="392" font-family="Chalkboard SE" font-size="13.5" fill="#dc2626" font-weight="bold">overlap &#8594; reject</text>
  <rect x="150" y="440" width="470" height="140" rx="12" fill="none" stroke="#dc2626" stroke-width="3"/>
  <text x="385" y="472" font-family="Chalkboard SE" font-size="18" fill="#dc2626" text-anchor="middle" font-weight="bold">BOOKING REJECTED</text>
  <path d="M164,484 L606,484" stroke="#dc2626" stroke-width="2"/>
  <text x="170" y="510" font-family="Chalkboard SE" font-size="14" fill="#111">floor/ceiling probe found an overlap</text>
  <text x="170" y="534" font-family="Chalkboard SE" font-size="14" fill="#111">BookingConflictException thrown</text>
  <text x="170" y="560" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">nothing inserted — the no-overlap invariant holds</text>

  <!-- STRUCTURE cluster -->
  <rect x="1210" y="130" width="890" height="440" rx="16" fill="none" stroke="#7e22ce" stroke-width="3" stroke-dasharray="14,9"/>
  <circle cx="1176" cy="150" r="15" fill="none" stroke="#7e22ce" stroke-width="2.6"/>
  <text x="1176" y="157" font-family="Chalkboard SE" font-size="16" fill="#7e22ce" text-anchor="middle" font-weight="bold">3</text>
  <text x="1240" y="166" font-family="Marker Felt" font-size="20" fill="#7e22ce" font-weight="bold">THE STRUCTURE — what book() rides on</text>

  <!-- MeetingScheduler facade -->
  <rect x="1240" y="188" width="300" height="86" rx="10" fill="none" stroke="#7e22ce" stroke-width="2.8"/>
  <text x="1390" y="218" font-family="Chalkboard SE" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">MeetingScheduler</text>
  <text x="1390" y="246" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280" text-anchor="middle">Facade — registry + per-room locks</text>
  <text x="1390" y="266" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">the entry point on the whiteboard</text>

  <!-- RoomCalendar -->
  <path d="M1390,274 L1390,306" stroke="#7e22ce" stroke-width="2.6" fill="none" marker-end="url(#ah)"/>
  <text x="1402" y="296" font-family="Chalkboard SE" font-size="12" fill="#7e22ce">1..*</text>
  <rect x="1240" y="310" width="300" height="104" rx="10" fill="none" stroke="#2563eb" stroke-width="2.8"/>
  <text x="1390" y="338" font-family="Chalkboard SE" font-size="15.5" fill="#111" text-anchor="middle" font-weight="bold">RoomCalendar</text>
  <text x="1390" y="362" font-family="Chalkboard SE" font-size="13" fill="#111" text-anchor="middle">TreeMapRoomCalendar (1 / room)</text>
  <text x="1390" y="386" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" text-anchor="middle" font-weight="bold">O(log n) isFree via floor/ceiling</text>
  <text x="1390" y="406" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">see the timeline diagram &#8595;</text>

  <!-- ReentrantLock -->
  <rect x="1240" y="440" width="300" height="104" rx="10" fill="none" stroke="#6b7280" stroke-width="2.8"/>
  <text x="1390" y="468" font-family="Chalkboard SE" font-size="15.5" fill="#111" text-anchor="middle" font-weight="bold">ReentrantLock — per room</text>
  <text x="1390" y="492" font-family="Chalkboard SE" font-size="13" fill="#111" text-anchor="middle">guards check-free &#8594; insert</text>
  <text x="1390" y="516" font-family="Chalkboard SE" font-size="12.5" fill="#15803d" text-anchor="middle" font-weight="bold">not global &#8658; rooms book in parallel</text>
  <text x="1390" y="536" font-family="Chalkboard SE" font-size="12" fill="#6b7280" text-anchor="middle">ConcurrentHashMap holds all registries</text>

  <!-- AllocationStrategy -->
  <rect x="1580" y="188" width="490" height="152" rx="12" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="1825" y="218" font-family="Chalkboard SE" font-size="16.5" fill="#ea580c" text-anchor="middle" font-weight="bold">AllocationStrategy — Strategy &#215;2</text>
  <path d="M1594,230 L2056,230" stroke="#ea580c" stroke-width="2"/>
  <text x="1602" y="256" font-family="Chalkboard SE" font-size="14" fill="#111">FirstFit &#183; SmallestSufficientCapacity</text>
  <text x="1602" y="282" font-family="Chalkboard SE" font-size="14" fill="#111">bookAny() picks &quot;which room&quot; from candidates</text>
  <text x="1602" y="312" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">volatile hot-swap · Open/Closed, no if-else on policy</text>

  <!-- BookingObserver -->
  <rect x="1580" y="358" width="490" height="152" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1825" y="388" font-family="Chalkboard SE" font-size="16.5" fill="#2563eb" text-anchor="middle" font-weight="bold">BookingObserver — Observer</text>
  <path d="M1594,400 L2056,400" stroke="#2563eb" stroke-width="2"/>
  <text x="1602" y="426" font-family="Chalkboard SE" font-size="14" fill="#111">AttendeeNotifier fires on book / cancel</text>
  <text x="1602" y="452" font-family="Chalkboard SE" font-size="14" fill="#111">CopyOnWriteArrayList — lock-free iterate</text>
  <text x="1602" y="482" font-family="Chalkboard SE" font-size="12.5" fill="#6b7280">runs AFTER commit, OUTSIDE the lock (SRP)</text>

  <!-- Facade uses strategy / observer -->
  <path d="M1540,214 L1576,214" stroke="#111" stroke-width="2.4" fill="none" marker-end="url(#aho)"/>
  <path d="M1540,238 C1558,238 1560,392 1576,404" stroke="#111" stroke-width="2.4" fill="none" marker-end="url(#ahb)"/>

  <!-- STICKIES -->
  <g transform="rotate(-2 385 705)">
    <rect x="200" y="615" width="370" height="182" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="220" y="649" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">PER-ROOM LOCK — no double-book:</text>
    <text x="220" y="679" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">two threads both see the slot free,</text>
    <text x="220" y="703" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">both try to insert. Guard the whole</text>
    <text x="220" y="727" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">isFree()+put() under ONE room lock &#8594;</text>
    <text x="220" y="751" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">they serialise, exactly one wins.</text>
    <text x="220" y="777" font-family="Chalkboard SE" font-size="13" fill="#14532d" font-weight="bold">proven by a 64-thread race test.</text>
  </g>
  <circle cx="385" cy="619" r="7" fill="#dc2626"/>

  <g transform="rotate(1.5 790 705)">
    <rect x="620" y="615" width="340" height="182" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="640" y="649" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">PATTERNS TO NAME:</text>
    <text x="640" y="679" font-family="Chalkboard SE" font-size="14" fill="#14532d">Facade (MeetingScheduler)</text>
    <text x="640" y="705" font-family="Chalkboard SE" font-size="14" fill="#14532d">Strategy (room allocation)</text>
    <text x="640" y="731" font-family="Chalkboard SE" font-size="14" fill="#14532d">Observer (attendee notify)</text>
    <text x="640" y="757" font-family="Chalkboard SE" font-size="14" fill="#14532d">State (booking lifecycle)</text>
    <text x="640" y="783" font-family="Chalkboard SE" font-size="13" fill="#6b7280">+ Command-VO (BookingRequest)</text>
  </g>
  <circle cx="790" cy="619" r="7" fill="#dc2626"/>

  <g transform="rotate(-1.5 1215 705)">
    <rect x="1030" y="615" width="370" height="182" fill="#fef9c3" stroke="#eab308" stroke-width="2.5" rx="4"/>
    <text x="1050" y="649" font-family="Chalkboard SE" font-size="15.5" fill="#7f1d1d" font-weight="bold">IMMUTABLE BOOKING:</text>
    <text x="1050" y="679" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">cancel() returns a NEW CANCELLED</text>
    <text x="1050" y="703" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">copy — no shared mutable status to</text>
    <text x="1050" y="727" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">publish across threads.</text>
    <text x="1050" y="753" font-family="Chalkboard SE" font-size="13.5" fill="#713f12">Costs one allocation, buys zero</text>
    <text x="1050" y="777" font-family="Chalkboard SE" font-size="13" fill="#14532d" font-weight="bold">visibility bugs &amp; safe sharing.</text>
  </g>
  <circle cx="1215" cy="619" r="7" fill="#dc2626"/>

  <!-- why so few states note -->
  <text x="1480" y="655" font-family="Chalkboard SE" font-size="15" fill="#db2777" font-weight="bold">Why only two states?</text>
  <text x="1480" y="683" font-family="Chalkboard SE" font-size="14" fill="#111">A room booking is binary: reserved, or gone. The</text>
  <text x="1480" y="707" font-family="Chalkboard SE" font-size="14" fill="#111">reserve is atomic under the per-room lock, so there</text>
  <text x="1480" y="731" font-family="Chalkboard SE" font-size="14" fill="#111">is no PENDING / HELD limbo to model — and every</text>
  <text x="1480" y="755" font-family="Chalkboard SE" font-size="14" fill="#111">transition is validated (CANCELLED &#8594; * throws).</text>
  <text x="1480" y="784" font-family="Chalkboard SE" font-size="13" fill="#6b7280">Booking carries identity (id equality); the rest is immutable.</text>

  <!-- WHITEBOARD ORDER -->
  <text x="60" y="890" font-family="Marker Felt" font-size="19" fill="#1e40af" font-weight="bold">WHITEBOARD ORDER:</text>
  <text x="270" y="890" font-family="Chalkboard SE" font-size="15.5" fill="#111">&#9312; book() &#8594; CONFIRMED (atomic reserve under the room lock) &#8594; &#9313; cancel() &#8594; CANCELLED (terminal) &#8594; &#9314; the collaborators it rides on &#8594; overlap = the red reject branch</text>

  <!-- LEGEND -->
  <rect x="60" y="930" width="2020" height="150" rx="14" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="10,8"/>
  <text x="88" y="992" font-family="Marker Felt" font-size="22" fill="#1e40af" font-weight="bold">LEGEND</text>
  <g font-family="Chalkboard SE" font-size="13.5" fill="#111">
    <rect x="240" y="966" width="24" height="24" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/><text x="274" y="984">confirmed (live)</text>
    <rect x="240" y="1012" width="24" height="24" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/><text x="274" y="1030">cancelled / lock</text>
    <rect x="490" y="966" width="24" height="24" rx="5" fill="none" stroke="#7e22ce" stroke-width="3"/><text x="524" y="984">structure / facade</text>
    <rect x="490" y="1012" width="24" height="24" rx="5" fill="none" stroke="#ea580c" stroke-width="3"/><text x="524" y="1030">strategy (plug-in)</text>
    <rect x="740" y="966" width="24" height="24" rx="5" fill="none" stroke="#dc2626" stroke-width="3"/><text x="774" y="984">conflict / reject</text>
    <rect x="740" y="1012" width="24" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2.4"/><text x="774" y="1030">interview insight</text>
    <path d="M980,978 L1040,978" stroke="#111" stroke-width="2.8" fill="none" marker-end="url(#ah)"/><text x="1054" y="984">transition / uses</text>
    <path d="M980,1024 L1040,1024" stroke="#dc2626" stroke-width="2.8" stroke-dasharray="9,6" fill="none" marker-end="url(#ahr)"/><text x="1054" y="1030">failure path</text>
    <circle cx="1322" cy="978" r="12" fill="none" stroke="#2563eb" stroke-width="2.4"/><text x="1322" y="983" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="12">n</text><text x="1344" y="984">story step</text>
    <text x="1560" y="984" fill="#6b7280">Patterns: Facade &#183; Strategy &#183; Observer &#183; State</text>
    <text x="1560" y="1030" fill="#6b7280">Meeting Scheduler — LLD (booking state machine + collaborators)</text>
  </g>
</svg>
